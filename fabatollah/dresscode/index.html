<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">

<title>FABATOLLAH: DRESS CODE 👗⏱️</title>
<style>
  :root{
    --c-bg:#0a1226; --c-panel:#101b38; --c-panel-2:#16244a;
    --c-cyan:#3ee6ff; --c-gold:#ffd166; --c-pink:#ff5db1; --c-red:#ff5d73; --c-green:#5dffa8;
    --c-ink:#eaf2ff; --c-dim:#8da3cc; --c-border:rgba(62,230,255,.22);
    --gradient-sky:radial-gradient(120% 90% at 50% -10%,#1c2350 0%,#121633 45%,#0a1226 100%);
    --font-display:"Courier New",ui-monospace,Menlo,Consolas,monospace;
    --font-body:"Heebo",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    --ease:cubic-bezier(.2,.7,.2,1);
    --rainbow:linear-gradient(90deg,#ff4d4d,#ff9f43,#ffd166,#5dffa8,#3ee6ff,#a25bff);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;touch-action:manipulation;
    background:var(--c-bg);color:var(--c-ink);font-family:var(--font-body);user-select:none;-webkit-user-select:none;}
  body{display:flex;justify-content:center;}
  .app{width:100%;max-width:520px;height:100%;background:var(--gradient-sky);display:flex;flex-direction:column;position:relative;}

  header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:calc(env(safe-area-inset-top,0px) + 8px) 12px 4px;}
  .corner{font-size:12px;font-weight:700;background:var(--c-panel);border:1px solid var(--c-border);
    border-radius:999px;padding:7px 12px;color:var(--c-dim);text-decoration:none;cursor:pointer;}
  .wm{font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:.04em;
    background:var(--rainbow);-webkit-background-clip:text;background-clip:text;color:transparent;}

  .hudrow{display:flex;align-items:center;justify-content:space-between;padding:2px 14px;}
  .score{font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--c-gold);text-shadow:0 0 12px rgba(255,209,102,.5);}
  .combo{font-size:13px;font-weight:800;color:var(--c-pink);opacity:0;transition:opacity .15s;}
  .combo.on{opacity:1;}
  .combo.bump{animation:cb .22s var(--ease);} @keyframes cb{40%{transform:scale(1.4)}}
  .rounds{font-size:12px;color:var(--c-dim);}

  .timer{height:14px;margin:4px 14px 0;border-radius:999px;background:rgba(255,255,255,.08);
    overflow:hidden;border:1px solid var(--c-border);}
  .timer>i{display:block;height:100%;width:100%;background:var(--rainbow);border-radius:999px;}
  .timer.low>i{background:linear-gradient(90deg,#ff5d73,#ff9f43)!important;animation:tpulse .5s ease-in-out infinite;}
  @keyframes tpulse{50%{opacity:.6}}

  /* scenario card */
  .scene{margin:8px 14px 2px;border-radius:18px;padding:14px 16px;text-align:center;
    background:linear-gradient(180deg,#16244a,#101b38);border:1px solid var(--c-border);
    box-shadow:0 10px 26px rgba(0,0,0,.4);}
  .scene.in{animation:sIn .35s var(--ease);}
  @keyframes sIn{0%{opacity:0;transform:translateY(-12px) scale(.96)}100%{opacity:1;transform:none}}
  .scene .emoji{font-size:34px;line-height:1;}
  .scene .ttl{font-size:clamp(19px,5.6vw,24px);font-weight:900;margin-top:4px;}
  .scene .sub{font-size:13px;color:var(--c-dim);margin-top:3px;}
  .scene .sub b{color:var(--c-cyan);}

  /* options */
  .opts{flex:1;display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:8px 14px calc(env(safe-area-inset-bottom,0px) + 12px);align-content:center;}
  .opt{position:relative;border-radius:16px;overflow:hidden;background:#0b1020;border:2px solid rgba(62,230,255,.18);
    cursor:pointer;aspect-ratio:3/4;transition:transform .1s var(--ease);}
  .opt:active{transform:scale(.97);}
  .opt img{width:100%;height:100%;object-fit:cover;object-position:50% 8%;display:block;pointer-events:none;}
  .opt .badge{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) scale(.4);font-size:54px;opacity:0;z-index:3;}
  .opt.correct{border-color:var(--c-green);box-shadow:0 0 0 3px var(--c-green),0 0 22px rgba(93,255,168,.55);}
  .opt.correct .badge.ok{opacity:1;transform:translate(-50%,-50%) scale(1);transition:all .25s var(--ease);}
  .opt.wrong{border-color:var(--c-red);animation:owrong .3s linear;}
  .opt.wrong .badge.no{opacity:1;transform:translate(-50%,-50%) scale(1);transition:all .2s var(--ease);}
  @keyframes owrong{25%{transform:translateX(-6px)}50%{transform:translateX(6px)}75%{transform:translateX(-4px)}}
  .opt.dim{opacity:.4;filter:grayscale(.5);}

  .flyt{position:fixed;left:50%;top:30%;transform:translate(-50%,-50%);font:900 22px var(--font-body);
    color:var(--c-green);z-index:30;opacity:0;pointer-events:none;text-shadow:0 2px 10px rgba(0,0,0,.6);}
  .flyt.go{animation:fly .8s var(--ease) forwards;}
  @keyframes fly{0%{opacity:0;transform:translate(-50%,-30%) scale(.7)}25%{opacity:1}100%{opacity:0;transform:translate(-50%,-130%) scale(1.2)}}
  .confetti{position:absolute;top:24%;width:9px;height:14px;border-radius:2px;z-index:24;pointer-events:none;
    transform:rotate(var(--r));animation:conf 1s ease-in forwards;}
  @keyframes conf{to{transform:translate(var(--x),64vh) rotate(calc(var(--r) + 540deg));opacity:0}}
  #flash{position:fixed;inset:0;pointer-events:none;opacity:0;z-index:20;transition:opacity .3s;}
  #flash.show{opacity:1;transition:opacity .04s;}
  #flash.green{background:radial-gradient(circle,rgba(93,255,168,.35),transparent 70%);}
  #flash.red{background:radial-gradient(circle,rgba(255,93,115,.4),transparent 70%);}
  .app.shake{animation:ashk .26s linear;}
  @keyframes ashk{20%{transform:translate(-6px,3px)}50%{transform:translate(6px,-3px)}80%{transform:translate(-3px,2px)}}

  /* panels */
  .panel{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:22px;z-index:40;background:radial-gradient(ellipse at 50% 35%,rgba(10,18,38,.62),rgba(10,18,38,.96));}
  .hero{width:150px;height:150px;border-radius:50%;object-fit:cover;border:3px solid var(--c-pink);
    box-shadow:0 0 30px rgba(255,93,177,.5);margin-bottom:6px;}
  .logo{font-family:var(--font-display);font-weight:700;font-size:clamp(26px,8vw,40px);line-height:1.05;letter-spacing:.03em;
    background:var(--rainbow);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 0 14px rgba(255,93,177,.4));}
  .logo2{font-size:clamp(16px,4.6vw,20px);color:var(--c-cyan);font-weight:800;margin-top:2px;letter-spacing:.1em;}
  .tag{margin-top:10px;font-size:clamp(13px,3.7vw,16px);color:var(--c-dim);max-width:360px;line-height:1.5;}
  .big{font-size:clamp(19px,5.6vw,26px);font-weight:800;color:var(--c-gold);margin-top:22px;animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{50%{transform:scale(1.07);opacity:.85}}
  .best{margin-top:14px;font-size:14px;color:var(--c-cyan);} .challenge{margin-top:6px;font-size:14px;font-weight:800;color:var(--c-pink);}
  .stat{font-size:clamp(16px,4.6vw,20px);margin-top:8px;color:#cdd6e8;} .stat b{color:var(--c-gold);}
  .btn{margin-top:16px;border:0;border-radius:14px;padding:15px 32px;font-size:17px;font-weight:800;cursor:pointer;
    background:linear-gradient(180deg,#ffd166,#e9a23b);color:#1a1405;box-shadow:0 6px 22px rgba(233,162,59,.35);}
  .btn:active{transform:scale(.96);}
  .btn.share{background:linear-gradient(180deg,#ff7bc4,#e0469b);color:#2a0a1d;}
  .btn.ghost{background:transparent;color:#cdd6e8;border:1px solid #46506b;box-shadow:none;font-weight:600;}
  .hidden{display:none!important;}
  #mute{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);inset-inline-end:12px;z-index:45;font-size:18px;
    background:var(--c-panel);border:1px solid var(--c-border);border-radius:10px;padding:6px 10px;color:var(--c-ink);}
  @media (prefers-reduced-motion:reduce){*{animation:none!important}}
</style>
</head>
<body>
<div class="app">
  <header>
    <a class="corner" id="back" href="../">‹ <span data-i18n="salon">Salon</span></a>
    <span class="wm">FABATOLLAH</span>
    <button class="corner" id="langCtl">עברית</button>
  </header>
  <div class="hudrow">
    <div class="score" id="score">0</div>
    <div class="combo" id="combo">x1</div>
    <div class="rounds" id="rounds"></div>
  </div>
  <div class="timer" id="timerWrap"><i id="timerBar"></i></div>
  <div class="scene" id="scene">
    <div class="emoji" id="sEmoji">🏳️‍🌈</div>
    <div class="ttl" id="sTitle">Pride Parade</div>
    <div class="sub" id="sSub"></div>
  </div>
  <div class="opts" id="opts"></div>
</div>

<button id="mute">🔊</button>
<div id="flash"></div>
<div class="flyt" id="flyt"></div>

<div class="panel" id="title">
  <img class="hero" src="../art/icon.webp" alt="Fabatollah">
  <div class="logo">FABATOLLAH</div>
  <div class="logo2">DRESS CODE ⏱️</div>
  <p class="tag" data-i18n="tag">The Ayatollah keeps getting invited out. Dress him for the occasion before the clock runs out!</p>
  <div class="big" id="startBtn" data-i18n="start">TAP TO START</div>
  <div class="best" id="bestLine" style="display:none"></div>
  <div class="challenge" id="challengeLine" style="display:none"></div>
</div>

<div class="panel hidden" id="dead">
  <div style="font-size:48px">⏱️</div>
  <div class="logo" style="font-size:clamp(22px,6.5vw,32px)" data-i18n="timeup">TIME'S UP, HONEY</div>
  <div class="stat" id="finalScore"></div>
  <div class="stat" id="statRounds"></div>
  <div class="stat" id="statStreak"></div>
  <div class="best" id="taunt" style="color:var(--c-pink);font-weight:800"></div>
  <div class="best" id="bestLine2"></div>
  <div class="challenge" id="beatLine" style="display:none"></div>
  <button class="btn" id="again" data-i18n="again">👗 Again</button>
  <button class="btn share" id="share" data-i18n="share">📤 Challenge a friend</button>
  <a class="btn ghost" href="../" data-i18n="salonBtn">‹ Salon</a>
</div>

<script>
'use strict';

/* ============ scenarios: occasion -> correct look ============ */
const LOOKS=['prideparade','discomullah','desertdiva','festival','cabaret','cowboy','angel','before','khamenei'];
const SCENES=[
 {e:'🏳️‍🌈',en:'Pride Parade',he:'מצעד הגאווה',ans:'prideparade',alt:['festival']},
 {e:'🥞',en:'Drag Brunch',he:'בראנץ׳ דראג',ans:'cabaret',alt:[]},
 {e:'🪩',en:'Disco Night',he:'ערב דיסקו',ans:'discomullah',alt:['festival']},
 {e:'🌵',en:'Desert Festival',he:'פסטיבל מדברי',ans:'desertdiva',alt:['festival']},
 {e:'🎭',en:'Cabaret Show',he:'מופע קברט',ans:'cabaret',alt:[]},
 {e:'🤠',en:'Tel Aviv Rodeo',he:'רודיאו תל אביב',ans:'cowboy',alt:[]},
 {e:'😇',en:'Angel Costume Party',he:'מסיבת מלאכים',ans:'angel',alt:[]},
 {e:'🏛️',en:'Address the UN',he:'נאום באו״ם',ans:'before',alt:['khamenei']},
 {e:'🕌',en:'Friday Sermon',he:'דרשת יום שישי',ans:'before',alt:['khamenei']},
 {e:'👑',en:'Met Gala: CAMP',he:'מט גאלה: קמפ',ans:'discomullah',alt:['desertdiva','cabaret']},
 {e:'🎤',en:'Eurovision Afterparty',he:'אפטר אירוויזיון',ans:'festival',alt:['discomullah']},
 {e:'🏖️',en:'Tel Aviv Beach Party',he:'מסיבת חוף ת״א',ans:'desertdiva',alt:['prideparade']},
 {e:'🖤',en:'Supreme Council Meeting',he:'ישיבת המועצה',ans:'khamenei',alt:['before']},
 {e:'✨',en:'Glitter Rave',he:'רייב נצנצים',ans:'festival',alt:['discomullah']},
 {e:'💒',en:'Gay Wedding',he:'חתונה גאה',ans:'prideparade',alt:['angel']},
 {e:'🛐',en:'Meet the Mullahs',he:'פגישת מולות',ans:'before',alt:['khamenei']}
];

/* ============ i18n ============ */
const I18N={
 en:{dir:'ltr',salon:'Salon',salonBtn:'‹ Salon',
  tag:'The Ayatollah keeps getting invited out. Dress him for the occasion before the clock runs out!',
  start:'TAP TO START',timeup:"TIME'S UP, HONEY",again:'👗 Again',share:'📤 Challenge a friend',
  whatwear:'What does he <b>wear?</b>',round:n=>'#'+n,
  best:s=>`🏆 Your best: ${s}`,challenge:n=>`⚔️ Beat ${n} to win!`,
  beatWin:'🏆 CHALLENGE WON!',beatLose:n=>`Challenge: ${n} — so close!`,
  fscore:s=>`Score: ${s}`,fround:n=>`👗 Looks nailed: ${n}`,fstreak:n=>`🔥 Best streak: ${n}`,
  taunts:[[0,'The fashion police are unbothered.'],[800,'A budding stylist! 💅'],[2000,'Vogue is calling. 📞'],[4000,'Anna Wintour fears you. 🕶️']],
  shareTxt:(s,r)=>`👗⏱️ FABATOLLAH: DRESS CODE — I styled the Ayatollah for ${r} occasions, scored ${s}! Beat me: https://miklatgames.fun/fabatollah/dresscode/?beat=${s}`,
  copied:'✅ Copied',plus:t=>`+${t.toFixed(1)}s`,nope:'NOPE!'},
 he:{dir:'rtl',salon:'סלון',salonBtn:'‹ סלון',
  tag:'האייתאללה מוזמן לכל מיני אירועים. תלבישו אותו לאירוע לפני שייגמר הזמן!',
  start:'הקישו כדי להתחיל',timeup:'נגמר הזמן, מותק',again:'👗 עוד פעם',share:'📤 אתגרו חבר',
  whatwear:'מה הוא <b>לובש?</b>',round:n=>'#'+n,
  best:s=>`🏆 השיא שלכם: ${s}`,challenge:n=>`⚔️ עברו ${n} כדי לנצח!`,
  beatWin:'🏆 ניצחתם באתגר!',beatLose:n=>`האתגר: ${n} — כמעט!`,
  fscore:s=>`ניקוד: ${s}`,fround:n=>`👗 לוקים מושלמים: ${n}`,fstreak:n=>`🔥 רצף שיא: ${n}`,
  taunts:[[0,'משטרת האופנה אדישה.'],[800,'סטייליסט מתחיל! 💅'],[2000,'ווג מתקשרים. 📞'],[4000,'אנה וינטור חוששת מכם. 🕶️']],
  shareTxt:(s,r)=>`👗⏱️ פבאטולה: דרס קוד — סטיילתי את האייתאללה ל-${r} אירועים, ניקוד ${s}! תנצחו אותי: https://miklatgames.fun/fabatollah/dresscode/?beat=${s}`,
  copied:'✅ הועתק',plus:t=>`+${t.toFixed(1)} ש׳`,nope:'לא!'}
};
let lang='en';
try{ const q=new URLSearchParams(location.search).get('lang'); const s=localStorage.getItem('miklat.lang');
  lang=(q==='he'||q==='en')?q:(s==='he'||s==='en')?s:((navigator.language||'en').startsWith('he')?'he':'en'); }catch(e){}
function applyLang(){ const t=I18N[lang]; document.documentElement.lang=lang; document.documentElement.dir=t.dir;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.getAttribute('data-i18n')]; if(typeof v==='string')el.textContent=v;});
  document.getElementById('langCtl').textContent=lang==='en'?'עברית':'EN';
  if(cur) renderScene();
  try{localStorage.setItem('miklat.lang',lang);}catch(e){} }
document.getElementById('langCtl').addEventListener('pointerdown',e=>{e.stopPropagation();lang=lang==='en'?'he':'en';applyLang();});

/* ============ audio ============ */
let AC=null,BUS=null,muted=false; try{muted=localStorage.getItem('dc.mute')==='1';}catch(e){}
function ac(){ if(!AC){try{AC=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}} if(AC&&AC.state==='suspended'){try{AC.resume();}catch(e){}} return AC; }
function bus(){ const a=ac(); if(!a)return null; if(!BUS){BUS=a.createDynamicsCompressor();BUS.connect(a.destination);} return BUS; }
function beep(f,dur,type,vol,delay){ if(muted)return; const a=ac(); if(!a)return;
  try{const t0=a.currentTime+(delay||0);const o=a.createOscillator(),g=a.createGain();o.type=type||'square';
   o.frequency.setValueAtTime(f,t0);g.gain.setValueAtTime(vol||.15,t0);g.gain.exponentialRampToValueAtTime(.001,t0+dur);
   o.connect(g).connect(bus()||a.destination);o.start(t0);o.stop(t0+dur);}catch(e){} }
function sYes(streak){ const b=523+Math.min(streak,12)*30; beep(b,.1,'square',.16); beep(b*1.5,.12,'square',.14,.08); }
function sNo(){ beep(220,.16,'sawtooth',.2); beep(150,.22,'sawtooth',.2,.1); }
function sTime(){ beep(330,.1,'triangle',.18); }
function vib(p){ try{if(navigator.vibrate)navigator.vibrate(p);}catch(e){} }
const muteBtn=document.getElementById('mute');
function applyMute(){ muteBtn.textContent=muted?'🔇':'🔊'; try{localStorage.setItem('dc.mute',muted?'1':'0');}catch(e){} }
muteBtn.addEventListener('pointerdown',e=>{e.stopPropagation();muted=!muted;applyMute();}); applyMute();

/* ============ helpers ============ */
function track(n){ try{if(window.goatcounter&&window.goatcounter.count)window.goatcounter.count({path:'evt-dc-'+n,event:true});}catch(e){} }
function flash(cls,ms){ const f=document.getElementById('flash'); f.className=cls+' show'; clearTimeout(f._t); f._t=setTimeout(()=>f.classList.remove('show'),ms||90); }
function shakeApp(){ const a=document.querySelector('.app'); a.classList.remove('shake'); void a.offsetWidth; a.classList.add('shake'); }
function confetti(n){ const cols=['#ff4d4d','#ff9f43','#ffd166','#5dffa8','#3ee6ff','#a25bff'],app=document.querySelector('.app');
  for(let k=0;k<n;k++){const s=document.createElement('div');s.className='confetti';s.style.left=(15+Math.random()*70)+'%';
   s.style.background=cols[k%cols.length];s.style.setProperty('--r',(Math.random()*360)+'deg');
   s.style.setProperty('--x',((Math.random()*2-1)*130).toFixed(0)+'px');app.appendChild(s);setTimeout(()=>s.remove(),1050);} }
function flyt(txt,color){ const f=document.getElementById('flyt'); f.textContent=txt; f.style.color=color||'#5dffa8';
  f.classList.remove('go'); void f.offsetWidth; f.classList.add('go'); }
function shuffle(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
// preload thumbs
LOOKS.forEach(k=>{ const im=new Image(); im.src='../art/thumb-'+k+'.webp'; });

/* ============ state ============ */
const TMAX=20;
let running=false, score=0, streak=0, bestStreak=0, rounds=0, remaining=16, lastT=0, cur=null, lock=false, recent=[], roundStart=0, raf=0;
let best=0; try{best=parseInt(localStorage.getItem('dc_best')||'0',10)||0;}catch(e){}
let beatTarget=0; try{const b=new URLSearchParams(location.search).get('beat');if(b)beatTarget=parseInt(b,10)||0;}catch(e){}

function levelN(){ return Math.floor(rounds/6)+1; }
function mult(){ return Math.min(1+Math.floor(streak/3),5); }

function pickScene(){
  let s, guard=0;
  do{ s=SCENES[Math.floor(Math.random()*SCENES.length)]; guard++; }while(recent.includes(s.en)&&guard<20);
  recent.push(s.en); if(recent.length>5)recent.shift();
  const good=new Set([s.ans,...(s.alt||[])]);
  const distract=shuffle(LOOKS.filter(l=>!good.has(l))).slice(0,3);
  const opts=shuffle([s.ans,...distract]);
  return {s,opts,ans:s.ans,good};
}
function renderScene(){
  if(!cur)return;
  const t=I18N[lang];
  document.getElementById('sEmoji').textContent=cur.s.e;
  document.getElementById('sTitle').textContent=cur.s[lang];
  document.getElementById('sSub').innerHTML=t.whatwear;
  document.getElementById('rounds').textContent=t.round(rounds+1);
}
function newRound(){
  cur=pickScene(); lock=false; roundStart=performance.now();
  renderScene();
  const sc=document.getElementById('scene'); sc.classList.remove('in'); void sc.offsetWidth; sc.classList.add('in');
  const wrap=document.getElementById('opts'); wrap.innerHTML='';
  cur.opts.forEach(id=>{
    const o=document.createElement('div'); o.className='opt'; o.dataset.id=id;
    o.innerHTML=`<img src="../art/thumb-${id}.webp" alt="" draggable="false"><div class="badge ok">✅</div><div class="badge no">❌</div>`;
    o.addEventListener('pointerdown',ev=>{ev.preventDefault();choose(id,o);});
    wrap.appendChild(o);
  });
}
function choose(id,el){
  if(!running||lock) return; lock=true;
  const t=I18N[lang];
  const correct=cur.good.has(id);
  if(correct){
    rounds++; streak++; if(streak>bestStreak)bestStreak=streak;
    const dt=performance.now()-roundStart;
    const speed=Math.max(0,Math.round(100*(1-Math.min(dt,3500)/3500)));
    const pts=(80+speed)*mult(); score+=pts;
    const bonus=Math.max(1.0, 2.4 - levelN()*0.12);
    remaining=Math.min(TMAX, remaining+bonus);
    el.classList.add('correct');
    flyt('+'+pts+'  '+t.plus(bonus),'#5dffa8');
    flash('green'); confetti(14); sYes(streak); vib(streak%4===0?[0,20,40,20]:18);
    hud(); track('hit');
    setTimeout(()=>{ if(running) newRound(); },520);
  } else {
    streak=0;
    remaining=Math.max(0, remaining-3.0);
    el.classList.add('wrong');
    // reveal the right one
    [...document.querySelectorAll('.opt')].forEach(o=>{ if(cur.good.has(o.dataset.id))o.classList.add('correct'); else if(o!==el)o.classList.add('dim'); });
    flyt(t.nope,'#ff5d73'); flash('red',140); shakeApp(); sNo(); vib([60,40,60]);
    hud(); track('miss');
    setTimeout(()=>{ if(running) newRound(); },850);
  }
}
function hud(){
  document.getElementById('score').textContent=score;
  const c=document.getElementById('combo'); c.textContent='x'+mult(); c.classList.toggle('on',mult()>1);
  c.classList.remove('bump'); void c.offsetWidth; c.classList.add('bump');
}

/* ============ timer loop ============ */
function loop(ts){
  if(!running) return;
  if(!lastT)lastT=ts;
  const dt=(ts-lastT)/1000; lastT=ts;
  if(!lock || true) remaining-=dt;          // clock always ticks
  if(remaining<=0){ remaining=0; gameOver(); return; }
  const pct=remaining/TMAX*100;
  document.getElementById('timerBar').style.width=Math.min(100,pct)+'%';
  document.getElementById('timerWrap').classList.toggle('low', remaining<5);
  raf=requestAnimationFrame(loop);
}

/* ============ flow ============ */
function start(){
  document.getElementById('title').classList.add('hidden');
  document.getElementById('dead').classList.add('hidden');
  running=true; score=0; streak=0; bestStreak=0; rounds=0; remaining=16; lastT=0; recent=[];
  hud(); newRound(); track('start');
  cancelAnimationFrame(raf); raf=requestAnimationFrame(loop);
}
function gameOver(){
  running=false; cancelAnimationFrame(raf);
  const t=I18N[lang];
  document.getElementById('finalScore').textContent=t.fscore(score);
  document.getElementById('statRounds').textContent=t.fround(rounds);
  document.getElementById('statStreak').textContent=t.fstreak(bestStreak);
  let msg=t.taunts[0][1]; for(const[thr,m] of t.taunts){ if(score>=thr)msg=m; }
  document.getElementById('taunt').textContent=msg;
  if(score>best){ best=score; try{localStorage.setItem('dc_best',''+best);}catch(e){} }
  document.getElementById('bestLine2').textContent=t.best(best);
  const bl=document.getElementById('beatLine');
  if(beatTarget>0){ bl.style.display=''; bl.textContent=score>beatTarget?t.beatWin:t.beatLose(beatTarget); }
  sTime();
  document.getElementById('dead').classList.remove('hidden');
  track('gameover-r'+rounds);
}

document.getElementById('title').addEventListener('pointerdown',e=>{ if(e.target.closest('#back,#langCtl,#mute'))return; ac(); start(); });
document.getElementById('again').addEventListener('pointerdown',e=>{e.stopPropagation();start();});
document.getElementById('share').addEventListener('pointerdown',async e=>{ e.stopPropagation();
  const t=I18N[lang], txt=t.shareTxt(score,rounds);
  try{ if(navigator.share){await navigator.share({text:txt});track('share');}
    else{await navigator.clipboard.writeText(txt);flyt(t.copied,'#3ee6ff');track('share-copy');} }catch(e){} });

(function(){ const t=I18N[lang];
  if(best>0){ const b=document.getElementById('bestLine'); b.style.display=''; b.textContent=t.best(best); }
  if(beatTarget>0){ const c=document.getElementById('challengeLine'); c.style.display=''; c.textContent=t.challenge(beatTarget); }
})();
applyLang(); track('open');
</script>
