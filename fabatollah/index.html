<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0a1226">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FABATOLLAH">
<link rel="manifest" href="manifest.webmanifest">
<meta property="og:title" content="FABATOLLAH — Pride makeover">
<meta property="og:description" content="It's Pride Month. Give the Supreme Leader the glow-up he deserves. Dress him, paint him, bedazzle him — make Fabatollah fabulous. Free, works in the shelter.">
<meta property="og:url" content="https://miklatgames.fun/fabatollah/">
<meta property="og:image" content="https://miklatgames.fun/og.jpg">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta name="twitter:card" content="summary_large_image">
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<title>FABATOLLAH 🏳️‍🌈 — Pride makeover</title>
<style>
  :root{
    --c-bg:#0a1226; --c-panel:#101b38; --c-panel-2:#16244a;
    --c-cyan:#3ee6ff; --c-gold:#ffd166; --c-pink:#ff5db1; --c-ink:#eaf2ff; --c-dim:#8da3cc;
    --c-border:rgba(62,230,255,.22); --c-border-strong:rgba(255,93,177,.55);
    --c-pink-wash:rgba(255,93,177,.10);
    --shadow-card:0 10px 30px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.04);
    --gradient-sky:radial-gradient(120% 90% at 50% -10%,#1c2350 0%,#121633 45%,#0a1226 100%);
    --font-display:"Courier New",ui-monospace,Menlo,Consolas,monospace;
    --font-body:"Heebo",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    --ease:cubic-bezier(.2,.7,.2,1);
    --rainbow:linear-gradient(90deg,#ff4d4d,#ff9f43,#ffd166,#5dffa8,#3ee6ff,#a25bff);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:var(--c-bg);overscroll-behavior:none;}
  body{color:var(--c-ink);font-family:var(--font-body);display:flex;justify-content:center;
    user-select:none;-webkit-user-select:none;}
  .app{width:100%;max-width:520px;min-height:100vh;background:var(--gradient-sky);
    display:flex;flex-direction:column;position:relative;}

  header{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 8px;}
  .back{color:var(--c-dim);text-decoration:none;font-size:13px;font-weight:700;
    background:var(--c-panel);border:1px solid var(--c-border);border-radius:999px;padding:8px 12px;}
  .brand{text-align:center;line-height:1;}
  .brand .nm{font-family:var(--font-display);font-weight:700;font-size:clamp(18px,5.4vw,24px);
    letter-spacing:.04em;text-transform:uppercase;
    background:var(--rainbow);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 10px rgba(255,93,177,.35));}
  .brand .alt{font-size:11px;color:var(--c-dim);margin-top:3px;}
  .ctl{min-width:40px;height:38px;display:inline-flex;align-items:center;justify-content:center;
    background:var(--c-panel);border:1px solid var(--c-border);border-radius:999px;
    color:var(--c-dim);font:700 12px var(--font-body);cursor:pointer;padding:0 12px;}
  .ctl:active{transform:scale(.96);}

  .tag{text-align:center;font-size:12.5px;line-height:1.4;color:var(--c-dim);padding:2px 18px 8px;}

  /* stage */
  .stage{position:relative;display:flex;align-items:center;justify-content:center;
    padding:4px 12px 6px;}
  .stage svg{width:auto;height:min(46vh,420px);max-width:100%;display:block;filter:drop-shadow(0 14px 26px rgba(0,0,0,.5));}
  .sparkle{position:absolute;font-size:22px;pointer-events:none;opacity:0;}

  /* meter */
  .meter{margin:2px 16px 6px;}
  .meter .row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:5px;}
  .meter .lbl{font-family:var(--font-display);font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--c-dim);}
  .meter .val{font-size:13.5px;font-weight:800;color:var(--c-pink);}
  .bar{height:12px;border-radius:999px;background:rgba(255,255,255,.07);overflow:hidden;
    border:1px solid var(--c-border);}
  .bar > i{display:block;height:100%;width:0;border-radius:999px;background:var(--rainbow);
    transition:width .35s var(--ease);box-shadow:0 0 12px rgba(255,93,177,.5);}

  /* tabs */
  .tabs{display:flex;gap:7px;overflow-x:auto;padding:6px 12px;scrollbar-width:none;}
  .tabs::-webkit-scrollbar{display:none;}
  .tab{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:2px;
    background:var(--c-panel);border:1px solid var(--c-border);border-radius:13px;
    color:var(--c-dim);font:700 10.5px var(--font-body);cursor:pointer;padding:7px 11px;min-width:58px;
    transition:all .12s var(--ease);}
  .tab .ic{font-size:18px;}
  .tab.on{border-color:var(--c-border-strong);background:var(--c-pink-wash);color:var(--c-pink);}
  .tab:active{transform:scale(.96);}

  /* panel */
  .panel{flex:1;min-height:118px;background:rgba(8,13,30,.55);
    border-top:1px solid var(--c-border);padding:12px 12px 6px;}
  .grp{margin-bottom:12px;}
  .grp h4{font-family:var(--font-display);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;
    color:var(--c-dim);margin-bottom:7px;}
  .chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{display:inline-flex;align-items:center;gap:6px;
    background:var(--c-panel);border:1px solid var(--c-border);border-radius:11px;
    color:var(--c-ink);font:600 12.5px var(--font-body);cursor:pointer;padding:8px 11px;
    transition:all .1s var(--ease);}
  .chip:active{transform:scale(.95);}
  .chip.on{border-color:var(--c-border-strong);background:var(--c-pink-wash);
    box-shadow:0 0 0 1px var(--c-border-strong),0 0 14px rgba(255,93,177,.25);color:#fff;}
  .chip .sw{width:15px;height:15px;border-radius:50%;border:1px solid rgba(255,255,255,.35);flex:0 0 auto;}
  .chip.preset{font-weight:800;}
  .chip.preset .em{font-size:15px;}

  /* actions */
  .actions{display:flex;gap:8px;padding:8px 12px calc(env(safe-area-inset-bottom,0px) + 12px);
    border-top:1px solid var(--c-border);background:rgba(8,13,30,.6);}
  .btn{flex:1;min-height:48px;border:0;border-radius:13px;font:800 14px var(--font-body);cursor:pointer;
    display:inline-flex;align-items:center;justify-content:center;gap:6px;}
  .btn:active{transform:scale(.97);}
  .btn.sec{background:var(--c-panel);border:1px solid var(--c-border);color:var(--c-ink);flex:0 0 auto;padding:0 14px;}
  .btn.surprise{background:var(--rainbow);color:#1a0a14;}
  .btn.share{background:linear-gradient(180deg,#ff7bc4,#e0469b);color:#2a0a1d;}

  #toast{position:fixed;left:50%;bottom:84px;transform:translateX(-50%) translateY(20px);
    background:var(--c-panel-2);border:1px solid var(--c-border-strong);border-radius:999px;
    color:#fff;padding:10px 20px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;
    transition:all .2s var(--ease);z-index:50;}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  *:focus-visible{outline:2px solid var(--c-pink);outline-offset:2px;}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="app">
  <header>
    <a class="back" href="../" id="back">‹ <span data-i18n="arcade">Arcade</span></a>
    <div class="brand">
      <div class="nm">FABATOLLAH</div>
      <div class="alt" data-i18n="sub">Pride makeover salon 🏳️‍🌈</div>
    </div>
    <button class="ctl" id="langCtl">עברית</button>
  </header>

  <p class="tag" data-i18n="tag">It's Pride Month. Give the Supreme Leader the glow-up he deserves — dress him, paint him, bedazzle him.</p>

  <div class="stage">
    <svg id="doll" viewBox="0 0 360 700" aria-label="Dress-up character">
      <defs>
        <linearGradient id="gRainbow" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ff4d4d"/><stop offset=".2" stop-color="#ff9f43"/>
          <stop offset=".4" stop-color="#ffd166"/><stop offset=".6" stop-color="#5dffa8"/>
          <stop offset=".8" stop-color="#3ee6ff"/><stop offset="1" stop-color="#a25bff"/>
        </linearGradient>
        <linearGradient id="gRainbowV" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#ff4d4d"/><stop offset=".2" stop-color="#ff9f43"/>
          <stop offset=".4" stop-color="#ffd166"/><stop offset=".6" stop-color="#5dffa8"/>
          <stop offset=".8" stop-color="#3ee6ff"/><stop offset="1" stop-color="#a25bff"/>
        </linearGradient>
        <linearGradient id="gGold" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#fff1b8"/><stop offset=".5" stop-color="#ffd700"/><stop offset="1" stop-color="#b8860b"/>
        </linearGradient>
        <linearGradient id="gDisco" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#ff4fd8"/><stop offset=".5" stop-color="#7a5cff"/><stop offset="1" stop-color="#3ee6ff"/>
        </linearGradient>
        <linearGradient id="gGlitter" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#f4f8ff"/><stop offset=".5" stop-color="#b9c4dc"/><stop offset="1" stop-color="#f4f8ff"/>
        </linearGradient>
        <pattern id="patFishnet" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
          <rect width="12" height="12" fill="none"/>
          <path d="M0 0H12M0 6H12M0 0V12M6 0V12" stroke="rgba(20,20,30,.85)" stroke-width="1.4"/>
        </pattern>
        <pattern id="patSequin" width="10" height="10" patternUnits="userSpaceOnUse">
          <circle cx="3" cy="3" r="2.4" fill="rgba(255,255,255,.55)"/>
          <circle cx="8" cy="8" r="2.4" fill="rgba(255,255,255,.25)"/>
        </pattern>
      </defs>
      <g id="dollG"></g>
    </svg>
    <div class="sparkle" id="spk1">✨</div>
    <div class="sparkle" id="spk2">💖</div>
    <div class="sparkle" id="spk3">🌈</div>
  </div>

  <div class="meter">
    <div class="row"><span class="lbl" data-i18n="meter">Fabulous meter</span><span class="val" id="meterVal">—</span></div>
    <div class="bar"><i id="meterBar"></i></div>
  </div>

  <div class="tabs" id="tabs"></div>
  <div class="panel" id="panel"></div>

  <div class="actions">
    <button class="btn surprise" id="surprise">✨ <span data-i18n="surprise">Surprise me</span></button>
    <button class="btn sec" id="reset" title="Reset">↺</button>
    <button class="btn share" id="share">📤 <span data-i18n="share">Share</span></button>
  </div>
</div>
<div id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';

/* ============================ geometry ============================ */
const SKIN='#e9b48a', SKIN_SH='#d39c70';
const ARM_L='M132 214 L106 300 L100 356', ARM_R='M228 214 L254 300 L260 356';
const ARM_SHORT_L='M132 214 L114 262', ARM_SHORT_R='M228 214 L246 262';
const LEG_L='M162 388 L154 528 L156 662', LEG_R='M198 388 L206 528 L204 662';
const TORSO='M122 210 Q180 192 238 210 L230 346 Q180 362 130 346 Z';
const PELVIS='M132 342 Q180 358 228 342 L224 396 Q180 412 136 396 Z';

/* ============================ state ============================ */
const DEFAULT={
  base:'elder',
  head:'turban_white',
  top:'tank', topColor:'#3a4a7a',
  bottom:'trousers', bottomColor:'#2a2f45',
  robe:'aba', robeColor:'#15182a',
  tattoo:'none',
  lips:'none', eyeshadow:'none', beard:'gray', glasses:'none', blush:false, gems:false,
  earrings:'none', necklace:'none', noseRing:false,
  boa:'none', flag:false, wings:false, gloves:false, fan:false
};
let state=Object.assign({},DEFAULT);

/* ============================ small svg helpers ============================ */
function stroke(d,color,w,extra=''){return `<path d="${d}" fill="none" stroke="${color}" stroke-width="${w}" stroke-linecap="round" stroke-linejoin="round" ${extra}/>`;}
function path(d,fill,extra=''){return `<path d="${d}" fill="${fill}" ${extra}/>`;}
function rainbowFill(v,base){ // resolve color tokens
  if(v==='rainbow')return 'url(#gRainbow)';
  if(v==='rainbowV')return 'url(#gRainbowV)';
  if(v==='gold')return 'url(#gGold)';
  if(v==='disco')return 'url(#gDisco)';
  if(v==='glitter')return 'url(#gGlitter)';
  return v||base;
}

/* ============================ body + face ============================ */
function body(){
  const bald = state.head==='bare'||state.head==='drag'||state.head==='wig_blonde';
  return `
    <!-- legs -->
    ${stroke(LEG_L,SKIN,30)}${stroke(LEG_R,SKIN,30)}
    <ellipse cx="156" cy="668" rx="20" ry="10" fill="${SKIN_SH}"/>
    <ellipse cx="204" cy="668" rx="20" ry="10" fill="${SKIN_SH}"/>
    <!-- arms -->
    ${stroke(ARM_L,SKIN,22)}${stroke(ARM_R,SKIN,22)}
    <circle cx="100" cy="360" r="13" fill="${SKIN}"/>
    <circle cx="260" cy="360" r="13" fill="${SKIN}"/>
    <!-- pelvis + torso + neck -->
    ${path(PELVIS,SKIN)}
    ${path(TORSO,SKIN)}
    <rect x="166" y="160" width="28" height="32" rx="10" fill="${SKIN}"/>
    <!-- ears -->
    <ellipse cx="132" cy="120" rx="10" ry="15" fill="${SKIN}"/>
    <ellipse cx="228" cy="120" rx="10" ry="15" fill="${SKIN}"/>
    <!-- head -->
    <ellipse cx="180" cy="116" rx="50" ry="58" fill="${SKIN}"/>
    ${face()}
  `;
}
function face(){
  const beardCol=rainbowFill(state.beard==='gray'?(state.base==='young'?'#5b4636':'#cfd6e2'):state.beard);
  const big = state.base!=='young';
  const beard = big
    ? 'M132 122 Q124 172 152 196 Q180 214 208 196 Q236 172 228 122 Q210 154 180 156 Q150 154 132 122 Z'
    : 'M138 128 Q134 164 156 184 Q180 196 204 184 Q226 164 222 128 Q206 150 180 152 Q154 150 138 128 Z';
  const mustache='M180 150 Q164 144 148 154 Q164 162 180 157 Q196 162 212 154 Q196 144 180 150 Z';
  const browCol = state.base==='young'?'#3a2a1c':'#8a93a5';
  return `
    <!-- brows -->
    ${path('M146 104 Q160 96 176 104 Q160 102 146 110 Z',browCol)}
    ${path('M214 104 Q200 96 184 104 Q200 102 214 110 Z',browCol)}
    <!-- eyes -->
    <ellipse cx="161" cy="118" rx="9" ry="6.5" fill="#fff"/>
    <ellipse cx="199" cy="118" rx="9" ry="6.5" fill="#fff"/>
    <circle cx="163" cy="119" r="4.2" fill="#2a1d12"/>
    <circle cx="197" cy="119" r="4.2" fill="#2a1d12"/>
    <circle cx="164.5" cy="117" r="1.3" fill="#fff"/>
    <circle cx="198.5" cy="117" r="1.3" fill="#fff"/>
    <!-- nose -->
    ${path('M180 122 Q174 136 178 142 Q180 144 182 142 Q186 136 180 122 Z',SKIN_SH)}
    <!-- beard + mustache -->
    ${path(beard,beardCol)}
    ${state.lips!=='none'?lipShape():''}
    ${path(mustache,beardCol)}
    ${makeup()}
  `;
}
function lipShape(){
  const c=state.lips;
  return `${path('M168 162 Q180 156 192 162 Q180 170 168 162 Z',c)}
          <path d="M170 162 Q180 159 190 162" stroke="rgba(255,255,255,.5)" stroke-width="1" fill="none"/>`;
}
function makeup(){
  let s='';
  if(state.eyeshadow!=='none'){
    s+=path('M150 110 Q161 102 173 110 Q161 107 150 114 Z',state.eyeshadow,'opacity=".75"');
    s+=path('M187 110 Q199 102 210 110 Q199 107 187 114 Z',state.eyeshadow,'opacity=".75"');
  }
  if(state.blush){
    s+='<ellipse cx="146" cy="134" rx="11" ry="7" fill="#ff6fb5" opacity=".5"/>';
    s+='<ellipse cx="214" cy="134" rx="11" ry="7" fill="#ff6fb5" opacity=".5"/>';
  }
  if(state.gems){
    s+=path('M150 130 l4 4 -4 4 -4 -4 z','#3ee6ff','opacity=".95"');
    s+=path('M156 122 l3 3 -3 3 -3 -3 z','#ff5db1','opacity=".95"');
  }
  if(state.glasses!=='none') s+=glasses(state.glasses);
  return s;
}
function glasses(v){
  const fr='#15151f';
  if(v==='round'){
    return `<g fill="rgba(20,20,30,.35)" stroke="${fr}" stroke-width="3">
      <circle cx="161" cy="118" r="15"/><circle cx="199" cy="118" r="15"/></g>
      <path d="M176 118 H184 M146 116 L132 112 M214 116 L228 112" stroke="${fr}" stroke-width="3" fill="none"/>`;
  }
  if(v==='heart'){
    const h=(cx)=>`M${cx} ${118+9} C${cx-15} ${118-6},${cx-15} ${118-14},${cx-5} ${118-12} C${cx-1} ${118-11},${cx} ${118-7},${cx} ${118-5} C${cx} ${118-7},${cx+1} ${118-11},${cx+5} ${118-12} C${cx+15} ${118-14},${cx+15} ${118-6},${cx} ${118+9} Z`;
    return `<g fill="rgba(255,80,160,.4)" stroke="#ff2e88" stroke-width="2.4">
      <path d="${h(161)}"/><path d="${h(199)}"/></g>
      <path d="M174 112 H186 M146 112 L132 108 M214 112 L228 108" stroke="#ff2e88" stroke-width="2.4" fill="none"/>`;
  }
  if(v==='star'){
    const st=(cx)=>{let p='';for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5,r=i%2?5:13;p+=(i?'L':'M')+(cx+r*Math.cos(a)).toFixed(1)+' '+(118+r*Math.sin(a)).toFixed(1)+' ';}return p+'Z';};
    return `<g fill="url(#gGold)" stroke="#b8860b" stroke-width="1.5">
      <path d="${st(161)}"/><path d="${st(199)}"/></g>`;
  }
  // cat-eye
  return `<g fill="rgba(20,20,30,.55)" stroke="${fr}" stroke-width="2.4">
    <path d="M144 116 Q161 106 180 114 Q176 126 158 126 Q146 126 144 116 Z"/>
    <path d="M216 116 Q199 106 180 114 Q184 126 202 126 Q214 126 216 116 Z"/></g>`;
}

/* ============================ tattoos (under clothes, on skin) ============================ */
function tattoo(){
  switch(state.tattoo){
    case 'heart': return path('M256 296 C248 288,248 282,254 282 C257 282,258 286,258 287 C258 286,259 282,262 282 C268 282,268 288,256 296 Z','url(#gRainbow)');
    case 'sleeve': return stroke(ARM_R,'url(#gRainbow)',9,'opacity=".6"');
    case 'star': { let p='';const cx=150,cy=140;for(let i=0;i<10;i++){const a=-Math.PI/2+i*Math.PI/5,r=i%2?3:7;p+=(i?'L':'M')+(cx+r*Math.cos(a)).toFixed(1)+' '+(cy+r*Math.sin(a)).toFixed(1)+' ';}return path(p+'Z','#ff2e88'); }
    case 'band': return '<rect x="98" y="250" width="8" height="20" rx="3" fill="url(#gRainbowV)" transform="rotate(14 102 260)"/>';
    case 'proud': return '<text x="258" y="300" font-family="Courier New,monospace" font-size="11" font-weight="700" fill="#ff2e88" transform="rotate(70 258 300)">PROUD</text>';
    default: return '';
  }
}

/* ============================ bottoms ============================ */
function bottom(){
  const c=state.bottomColor;
  switch(state.bottom){
    case 'briefs': return path('M134 360 Q180 374 226 360 L220 396 Q180 410 140 396 Z',c);
    case 'trousers': return stroke(LEG_L,c,34)+stroke(LEG_R,c,34)+pelvisCover(c);
    case 'jeans': return stroke(LEG_L,'#3a5a8c',34)+stroke(LEG_R,'#3a5a8c',34)+pelvisCover('#3a5a8c')+'<path d="M180 360 V412" stroke="#ffcf66" stroke-width="1.4" stroke-dasharray="3 3"/>';
    case 'leather': return stroke(LEG_L,'#171821',36)+stroke(LEG_R,'#171821',36)+pelvisCover('#171821')+'<path d="M156 460 q3 0 0 6 M204 460 q-3 0 0 6" stroke="rgba(255,255,255,.35)" stroke-width="3"/>';
    case 'leggings': return stroke(LEG_L,c,26)+stroke(LEG_R,c,26)+pelvisCover(c);
    case 'fishnetTights': return stroke(LEG_L,'url(#patFishnet)',30)+stroke(LEG_R,'url(#patFishnet)',30);
    case 'hotpants': return stroke('M162 388 L158 452',c,34)+stroke('M198 388 L202 452',c,34)+pelvisCover(c);
    case 'harem': return stroke('M162 388 L138 470 L152 530 L156 662',c,40)+stroke('M198 388 L222 470 L208 530 L204 662',c,40)+pelvisCover(c);
    case 'mini': return path('M126 366 Q180 380 234 366 L250 452 Q180 470 110 452 Z',c);
    case 'tutu': return `${path('M120 366 Q180 384 240 366 L264 444 Q180 466 96 444 Z','#ff8fd0')}
      ${path('M108 400 Q180 420 252 400 L270 452 Q180 476 90 452 Z','#ffb3e0','opacity=".85"')}`;
    case 'sequinSkirt': return path('M126 366 Q180 380 234 366 L250 452 Q180 470 110 452 Z',c)+path('M126 366 Q180 380 234 366 L250 452 Q180 470 110 452 Z','url(#patSequin)');
    default: return '';
  }
}
function pelvisCover(c){return path('M132 358 Q180 372 228 358 L226 398 Q180 414 134 398 Z',c);}

/* ============================ tops ============================ */
function sleeves(c,len){ // len: 'none' 'short' 'long'
  if(len==='short') return stroke(ARM_SHORT_L,c,26)+stroke(ARM_SHORT_R,c,26);
  if(len==='long') return stroke(ARM_L,c,26)+stroke(ARM_R,c,26);
  return '';
}
function topPiece(){
  const c=state.topColor;
  switch(state.top){
    case 'bare': return state.base==='young'?'':'<path d="M150 250 q6 10 12 0 M198 250 q6 10 12 0" stroke="#b98a64" stroke-width="2" fill="none" opacity=".5"/>';
    case 'tank': return path('M138 204 Q180 196 222 204 L228 346 Q180 362 132 346 Z',c);

const FAB_HEAD=['turban_rainbow','tiara','flower','drag','wig_blonde','cowboy','beret','fascinator','halo','party'];
const FAB_TOP=['fishnet','mesh','sequin','halter','crop','blouse'];
const FAB_BOTTOM=['mini','tutu','sequinSkirt','hotpants','fishnetTights','harem','leather'];
const FAB_ROBE=['rainbow','sequin','feather','sheer'];
function fabCount(){
  let n=0;
  if(FAB_HEAD.includes(state.head))n++;
  if(FAB_TOP.includes(state.top))n++;
  if(FAB_BOTTOM.includes(state.bottom))n++;
  if(state.robe!=='none' && (FAB_ROBE.includes(state.robe)||state.robeColor==='rainbow'))n++;
  ['lips','eyeshadow','glasses','earrings','necklace','boa'].forEach(k=>{if(state[k]!=='none')n++;});
  if(state.beard!=='gray')n++;
  ['blush','gems','noseRing','flag','wings','gloves','fan'].forEach(k=>{if(state[k])n++;});
  if(state.tattoo!=='none')n++;
  return n;
}
function updateMeter(){
  const n=fabCount(), max=18, pct=Math.min(100,Math.round(n/max*100));
  document.getElementById('meterBar').style.width=pct+'%';
  const t=I18N[lang], tiers=t.tiers;
  let idx=0;
  if(n>=14)idx=6; else if(n>=11)idx=5; else if(n>=8)idx=4; else if(n>=6)idx=3; else if(n>=4)idx=2; else if(n>=2)idx=1;
  document.getElementById('meterVal').textContent=tiers[idx];
}

let activeTab='preset';
function buildTabs(){
  const t=I18N[lang], el=document.getElementById('tabs'); el.innerHTML='';
  TABS.forEach(tab=>{
    const b=document.createElement('button');
    b.className='tab'+(tab.id===activeTab?' on':'');
    b.innerHTML=`<span class="ic">${tab.ic}</span><span>${t.tabs[tab.name]||tab.name}</span>`;
    b.onclick=()=>{activeTab=tab.id;buildTabs();buildPanel();};
    el.appendChild(b);
  });
}
function buildPanel(){
  const t=I18N[lang], tab=TABS.find(x=>x.id===activeTab), el=document.getElementById('panel');
  el.innerHTML='';
  tab.controls.forEach(ctrl=>{
    const grp=document.createElement('div'); grp.className='grp';
    if(ctrl.type==='preset'){
      grp.innerHTML=`<h4>${t.choose}</h4>`;
      const wrap=document.createElement('div'); wrap.className='chips';
      ctrl.items.forEach(it=>{
        const c=document.createElement('button'); c.className='chip preset';
        c.innerHTML=`<span class="em">${it.em}</span>${t.presets[it.id]||it.label}`;
        c.onclick=()=>applyPreset(it.id);
        wrap.appendChild(c);
      });
      grp.appendChild(wrap); el.appendChild(grp); return;
    }
    if(ctrl.type==='toggle'){
      const wrap=document.createElement('div'); wrap.className='chips';
      const c=document.createElement('button'); c.className='chip tgl'+(state[ctrl.key]?' on':'');
      c.dataset.key=ctrl.key; c.dataset.toggle='1';
      c.innerHTML=`<span>${ctrl.em||''}</span>${t.labels[ctrl.key]||ctrl.label}`;
      c.onclick=()=>{state[ctrl.key]=!state[ctrl.key];render();track('set-'+ctrl.key);};
      wrap.appendChild(c); grp.appendChild(wrap); el.appendChild(grp); return;
    }
    // pick
    grp.innerHTML=`<h4>${t.labels[ctrl.label]||ctrl.label}</h4>`;
    const wrap=document.createElement('div'); wrap.className='chips';
    ctrl.items.forEach(it=>{
      const c=document.createElement('button');
      c.className='chip'+(state[ctrl.key]===it.id?' on':'');
      c.dataset.key=ctrl.key; c.dataset.val=it.id;
      let sw='';
      if(it.sw){
        const bg = it.sw==='rainbow'?'var(--rainbow)':it.sw==='gold'?'linear-gradient(180deg,#fff1b8,#b8860b)':it.sw==='disco'?'linear-gradient(135deg,#ff4fd8,#3ee6ff)':it.sw==='glitter'?'linear-gradient(180deg,#f4f8ff,#b9c4dc)':it.sw;
        sw=`<span class="sw" style="background:${bg}"></span>`;
      }
      const lbl = it.label? (t.labels[it.label]!==undefined? t.labels[it.label] : it.label) : '';
      c.innerHTML=sw+(lbl?`<span>${lbl}</span>`:'');
      c.onclick=()=>{state[ctrl.key]=it.id;render();track('set-'+ctrl.key);};
      wrap.appendChild(c);
    });
    grp.appendChild(wrap); el.appendChild(grp);
  });
}
function syncChips(){
  document.querySelectorAll('#panel .chip').forEach(c=>{
    const k=c.dataset.key; if(!k)return;
    if(c.dataset.toggle) c.classList.toggle('on',!!state[k]);
    else if(c.dataset.val!==undefined) c.classList.toggle('on',state[k]===c.dataset.val);
  });
}

/* ============================ surprise / reset ============================ */
function rand(a){return a[Math.floor(Math.random()*a.length)];}
function surprise(){
  TABS.forEach(tab=>tab.controls.forEach(ctrl=>{
    if(ctrl.type==='pick'){ state[ctrl.key]=rand(ctrl.items).id; }
    else if(ctrl.type==='toggle'){ state[ctrl.key]=Math.random()<0.5; }
  }));
  // keep it wearable: ensure a top/bottom
  render(); burst(); track('surprise');
}
function reset(){state=Object.assign({},DEFAULT);render();track('reset');}

/* ============================ sparkle burst ============================ */
function burst(){
  ['spk1','spk2','spk3'].forEach((id,i)=>{
    const s=document.getElementById(id);
    s.style.transition='none'; s.style.opacity='0';
    s.style.left=(30+Math.random()*40)+'%'; s.style.top=(20+Math.random()*40)+'%';
    requestAnimationFrame(()=>{ s.style.transition='all .7s ease';
      setTimeout(()=>{s.style.opacity='1';s.style.transform='translateY(-30px) scale(1.4)';
        setTimeout(()=>{s.style.opacity='0';s.style.transform='none';},420);},i*90);});
  });
}

  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),2200);}

document.getElementById('share').onclick=async()=>{
  const txt=I18N[lang].shareTxt;

    else{await navigator.clipboard.writeText(txt);toast(I18N[lang].copied);track('share-copy');} }catch(e){}
};
