    <path d="M199 127 C184 121,184 113,194 113 C199 113,200 117,199 119 C200 117,201 113,206 113 C216 113,216 121,199 127 Z" fill="rgba(255,80,160,.5)" stroke="#ff2e88" stroke-width="2.4"/>
