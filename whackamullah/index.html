<style>
  :root{
    --c-bg:#0a1226; --c-panel:#101b38; --c-panel-2:#16244a;
    --c-cyan:#3ee6ff; --c-gold:#ffd166; --c-pink:#ff5db1; --c-red:#ff5d73; --c-green:#5dffa8;
    --c-ink:#eaf2ff; --c-dim:#8da3cc;
    --c-border:rgba(62,230,255,.22); --c-gold-border:rgba(255,209,102,.45);
    --gradient-sky:radial-gradient(120% 90% at 50% -10%,#1c2350 0%,#121633 45%,#0a1226 100%);
    --font-display:"Courier New",ui-monospace,Menlo,Consolas,monospace;
    --font-body:"Heebo",system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;
    --ease:cubic-bezier(.2,.7,.2,1);
    --rainbow:linear-gradient(90deg,#ff4d4d,#ff9f43,#ffd166,#5dffa8,#3ee6ff,#a25bff);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;touch-action:none;
    background:var(--c-bg);color:var(--c-ink);font-family:var(--font-body);
    user-select:none;-webkit-user-select:none;}
  body{display:flex;justify-content:center;}
  .app{width:100%;max-width:520px;height:100%;background:var(--gradient-sky);
    display:flex;flex-direction:column;position:relative;}

  /* HUD */
  .hud{display:flex;align-items:center;justify-content:space-between;gap:8px;
    padding:calc(env(safe-area-inset-top,0px) + 10px) 14px 6px;}
  .hud .score{font-family:var(--font-display);font-weight:700;font-size:26px;color:var(--c-gold);
    text-shadow:0 0 12px rgba(255,209,102,.5);min-width:86px;}
  .hud .combo{font-size:13px;font-weight:800;color:var(--c-pink);opacity:0;transition:opacity .15s;}
  .hud .combo.on{opacity:1;}
  .hud .lvl{font-family:var(--font-display);font-size:13px;letter-spacing:.06em;color:var(--c-cyan);
    border:1px solid var(--c-border);border-radius:999px;padding:5px 12px;background:var(--c-panel);}
  .strikes{display:flex;gap:6px;}
  .strikes span{font-size:18px;filter:drop-shadow(0 0 6px rgba(62,230,255,.5));transition:all .2s;}
  .strikes span.dead{filter:grayscale(1) brightness(.4);transform:scale(.85);}

  /* board */
  .board{flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
    padding:10px 14px calc(env(safe-area-inset-bottom,0px) + 14px);align-content:center;}
  .hole{position:relative;aspect-ratio:1;cursor:pointer;touch-action:none;}
  .pit{position:absolute;inset:0;border-radius:18px;overflow:hidden;
    background:radial-gradient(120% 100% at 50% 0%,#0d1530 0%,#070d20 70%);
    border:1px solid rgba(62,230,255,.14);box-shadow:inset 0 8px 18px rgba(0,0,0,.7);}
  .rim{position:absolute;left:8%;right:8%;bottom:6%;height:16%;border-radius:50%;
    background:#060b1a;box-shadow:0 2px 0 rgba(62,230,255,.10);}
  .med{position:absolute;left:11%;width:78%;bottom:4%;aspect-ratio:1;border-radius:50%;
    transform:translateY(118%);transition:transform .13s var(--ease);will-change:transform;
    pointer-events:none;}
  .med img{width:100%;height:100%;display:block;border-radius:50%;pointer-events:none;}
  .med.up{transform:translateY(6%);}
  .med.hit{animation:bonk .18s cubic-bezier(.3,1.6,.4,1) forwards;}
  @keyframes bonk{0%{transform:translateY(6%) scale(1.35,.6)}45%{transform:translateY(42%) scale(.72,1.24)}100%{transform:translateY(118%) scale(1,.42)}}
  .hole .fx{position:absolute;left:50%;top:38%;transform:translate(-50%,-50%);
    font:900 17px var(--font-body);pointer-events:none;opacity:0;z-index:5;white-space:nowrap;}
  .hole .fx.go{animation:floatUp .7s var(--ease) forwards;}
  @keyframes floatUp{0%{opacity:0;transform:translate(-50%,-30%) scale(.7);}
    25%{opacity:1;}100%{opacity:0;transform:translate(-50%,-150%) scale(1.25);}}
  .hole.shake-x{animation:hx .25s linear;}
  @keyframes hx{25%{transform:translateX(-5px)}50%{transform:translateX(5px)}75%{transform:translateX(-3px)}}
  .pit.bad{border-color:rgba(255,93,115,.7);box-shadow:inset 0 8px 18px rgba(0,0,0,.7),0 0 16px rgba(255,93,115,.5);}

  /* flashes */
  #flash{position:fixed;inset:0;pointer-events:none;opacity:0;transition:opacity .35s;z-index:30;}
  #flash.gold{background:radial-gradient(circle,rgba(255,209,102,.5),transparent 70%);}
  #flash.pink{background:radial-gradient(circle,rgba(255,93,177,.5),transparent 70%);}
  #flash.red{background:radial-gradient(circle,rgba(255,93,115,.4),transparent 70%);}
  #flash.show{opacity:1;transition:opacity .05s;}

  #banner{position:fixed;left:50%;top:34%;transform:translate(-50%,-50%) scale(.7);z-index:25;
    font-family:var(--font-display);font-weight:700;font-size:34px;letter-spacing:.08em;color:var(--c-cyan);
    text-shadow:0 0 22px rgba(62,230,255,.8);opacity:0;pointer-events:none;}
  #banner.go{animation:ban 1s var(--ease) forwards;}
  @keyframes ban{15%{opacity:1;transform:translate(-50%,-50%) scale(1.06);}
    70%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-80%) scale(1);}}

  /* panels */
  .panel{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;z-index:40;
    background:radial-gradient(ellipse at 50% 35%,rgba(10,18,38,.6),rgba(10,18,38,.95));}
  .logo{font-family:var(--font-display);font-weight:700;font-size:clamp(30px,9vw,46px);line-height:1.05;
    letter-spacing:.04em;background:var(--rainbow);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,93,177,.4));}
  .tag{margin-top:10px;font-size:clamp(13px,3.7vw,16px);color:var(--c-dim);max-width:380px;line-height:1.5;}
  .rules{margin-top:16px;display:flex;flex-direction:column;gap:9px;font-size:clamp(13px,3.6vw,15px);}
  .rules div{display:flex;align-items:center;gap:10px;background:var(--c-panel);border:1px solid var(--c-border);
    border-radius:12px;padding:8px 14px;}
  .rules img{width:34px;height:34px;border-radius:50%;}
  .rules b{color:var(--c-gold);}
  .rules .no b{color:var(--c-pink);}
  .big{font-size:clamp(19px,5.6vw,26px);font-weight:800;color:var(--c-gold);margin-top:24px;animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{50%{transform:scale(1.07);opacity:.85}}
  .best{margin-top:14px;font-size:14px;color:var(--c-cyan);}
  .challenge{margin-top:8px;font-size:14px;font-weight:800;color:var(--c-pink);}
  .stat{font-size:clamp(15px,4.4vw,19px);margin-top:9px;color:#cdd6e8;}
  .stat b{color:var(--c-gold);}
  .btn{margin-top:16px;border:0;border-radius:14px;padding:15px 34px;font-size:17px;font-weight:800;cursor:pointer;
    background:linear-gradient(180deg,#ffd166,#e9a23b);color:#1a1405;box-shadow:0 6px 22px rgba(233,162,59,.35);}
  .btn:active{transform:scale(.96);}
  .btn.share{background:linear-gradient(180deg,#ff7bc4,#e0469b);color:#2a0a1d;}
  .btn.ghost{background:transparent;color:#cdd6e8;border:1px solid #46506b;box-shadow:none;font-weight:600;}
  .hidden{display:none!important;}
  .corner{position:fixed;top:calc(env(safe-area-inset-top,0px) + 10px);z-index:45;font-size:13px;font-weight:700;
    background:var(--c-panel);border:1px solid var(--c-border);border-radius:999px;padding:8px 13px;color:var(--c-dim);
    text-decoration:none;cursor:pointer;}
  #back{inset-inline-start:12px;}
  #mute{inset-inline-end:12px;}
  #toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:60;
    background:var(--c-panel-2);border:1px solid rgba(255,93,177,.55);border-radius:999px;color:#fff;
    padding:10px 20px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s;}
  #toast.show{opacity:1;}

  /* ---- juice: particles, ring, reactions, confetti, shake ---- */
  .app.shake{animation:appshake .26s linear;}
  @keyframes appshake{20%{transform:translate(-6px,3px)}40%{transform:translate(6px,-4px)}60%{transform:translate(-4px,-2px)}80%{transform:translate(4px,3px)}}
  .hud .combo.bump{animation:cbump .22s var(--ease);}
  @keyframes cbump{40%{transform:scale(1.4)}}
  .ring{position:absolute;left:50%;top:42%;width:42%;aspect-ratio:1;border-radius:50%;border:3px solid #dfe7ff;
    transform:translate(-50%,-50%) scale(.2);opacity:.9;pointer-events:none;z-index:6;animation:ringOut .32s ease-out forwards;}
  .ring.kh{border-color:var(--c-gold);border-width:4px;} .ring.ally{border-color:var(--c-pink);}
  @keyframes ringOut{to{transform:translate(-50%,-50%) scale(2.3);opacity:0;}}
  .spark{position:absolute;left:50%;top:40%;font-size:18px;pointer-events:none;z-index:7;
    transform:translate(-50%,-50%);animation:sparkOut .43s ease-out forwards;}
  @keyframes sparkOut{to{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(.35) rotate(120deg);opacity:0;}}
  .react{position:absolute;left:50%;top:30%;transform:translate(-50%,-50%);font-size:26px;pointer-events:none;z-index:8;}
  .react.dizzy{animation:rdizzy .6s linear forwards;}
  @keyframes rdizzy{0%{opacity:0}20%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) rotate(360deg);}}
  .react.fly{animation:rfly .5s ease-out forwards;}
  @keyframes rfly{0%{opacity:1;transform:translate(-50%,-50%) rotate(0)}100%{opacity:0;transform:translate(18px,-92px) rotate(220deg);}}
  .react.ko{animation:rko .45s ease forwards;}
  @keyframes rko{0%{opacity:0;transform:translate(-50%,-50%) scale(.4)}45%{opacity:1;transform:translate(-50%,-50%) scale(1.3)}100%{opacity:1;transform:translate(-50%,-50%) scale(1)}}
  .confetti{position:absolute;top:28%;width:9px;height:14px;border-radius:2px;z-index:24;pointer-events:none;
    transform:rotate(var(--r));animation:conf 1s ease-in forwards;}
  @keyframes conf{to{transform:translate(var(--x),62vh) rotate(calc(var(--r) + 540deg));opacity:0;}}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="app">

  <a class="btn ghost" href="../" data-i18n="backArc">‹ Arcade</a>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script>
'use strict';
/* ================= i18n ================= */
const I18N={
 en:{dir:'ltr',arcade:'Arcade',
  tag:'The regime pops up — bonk it. But the fabulous ones are family now. Hands off!',
  r1:'Stern mullah — <b>BONK! +10</b>',
  r2:"The Supreme One — <b>+50</b>, he's quick",
  r3:'Fabulous = ally — <b>don\'t touch!</b>',
  start:'TAP TO START',over:'THE REGIME GOT YOU',again:'🔨 Again',share:'📤 Challenge a friend',backArc:'‹ Arcade',
  best:s=>`🏆 Your best: ${s}`,
  challenge:n=>`⚔️ Beat ${n} to win the challenge!`,
  beatWin:'🏆 CHALLENGE WON!',beatLose:n=>`Challenge: ${n} — so close!`,
  score:s=>`Score: ${s}`,bonk:n=>`🔨 Regime bonked: ${n}`,spare:n=>`🏳️‍🌈 Allies protected: ${n}`,lvl:n=>`📶 Reached level ${n}`,
  ally:'🏳️‍🌈 ALLY!',escape:'ESCAPED!',lvlup:n=>'LEVEL '+n,
  yelps:['OOF!','AY!','OW!','BONK!'],ko:'KO! 😵',mega:'💥 MEGA BONK!',khTaunt:'Too slow! 🐌',
  allyKiss:'Hands off, honey! 💅',allyPose:'Rude! 💁‍♀️',onFire:'🔥 ON FIRE!',
  milestone:n=>`${n} bonked! 🔨`,
  taunts:[[0,'The Basij are laughing. 😈'],[80,'Not bad for a civilian. 🫡'],[200,'The regime is sweating. 😰'],[400,'Khamenei noted your address. 🚪'],[700,'A national threat. To turbans. 👑']],
  shareTxt:(s,b,p)=>`🔨 WHACK-A-MULLAH: I bonked ${b} regime mullahs, protected ${p} fabulous allies, scored ${s}. Beat me: https://miklatgames.fun/whackamullah/?beat=${s}`,
  copied:'✅ Copied'},
 he:{dir:'rtl',arcade:'ארקייד',
  tag:'המשטר קופץ — תרביצו! אבל הפאבולוסים הם משפחה עכשיו. לא לגעת!',
  r1:'מולה קודר — <b>בום! ‎+10</b>',
  r2:'העליון בעצמו — <b>‎+50</b>, הוא זריז',
  r3:'פאבולוס = בעל ברית — <b>אסור לגעת!</b>',
  start:'הקישו כדי להתחיל',over:'המשטר ניצח אתכם',again:'🔨 עוד פעם',share:'📤 אתגרו חבר',backArc:'‹ ארקייד',
  best:s=>`🏆 השיא שלכם: ${s}`,
  challenge:n=>`⚔️ עברו ${n} כדי לנצח באתגר!`,
  beatWin:'🏆 ניצחתם באתגר!',beatLose:n=>`האתגר: ${n} — כמעט!`,
  score:s=>`ניקוד: ${s}`,bonk:n=>`🔨 הרבצתם למשטר: ${n}`,spare:n=>`🏳️‍🌈 הגנתם על בעלי ברית: ${n}`,lvl:n=>`📶 הגעתם לשלב ${n}`,
  ally:'🏳️‍🌈 בעל ברית!',escape:'ברח!',lvlup:n=>'שלב '+n,
  yelps:['אוי!','איי!','אאוץ׳!','בום!'],ko:'נוקאאוט! 😵',mega:'💥 בום ענק!',khTaunt:'לאט מדי! 🐌',
  allyKiss:'לא לגעת, מותק! 💅',allyPose:'חוצפה! 💁‍♀️',onFire:'🔥 בוערים!',
  milestone:n=>`${n} ספגו! 🔨`,
  taunts:[[0,'הבסיג׳ צוחקים. 😈'],[80,'לא רע לאזרח. 🫡'],[200,'המשטר מזיע. 😰'],[400,'חמינאי רשם את הכתובת. 🚪'],[700,'איום לאומי. על מצנפות. 👑']],
  shareTxt:(s,b,p)=>`🔨 וואק-א-מולה: הרבצתי ל-${b} מולות של המשטר, הגנתי על ${p} פאבולוסים, ניקוד ${s}. תנצחו אותי: https://miklatgames.fun/whackamullah/?beat=${s}`,
  copied:'✅ הועתק'}
};
let lang='en';
try{ const q=new URLSearchParams(location.search).get('lang'); const s=localStorage.getItem('miklat.lang');
  lang=(q==='he'||q==='en')?q:(s==='he'||s==='en')?s:((navigator.language||'en').startsWith('he')?'he':'en'); }catch(e){}
function applyLang(){
  const t=I18N[lang]; document.documentElement.lang=lang; document.documentElement.dir=t.dir;
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t[el.getAttribute('data-i18n')];
    if(typeof v==='string'){ if(/<b>/.test(v)) el.innerHTML=v; else el.textContent=v; }});
}
applyLang();

/* ================= audio (lazy WebAudio, no files) ================= */
let AC=null, muted=false;
try{muted=localStorage.getItem('wm.mute')==='1';}catch(e){}
let BUS=null;
function ac(){ if(!AC){ try{AC=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
  if(AC&&AC.state==='suspended'){ try{AC.resume();}catch(e){} } return AC; }
function bus(){ const a=ac(); if(!a)return null; if(!BUS){ BUS=a.createDynamicsCompressor(); BUS.connect(a.destination); } return BUS; }
function beep(f,dur,type,vol,delay){ if(muted)return; const a=ac(); if(!a)return;
  try{ const t0=a.currentTime+(delay||0); const o=a.createOscillator(), g=a.createGain();
    o.type=type||'square'; o.frequency.setValueAtTime(f,t0);
    g.gain.setValueAtTime(vol||.15,t0); g.gain.exponentialRampToValueAtTime(.001,t0+dur);
    o.connect(g).connect(bus()||a.destination); o.start(t0); o.stop(t0+dur);}catch(e){} }
function noise(dur,vol,delay){ if(muted)return; const a=ac(); if(!a)return;
  try{ const t0=a.currentTime+(delay||0); const n=Math.max(1,Math.floor(a.sampleRate*dur));
    const buf=a.createBuffer(1,n,a.sampleRate); const ch=buf.getChannelData(0);
    for(let i=0;i<n;i++) ch[i]=(Math.random()*2-1)*(1-i/n);
    const s=a.createBufferSource(); s.buffer=buf; const g=a.createGain(); g.gain.value=vol||.08;
    const f=a.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1300;
    s.connect(f).connect(g).connect(bus()||a.destination); s.start(t0);}catch(e){} }
function sBonk(streak){ beep(300+Math.min(streak,20)*40,.09,'square',.16); beep(92,.07,'triangle',.16); noise(.05,.07); }
function sKham(){ beep(523,.09,'square',.2); beep(659,.09,'square',.2,.07); beep(784,.16,'square',.2,.14); noise(.08,.1); }
function sBoing(){ if(muted)return; const a=ac(); if(!a)return;
  try{ const t0=a.currentTime; const o=a.createOscillator(), g=a.createGain(); o.type='sawtooth';
    o.frequency.setValueAtTime(200,t0); o.frequency.exponentialRampToValueAtTime(540,t0+.16);
    g.gain.setValueAtTime(.16,t0); g.gain.exponentialRampToValueAtTime(.001,t0+.2);
    o.connect(g).connect(bus()||a.destination); o.start(t0); o.stop(t0+.22);}catch(e){} }
function sWomp(){ beep(220,.16,'sawtooth',.2); beep(140,.22,'sawtooth',.2,.1); }
function sEsc(){ beep(110,.18,'triangle',.22); }
function sLvl(){ [440,554,659,880].forEach((f,i)=>beep(f,.1,'square',.16,i*.08)); }
function vib(p){ try{ if(navigator.vibrate) navigator.vibrate(p); }catch(e){} }
const muteBtn=document.getElementById('mute');
function applyMute(){ muteBtn.textContent=muted?'🔇':'🔊'; try{const m=document.getElementById('music'); if(muted)m.pause(); else if(running){const p=m.play();if(p&&p.catch)p.catch(()=>{});}}catch(e){} try{localStorage.setItem('wm.mute',muted?'1':'0');}catch(e){} }
muteBtn.addEventListener('pointerdown',e=>{e.stopPropagation();muted=!muted;applyMute();});
applyMute();

/* ================= analytics + helpers ================= */
function track(n){ try{ if(window.goatcounter&&window.goatcounter.count) window.goatcounter.count({path:'evt-wm-'+n,event:true}); }catch(e){} }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show');
  clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2200); }
function flash(cls,ms){ const f=document.getElementById('flash'); f.className=cls+' show';
  clearTimeout(f._t); f._t=setTimeout(()=>f.classList.remove('show'),ms||70); }
function banner(txt){ const b=document.getElementById('banner'); b.textContent=txt;
  b.classList.remove('go'); void b.offsetWidth; b.classList.add('go'); }

/* ================= level curve (team spec) ================= */
const LEVELS=[
  {iv:950, up:1300,sim:2,fab:.15,kh:0},
  {iv:850, up:1200,sim:2,fab:.18,kh:.05},
  {iv:760, up:1050,sim:3,fab:.22,kh:.06},
  {iv:680, up:920, sim:3,fab:.25,kh:.07},
  {iv:600, up:820, sim:4,fab:.28,kh:.08},
  {iv:540, up:730, sim:4,fab:.30,kh:.08},
  {iv:490, up:670, sim:4,fab:.30,kh:.08},
  {iv:450, up:610, sim:4,fab:.30,kh:.08}
];
const FABS=['prideparade','discomullah','desertdiva','festival','cabaret','cowboy','angel'];

/* ================= board ================= */
const board=document.getElementById('board');
const holes=[];
for(let i=0;i<9;i++){
  const h=document.createElement('div'); h.className='hole';
  h.innerHTML=`<div class="pit"><div class="rim"></div><div class="med"><img alt="" draggable="false"></div></div><div class="fx"></div>`;
  board.appendChild(h);
  holes.push({el:h, med:h.querySelector('.med'), img:h.querySelector('img'), pit:h.querySelector('.pit'),
    fx:h.querySelector('.fx'), type:null, hit:false, downT:0, lockUntil:0, retreating:0, graceT:0});
  h.addEventListener('pointerdown',ev=>{ev.preventDefault(); whack(i);});
}
document.addEventListener('touchstart',e=>{ if(e.target.closest('.board'))e.preventDefault(); },{passive:false});

/* ================= game state ================= */
let running=false, score=0, streak=0, sternStreak=0, strikes=0, correct=0, bonked=0, _fabSeen=0, fabWhacked=0, freezeUntil=0;
let spawnTimer=null, lastLevel=1;
function fabSpawnedTotal(){ return _fabSeen; }
let best=0; try{ best=parseInt(localStorage.getItem('wm_best')||'0',10)||0; }catch(e){}
let beatTarget=0; try{ const b=new URLSearchParams(location.search).get('beat'); if(b)beatTarget=parseInt(b,10)||0; }catch(e){}

function levelIdx(){ return Math.min(Math.floor(correct/10), LEVELS.length-1); }
function mult(){ return Math.min(1+Math.floor(streak/5), 4); }
function L(){ return LEVELS[levelIdx()]; }

function hud(){
  document.getElementById('score').textContent=score;
  const c=document.getElementById('combo'); c.textContent='x'+mult(); c.classList.toggle('on',mult()>1);
  document.getElementById('lvl').textContent='LV '+(levelIdx()+1);
  const s=document.getElementById('strikes').children;
  for(let i=0;i<3;i++) s[i].classList.toggle('dead', i<strikes);
}

/* ================= juice helpers ================= */
function particles(h, kind){
  const ring=document.createElement('div'); ring.className='ring'+(kind==='kh'?' kh':kind==='ally'?' ally':'');
  h.el.appendChild(ring); setTimeout(()=>ring.remove(),320);
  const sets={stern:['💢','✦','💨'],kh:['✨','⭐','✦','💫'],ally:['💔','✨','💕']};
  const arr=sets[kind]||sets.stern, n=kind==='kh'?9:kind==='ally'?7:6;
  for(let k=0;k<n;k++){ const s=document.createElement('span'); s.className='spark'; s.textContent=arr[k%arr.length];
    const a=Math.random()*6.283, d=40+Math.random()*44;
    s.style.setProperty('--dx',(Math.cos(a)*d).toFixed(0)+'px'); s.style.setProperty('--dy',(Math.sin(a)*d).toFixed(0)+'px');
    h.el.appendChild(s); setTimeout(()=>s.remove(),440); }
}
function reactEmoji(h, emoji, cls){ const e=document.createElement('div'); e.className='react '+(cls||'');
  e.textContent=emoji; h.el.appendChild(e); setTimeout(()=>e.remove(),620); }
function popText(h, txt, color){ const e=document.createElement('div'); e.className='fx'; e.style.color=color||'#fff';
  e.style.fontSize='14px'; e.style.top='18%'; e.textContent=txt; h.el.appendChild(e);
  void e.offsetWidth; e.classList.add('go'); setTimeout(()=>e.remove(),720); }
function confetti(n){ const cols=['#ff4d4d','#ff9f43','#ffd166','#5dffa8','#3ee6ff','#a25bff'], app=document.querySelector('.app');
  for(let k=0;k<n;k++){ const s=document.createElement('div'); s.className='confetti';
    s.style.left=(18+Math.random()*64)+'%'; s.style.background=cols[k%cols.length];
    s.style.setProperty('--r',(Math.random()*360)+'deg'); s.style.setProperty('--x',((Math.random()*2-1)*130).toFixed(0)+'px');
    app.appendChild(s); setTimeout(()=>s.remove(),1050); } }
function shakeApp(){ const a=document.querySelector('.app'); a.classList.remove('shake'); void a.offsetWidth; a.classList.add('shake'); }
function comboBump(){ const c=document.getElementById('combo'); c.classList.remove('bump'); void c.offsetWidth; c.classList.add('bump'); }
function freeze(ms){ const n=performance.now(); if(n+ms>freezeUntil) freezeUntil=n+ms; }

/* ================= spawn / retreat ================= */
function upCount(){ return holes.filter(h=>h.type).length; }
function freeHoles(){ return holes.map((h,i)=>h.type?-1:i).filter(i=>i>=0); }
function pickType(){
  const l=L(), r=Math.random();
  if(r<l.fab) return 'fab';
  if(r<l.fab+l.kh) return 'kh';
  return 'stern';
}
function spawnOne(){
  const free=freeHoles(); if(!free.length || upCount()>=L().sim) return;
  const i=free[Math.floor(Math.random()*free.length)], h=holes[i];
  const type=pickType();
  if(type==='fab') _fabSeen++;
  h.type=type; h.hit=false; h.retreating=0; clearTimeout(h.graceT);
  h.img.src='art/'+(type==='kh'?'khamenei':type==='stern'?'before':FABS[Math.floor(Math.random()*FABS.length)])+'.webp';
  h.med.classList.remove('hit'); h.med.classList.add('up');
  const l=L();
  const uptime = type==='kh'? l.up*0.6 : type==='fab'? l.up+200 : l.up;
  h.retreatAt=performance.now()+uptime;
  h.downT=setTimeout(()=>retreat(i), uptime);
}
function retreat(i){
  const h=holes[i]; if(!h.type || h.hit) return;
  h.med.classList.remove('up');                 // start sliding down
  h.retreating=performance.now();
  clearTimeout(h.graceT);
  h.graceT=setTimeout(()=>{                      // 130ms grace: a tap during the slide still counts
    h.retreating=0; if(h.hit) return;
    const ty=h.type; h.type=null;
    setTimeout(()=>{ if(!h.type) h.img.removeAttribute('src'); },120);
    if(!running) return;
    if(ty==='stern') strike('escape', h);
    else if(ty==='kh') popText(h, I18N[lang].khTaunt, '#ffd166');   // Supreme One escapes — taunt, no strike
  },130);
}
function tick(){
  if(!running) return;
  spawnOne();
  const dbl=Math.min(.15+levelIdx()*.06, .5);    // multi-touch pressure ramps with level
  if(Math.random()<dbl) spawnOne();
  const extra=Math.max(0, freezeUntil-performance.now());
  spawnTimer=setTimeout(tick, L().iv+extra);
}

/* ================= whack ================= */
function whack(i){
  if(!running) return;
  const h=holes[i], now=performance.now();
  if(now<h.lockUntil) return;
  if(!h.type || h.hit){ return; }                 // h.type stays set through the 130ms grace, so late taps land
  h.hit=true; clearTimeout(h.downT); clearTimeout(h.graceT); h.retreating=0;
  const t=I18N[lang];
  if(h.type==='fab'){                              // whacked an ally — strike + comedy
    fabWhacked++; h.type=null; sternStreak=0;
    h.med.classList.remove('up');
    h.lockUntil=now+250;
    h.pit.classList.add('bad'); setTimeout(()=>h.pit.classList.remove('bad'),350);
    const pose=Math.random()<.5;
    float(h, pose?t.allyPose:t.allyKiss, '#ff5db1', 15);
    reactEmoji(h, pose?'💁‍♀️':'💋');
    particles(h,'ally'); flash('pink'); sWomp(); vib([50,50,50]);
    strike('ally', h);
    return;
  }
  const isKh=h.type==='kh';
  h.type=null;
  streak++; correct++;
  const pts=(isKh?50:10)*mult();
  score+=pts; bonked++;
  h.med.classList.add('hit');
  setTimeout(()=>{ h.med.classList.remove('up','hit'); setTimeout(()=>{if(!h.type)h.img.removeAttribute('src');},150); },180);
  if(isKh){                                        // THE SUPREME ONE — jackpot
    sternStreak=0;
    float(h, '+'+pts, '#ffd166', 30);
    banner(t.mega); particles(h,'kh'); confetti(20);
    flash('gold'); shakeApp(); sKham(); sBoing(); vib([0,30,20,30,20,60]); freeze(80);
  } else {                                         // stern regime mullah
    sternStreak++;
    float(h, '+'+pts, '#5dffa8', 18+Math.min(streak,12));
    particles(h,'stern');
    if(sternStreak%3===0) reactEmoji(h, '😵', 'ko');
    else if(Math.random()<.55) reactEmoji(h, Math.random()<.5?'💫':'🌀', Math.random()<.5?'dizzy':'fly');
    if(Math.random()<.3) popText(h, t.yelps[Math.floor(Math.random()*t.yelps.length)], '#eaf2ff');
    sBonk(streak); vib(15); freeze(45);
    if(streak===5||streak===10||streak===15) vib([0,25,40,25]);
    if(streak>=10) shakeApp();
  }
  if(mult()>1) comboBump();
  if(mult()>=3 && streak%5===0) banner(t.onFire);
  if(bonked%25===0){ banner(t.milestone(bonked)); confetti(14); }
  const li=levelIdx()+1;
  if(li>lastLevel){ lastLevel=li; banner(t.lvlup(li)); sLvl(); track('level-'+li); }
  hud();
}
function float(h, txt, color, size){
  h.fx.textContent=txt; h.fx.style.color=color; h.fx.style.fontSize=(size||17)+'px';
  h.fx.classList.remove('go'); void h.fx.offsetWidth; h.fx.classList.add('go');
}
function strike(kind, h){
  if(!running) return;
  streak=0; sternStreak=0; strikes++;
  if(kind==='escape'){ flash('red',120); sEsc(); if(h)popText(h, I18N[lang].escape, '#ff5d73'); }
  hud();
  if(strikes>=3) gameOver();
}

/* ================= flow ================= */
function clearBoard(){
  holes.forEach((h,i)=>{ clearTimeout(h.downT); h.type=null; h.hit=false;
    h.med.classList.remove('up','hit'); h.img.removeAttribute('src'); });
}
function start(){
  document.getElementById('title').classList.add('hidden');
  document.getElementById('dead').classList.add('hidden');
  clearBoard();
  running=true; score=0; streak=0; sternStreak=0; strikes=0; correct=0; bonked=0; _fabSeen=0; fabWhacked=0; freezeUntil=0; lastLevel=1;
  hud();
  clearTimeout(spawnTimer);
  spawnTimer=setTimeout(tick, 600);
  try{const m=document.getElementById('music'); if(!muted){m.currentTime=0; const p=m.play(); if(p&&p.catch)p.catch(()=>{});}}catch(e){}
  track('start');
}
function gameOver(){
  running=false; clearTimeout(spawnTimer); clearBoard();
  try{document.getElementById('music').pause();}catch(e){}
  const t=I18N[lang];
  const spared=Math.max(0, (fabSpawnedTotal()-fabWhacked));
  document.getElementById('finalScore').textContent=t.score(score);
  document.getElementById('statBonk').textContent=t.bonk(bonked);
  document.getElementById('statSpare').textContent=t.spare(spared);
  document.getElementById('statLevel').textContent=t.lvl(lastLevel);
  let msg=t.taunts[0][1]; for(const [thr,m] of t.taunts){ if(score>=thr) msg=m; }
  document.getElementById('taunt').textContent=msg;
  if(score>best){ best=score; try{localStorage.setItem('wm_best',''+best);}catch(e){} }
  document.getElementById('bestLine2').textContent=t.best(best);
  const bl=document.getElementById('beatLine');
  if(beatTarget>0){ bl.style.display='';
    bl.textContent = score>beatTarget ? t.beatWin : t.beatLose(beatTarget); }
  document.getElementById('dead').classList.remove('hidden');
  track('gameover-l'+lastLevel);
}

document.getElementById('title').addEventListener('pointerdown',e=>{ if(e.target.closest('#back,#mute'))return; ac(); start(); });
document.getElementById('again').addEventListener('pointerdown',e=>{e.stopPropagation(); start();});
document.getElementById('share').addEventListener('pointerdown',async e=>{
  e.stopPropagation();
  const t=I18N[lang], spared=Math.max(0,(fabSpawnedTotal()-fabWhacked));
  const txt=t.shareTxt(score,bonked,spared);
  try{ if(navigator.share){ await navigator.share({text:txt}); track('share'); }
    else{ await navigator.clipboard.writeText(txt); toast(t.copied); track('share-copy'); } }catch(e){}
});

/* title extras */
(function(){
  const t=I18N[lang];
  if(best>0){ const b=document.getElementById('bestLine'); b.style.display=''; b.textContent=t.best(best); }
  if(beatTarget>0){ const c=document.getElementById('challengeLine'); c.style.display=''; c.textContent=t.challenge(beatTarget); }
})();
track('open');
</script>
<script data-goatcounter="https://miklat-games.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
