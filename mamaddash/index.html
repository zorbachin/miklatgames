<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#0b0e1a">

<title>MAMAD DASH 🚨</title>
<style>
  :root{ --navy:#0b0e1a; --gold:#ffd166; --teal:#7ee8c7; --red:#ff5d5d; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none;touch-action:none;
    background:var(--navy);font-family:-apple-system,'Segoe UI',Roboto,sans-serif;color:#e8ecf6;
    user-select:none;-webkit-user-select:none;}
  #wrap{position:fixed;inset:0;}
  #wrap.shake{animation:shk .3s linear;}
  @keyframes shk{0%,100%{transform:none}20%{transform:translate(-7px,4px)}40%{transform:translate(6px,-5px)}
    60%{transform:translate(-5px,-3px)}80%{transform:translate(4px,5px)}}
  canvas{display:block;width:100%;height:100%;}
  #flash{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;transition:opacity .5s;}
  .panel{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:24px;z-index:10;background:radial-gradient(ellipse at 50% 35%,rgba(11,14,26,.55),rgba(11,14,26,.92));}
  #title{background:linear-gradient(rgba(11,14,26,.45),rgba(11,14,26,.86)),url('art/keyart.webp') center/cover;}
  .logo{font-size:clamp(38px,11vw,72px);font-weight:900;letter-spacing:.02em;line-height:1;
    background:linear-gradient(180deg,#ffe29a,#e9a23b);-webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 4px 18px rgba(233,162,59,.35));}
  .tag{margin-top:10px;font-size:clamp(13px,3.6vw,17px);color:#aab4c8;max-width:420px;line-height:1.45;}
  .big{font-size:clamp(20px,6vw,30px);font-weight:800;color:var(--gold);margin-top:26px;animation:pulse 1.1s ease-in-out infinite;}
  @keyframes pulse{50%{transform:scale(1.07);opacity:.85}}
  .controls{margin-top:16px;font-size:clamp(12px,3.4vw,14px);color:#aab4c8;
    display:flex;gap:18px;justify-content:center;}
  .controls b{color:var(--teal);}
  .btn{margin-top:14px;border:0;border-radius:14px;padding:15px 34px;font-size:17px;font-weight:800;cursor:pointer;
    background:linear-gradient(180deg,#ffd166,#e9a23b);color:#1a1405;box-shadow:0 6px 22px rgba(233,162,59,.35);}
  .btn:active{transform:scale(.96);}
  .btn.ghost{background:transparent;color:#cdd6e8;border:1px solid #46506b;box-shadow:none;font-weight:600;}
  .stat{font-size:clamp(15px,4.2vw,18px);margin-top:8px;color:#cdd6e8;}
  .stat b{color:var(--gold);}
  .best{margin-top:18px;font-size:14px;color:var(--teal);}
  #dead .skull{font-size:54px;}
  #mute{position:fixed;bottom:calc(env(safe-area-inset-bottom,0px) + 12px);right:12px;z-index:20;font-size:20px;
    background:rgba(13,17,32,.55);border:1px solid #2a3450;border-radius:10px;padding:6px 10px;color:#e8ecf6;}
  .hidden{display:none!important;}
</style>

<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<div id="flash"></div>
<button id="mute">🔊</button>

<div class="panel" id="title">
  <div class="logo">MAMAD DASH</div>
  <div class="tag" id="titleTag">🚨 The siren is live. Jump the savtas, duck the doves, stack shekels — and reach the mamad before the boom.</div>
  <div class="controls"><span><b>TAP</b> jump</span><span><b>SWIPE ↓</b> duck</span></div>
  <div class="big">TAP TO RUN ▶</div>
  <div class="best" id="titleBest"></div>
</div>

<div class="panel hidden" id="dead">
  <div class="skull">💥</div>
  <div class="logo" style="font-size:clamp(28px,8vw,46px);">CAUGHT OUTSIDE</div>
  <div class="tag" id="dNear" style="color:#ff8a8a;font-weight:700;"></div>
  <div class="stat" style="margin-top:18px;">🚨 Sirens survived: <b id="dSirens">0</b></div>
  <div class="stat">💸 Shekels stacked: <b id="dCoins">0₪</b></div>
  <div class="stat">🏃 Distance: <b id="dDist">0m</b></div>
  <div class="best" id="dBest"></div>
  <div class="best" id="dChal" style="color:#ffd166;"></div>
  <button class="btn hidden" id="reviveBtn">🪙 CONTINUE −100₪</button>
  <button class="btn" id="againBtn">RUN AGAIN ▶</button>
  <button class="btn ghost" id="shareBtn">📤 CHALLENGE A FRIEND</button>
</div>

<script>
'use strict';
/* ============ MAMAD DASH — standalone siren runner ============
   One file, mobile-first. Tap = jump, swipe down = duck.
   Endless waves: each siren is a dash to the mamad; survive, breathe,
   the next one is faster and denser. Caught outside = run over. */

const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>v<a?a:v>b?b:v;
const rand=(a,b)=>a+Math.random()*(b-a);
const irand=(a,b)=>Math.floor(rand(a,b+1));
let userActed=false;
const buzz=p=>{try{userActed&&navigator.vibrate&&navigator.vibrate(p)}catch(e){}};

/* ---------------- sound (WebAudio, built on first gesture) ---------------- */
const Sound={
  ctx:null, bus:null, on:localStorage.getItem('md_mute')!=='1', sirenNodes:null,
  init(){ if(!this.ctx){ try{ this.ctx=new (window.AudioContext||window.webkitAudioContext)();
      this.bus=this.ctx.createDynamicsCompressor(); this.bus.connect(this.ctx.destination);
    }catch(e){} }
    if(this.ctx&&this.ctx.state==='suspended') this.ctx.resume(); },
  beep(f,d,type='square',g=.05,slide=0,when=0){
    if(!this.on||!this.ctx) return;
    const o=this.ctx.createOscillator(),v=this.ctx.createGain(),t=this.ctx.currentTime+when;
    o.type=type;o.frequency.setValueAtTime(f,t);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(40,f+slide),t+d);
    v.gain.setValueAtTime(g,t);v.gain.exponentialRampToValueAtTime(.0001,t+d);
    o.connect(v).connect(this.bus||this.ctx.destination);o.start(t);o.stop(t+d);
  },
  jump(){this.beep(620,.1,'square',.04,300);},
  duck(){this.beep(300,.09,'square',.035,-120);},
  door(){this.beep(523,.1,'square',.05);this.beep(784,.16,'square',.05,0,.09);},
  coin(n=0){ const m=Math.pow(2,Math.min(n,12)/12);              // combo climbs the scale
    this.beep(1318*m,.06,'square',.04);this.beep(1760*m,.09,'square',.04,0,.055);},
  power(){this.beep(880,.08,'square',.05);this.beep(1175,.08,'square',.05,0,.07);
    this.beep(1568,.14,'square',.05,0,.14);},
  alert(){this.beep(932,.14,'square',.05);this.beep(932,.14,'square',.05,0,.2);},
  pulse(u){this.beep(85+u*40,.09,'square',.016+.014*u);},        // heartbeat under the run
  hit(){this.beep(140,.22,'sawtooth',.08,-60);},
  boom(){if(!this.on||!this.ctx)return;
    const b=this.ctx.createBuffer(1,this.ctx.sampleRate*.5,this.ctx.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2.2);
    const s=this.ctx.createBufferSource(),v=this.ctx.createGain();s.buffer=b;
    v.gain.value=.22;s.connect(v).connect(this.bus||this.ctx.destination);s.start();},
  sirenStart(){
    if(!this.on||!this.ctx||this.sirenNodes) return;
    const o=this.ctx.createOscillator(),v=this.ctx.createGain(),l=this.ctx.createOscillator(),lg=this.ctx.createGain();
    o.type='triangle';o.frequency.value=660;l.frequency.value=.55;lg.gain.value=160;
    l.connect(lg).connect(o.frequency);v.gain.value=.035;
    o.connect(v).connect(this.bus||this.ctx.destination);o.start();l.start();
    this.sirenNodes={o,l,v};
  },
  sirenStop(){ if(this.sirenNodes){ try{this.sirenNodes.o.stop();this.sirenNodes.l.stop();}catch(e){} this.sirenNodes=null; } },
};
$('mute').textContent=Sound.on?'🔊':'🔇';
$('mute').addEventListener('click',e=>{ e.stopPropagation();
  Sound.on=!Sound.on; localStorage.setItem('md_mute',Sound.on?'0':'1');
  $('mute').textContent=Sound.on?'🔊':'🔇'; if(!Sound.on) Sound.sirenStop(); });

/* ---------------- canvas ---------------- */
const cv=$('cv'),cx=cv.getContext('2d');
let W=0,H=0,DPR=1,groundY=0,SAFE_TOP=0,clearCaches=()=>{};
// probe env(safe-area-inset-top) so the HUD clears the notch in standalone mode
const saProbe=document.createElement('div');
saProbe.style.cssText='position:fixed;top:0;left:0;width:1px;height:env(safe-area-inset-top,0px);visibility:hidden;pointer-events:none;';
document.body.appendChild(saProbe);
function resize(){
  DPR=Math.min(2,window.devicePixelRatio||1);
  W=window.innerWidth;H=window.innerHeight;
  SAFE_TOP=saProbe.offsetHeight||0;
  cv.width=W*DPR;cv.height=H*DPR;cx.setTransform(DPR,0,0,DPR,0,0);
  cx.lineJoin='round';                     // text outlines: no miter spikes
  groundY=Math.round(H*.74);
  clearCaches();
}
window.addEventListener('resize',resize);resize();

/* sprite caches — emoji glyph rasterization and gradients are the two
   biggest per-frame costs on low-end phones; render each once. */
const EMO=new Map(), GLOWS=new Map();
function drawEmoji(e,x,y,s){
  const k=e+'|'+(s|0);
  let c=EMO.get(k);
  if(!c){
    c=document.createElement('canvas');
    const pad=Math.ceil(s*1.5);
    c.width=Math.ceil(pad*DPR);c.height=Math.ceil(pad*DPR);c._w=pad;
    const g=c.getContext('2d');g.scale(DPR,DPR);
    g.font=s+'px "Apple Color Emoji","Segoe UI Emoji","Noto Color Emoji",sans-serif';
    g.textAlign='center';g.textBaseline='middle';
    g.fillText(e,pad/2,pad/2);
    EMO.set(k,c);
  }
  cx.drawImage(c,x-c._w/2,y-c._w/2,c._w,c._w);
}
function glow(col,size){             // pre-rendered radial glow sprite
  const k=col+'|'+size;
  let c=GLOWS.get(k);
  if(!c){
    c=document.createElement('canvas');c.width=c.height=size*2;
    const g=c.getContext('2d');
    const r=g.createRadialGradient(size,size,size*.12,size,size,size);
    r.addColorStop(0,col);r.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=r;g.fillRect(0,0,size*2,size*2);
    GLOWS.set(k,c);
  }
  return c;
}
const STRIPS=new Map(), SKYG=new Map();
clearCaches=()=>{EMO.clear();GLOWS.clear();STRIPS.clear();SKYG.clear();};
/* hand-drawn sprites — graceful fallback to emoji while loading / if absent */
const ART={};
for(const n of ['run1','run2','jump','duck','tumble','savta-nu','savta-cart',
  'door','pow-star','pow-magnet','pow-time']){
  const i=new Image(); i.src='art/'+n+'.png'; ART[n]=i;
}
for(const n of ['bg-beach','bg-florentin','bg-oldnorth','bg-night']){
  const i=new Image(); i.src='art/'+n+'.webp'; ART[n]=i;
}
const artOk=n=>{const i=ART[n];return i&&i.complete&&i.naturalWidth>0;};
function drawArt(n,x,y,h,flip){
  const i=ART[n], w=h*i.naturalWidth/i.naturalHeight;
  cx.save();cx.translate(x,y);if(flip)cx.scale(-1,1);
  cx.drawImage(i,-w/2,-h/2,w,h);cx.restore();
}

/* ---------------- waves: every siren is a different hood ----------------
   ground = JUMP (gold ring) · air = DUCK (teal ring). No emoji in both
   sets within a theme. */
const THEMES=[
  {name:'GORDON BEACH', bg:'bg-beach', sky:['#37b6ff','#8fd8ff','#ffd9a8'], far:'#cfe0f0', near:'#f4ecdd',
   street:'#7b6f93', win:'rgba(38,166,200,', night:false,
   ground:['👵','⛱️','🐕','🦀','🛟'], air:['🏐','🪁','🕊️','🥏']},
  {name:'FLORENTIN', bg:'bg-florentin', sky:['#ff9d5c','#ffc187','#ffe6ae'], far:'#e8c2a8', near:'#f9e3c4',
   street:'#8a6f80', win:'rgba(210,80,140,', night:false,
   ground:['👵','🛒','🐈','📦','🛹'], air:['🕊️','🍾','🛸','🥏']},
  {name:'THE OLD NORTH', bg:'bg-oldnorth', sky:['#9d7bea','#e89ad6','#ffc2a0'], far:'#cdbde6', near:'#ece2f6',
   street:'#6f6090', win:'rgba(255,170,60,', night:false,
   ground:['👵','🐩','🛴','🪴','🛒'], air:['🕊️','☂️','🥐','🪁']},
  {name:'NIGHT RUN', bg:'bg-night', sky:['#0d1330','#272350','#583a64'], far:'#1d2440', near:'#2c3458',
   street:'#3d3850', win:'rgba(255,209,102,', night:true,
   ground:['👵','🐈‍⬛','🗑️','🛵','📦'], air:['🦇','🕊️','🍾','🛸']},
];
const THEME=()=>THEMES[(Math.max(1,G.wave)-1)%THEMES.length];

/* ---------------- game state ---------------- */
const PLAYER_X=()=>Math.round(W*.24);
const G={
  state:'title',           // title | run | inside | dead
  wave:0, dist:0, coins:0, t:0,
  best:JSON.parse(localStorage.getItem('md_best')||'{"sirens":0,"coins":0}'),
  player:{y:0,vy:0,duckT:0,land:0},
  speed:0, prog:0, goal:0, deadline:0, total:0,
  obs:[], picks:[], pows:[], nextOb:0, nextCoin:0, nextPow:-1,
  hits:0, stumble:0, invuln:0, shieldFlash:0,
  star:0, magnet:0, banner:null, sirenOn:false,
  jbuf:0, freeze:0, nextPulse:0, combo:0, lastCoin:-9, starHits:0,
  daily:null, revived:false, vCarry:0, nextPow2:-1,
  insideT:0, tutorial:!localStorage.getItem('md_best'),
  rockets:[], pops:[], confetti:[], fly:[],
};
// pacing v2: waves are longer, so old bests deflate — rescale once
if(!localStorage.getItem('md_v2')){
  if(G.best.sirens>0){ G.best.sirens=Math.max(1,Math.round(G.best.sirens*.65));
    localStorage.setItem('md_best',JSON.stringify(G.best)); }
  localStorage.setItem('md_v2','1');
}
const POP_COLS=['#ffd166','#7ee8c7','#ff8ad4','#8ad2ff'];
function pop(x,y,txt,col,big){ G.pops.push({x,y,txt,col:col||'#ffd166',t:0,big:!!big}); }
function burstConfetti(n){
  for(let i=0;i<n;i++) G.confetti.push({x:rand(0,W),y:rand(-H*.2,H*.3),
    vx:rand(-40,40),vy:rand(150,330),rot:rand(0,6),vr:rand(-6,6),
    col:POP_COLS[i%POP_COLS.length],s:rand(5,10)});
}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296}}
/* world randomness — seedable for dailies. Obstacles and coins get
   INDEPENDENT streams: their spawn thresholds interleave in frame-time-
   dependent order, so sharing one stream desyncs runs. Power-up rolls are
   drawn up-front at wave start for the same reason. */
let WRo=Math.random, WRc=Math.random;
const wrandO=(a,b)=>a+WRo()*(b-a), wirandO=(a,b)=>Math.floor(wrandO(a,b+1));
const wrandC=(a,b)=>a+WRc()*(b-a);
function waveCfg(n){            // n = 1-based wave number
  const mar=n>1&&n%4===0;                      // every 4th siren is a marathon
  const v1=Math.min(720,470+(n-1)*26);         // …frantic finish keeps climbing
  return {
    goal: Math.min(7500,3400+(n-1)*620)*(mar?2.5:1),
    v0:   Math.min(v1-90,240+(n-1)*14),        // floor only — carryover overrides
    v1,
    obGap:[Math.max(195,330-(n-1)*9), Math.max(285,520-(n-1)*14)],
    airP: Math.min(.5,.2+(n-1)*.035),
    pairP:n>=8?Math.min(.3,.08+(n-8)*.03):0,   // post-8: double-obstacle combos
    slack:Math.min(.84,.76+Math.max(0,n-8)*.012)+(mar?.02:0),
    marathon:mar,
  };
}
function startWave(){
  G.wave++; const c=waveCfg(G.wave); G.cfg=c;
  // speed carries over between sirens (14% relief dip, never a full reset)
  if(G.wave>1) c.v0=clamp(G.vCarry*.86,c.v0,c.v1-60);
  G.prog=0; G.goal=c.goal; G.obs=[]; G.picks=[]; G.pows=[]; G.rockets=[];
  clearTimeout(G.deathTimer);
  G.nextOb=(G.tutorial&&!G.daily)?420:520; G.nextCoin=750;   // dailies: identical spacing for everyone
  if(G.daily){
    WRo=mulberry32(G.daily*2654435761+G.wave*97);
    WRc=mulberry32(G.daily*1779033703+G.wave*101);
    const wp=mulberry32(G.daily*3144134277+G.wave*89);
    G.powKind=Math.floor(wp()*3); G.powLift=Math.floor(wp()*2);
    G.nextPow=c.goal*(.3+wp()*.25);
  } else {
    WRo=Math.random; WRc=Math.random;
    G.powKind=irand(0,2); G.powLift=irand(0,1);
    G.nextPow=c.goal*rand(.3,.55);          // one power-up per wave, mid-run
  }
  G.hits=0; G.stumble=0; G.invuln=0; G.star=0; G.magnet=0; G.sirenOn=false; G.freeze=0;
  G.jbuf=0; G.combo=0; G.starHits=0; G.confetti.length=0; G.fly.length=0;
  G.nextPulse=G.t+1.2;
  G.player.y=0; G.player.vy=0; G.player.duckT=0;
  G.banner={t:0,txt:`📍 ${THEME().name}`,
    sub:c.marathon?`SIREN #${G.wave} — LONG ONE. RUN.`:`SIREN #${G.wave}`};
  G.nextPow2=c.marathon?c.goal*.7:-1;          // marathons guarantee a late ⌛
  // budget: clean run uses ~76% of the clock early, ~84% late
  const avg=(c.v0+c.v1)/2; G.total=Math.min(42,(c.goal/avg)/c.slack); G.deadline=G.t+G.total;
  G.state='run'; Sound.alert();             // chirp now — the wail waits for the last 3s
  buzz([90,60,90]);
}
function enterMamad(){
  Sound.sirenStop(); Sound.door();
  G.vCarry=G.speed;                       // momentum survives the door
  G.state='inside'; G.insideT=.6; G.shieldFlash=1;   // a beat, not a freeze
  G.perfect=G.hits===0;
  if(G.perfect){ G.coins+=15; G.insideT=.8; }
  burstConfetti(G.perfect?32:20);
  G.rockets.push({x:rand(W*.15,W*.5),y:H*.55,t:0});   // iron dome intercept show
  setTimeout(()=>{ Sound.boom(); flash(.55); shake(); buzz(160); },400);
  if(G.tutorial){ G.tutorial=false; }
}
/* ---------------- death cam: savta judges you ---------------- */
const DEATH_LINES=['NU, BAALI…','Your savta made it. You didn\'t.',
  'The hummus survived. You did not.','At least you got it on film 📱',
  'She climbs 4 floors with no elevator. You had ONE job.',
  'Bituach Leumi cannot help you now.'];
function die(){
  Sound.sirenStop(); Sound.boom(); flash(.85); shake();
  buzz([60,40,220]);
  G.state='deathcam'; G.deathT=0;
  G.obs=G.obs.filter(o=>Math.abs(o.x-PLAYER_X())>240);   // no photobombing savtas
  G.deathLine=DEATH_LINES[irand(0,DEATH_LINES.length-1)];
  G.ragdoll={x:PLAYER_X(),y:groundY-G.player.y-30,vx:150,vy:-460,rot:0};
  clearTimeout(G.deathTimer); G.deathTimer=setTimeout(showDeathPanel,2300);
}
function showDeathPanel(){
  if(G.state!=='deathcam') return;
  G.state='dead'; G.deadAt=G.t;
  const sirens=G.wave-1, nb={sirens:Math.max(G.best.sirens,sirens), coins:Math.max(G.best.coins,G.coins)};
  const isBest=sirens>G.best.sirens;
  G.best=nb; localStorage.setItem('md_best',JSON.stringify(nb));
  const m=Math.max(1,Math.round((G.goal-G.prog)/10));
  $('dNear').textContent=`${m}m from the mamad door 💔`;
  $('dSirens').textContent=sirens;
  $('dCoins').textContent=G.coins+'₪';
  $('dDist').textContent=Math.round(G.dist/10)+'m';
  $('dBest').textContent=isBest?'🏆 NEW BEST!':
    (nb.sirens>0&&nb.sirens-sirens<=1&&sirens>0)?`SO CLOSE — best is ${nb.sirens} sirens. One more run.`:
    `Best: ${nb.sirens} sirens · ${nb.coins}₪`;
  if(G.daily){
    const k='md_daily_'+G.daily, prev=+(localStorage.getItem(k)||0);

function flash(o){ const f=$('flash');f.style.transition='none';f.style.opacity=o;

/* ---------------- input: tap = jump · swipe down = duck ---------------- */
function jump(){ const p=G.player;
  if(G.state!=='run') return;
  if(p.y<=0&&G.stumble<=0){ p.vy=720; p.duckT=0; Sound.jump(); }
  else if(p.y>0) G.jbuf=.12;     // buffer a tap landing within 120ms — never eat it
}
function duck(){ const p=G.player;
  if(G.state!=='run') return;
  if(p.y>0){ p.vy=-980; p.duckT=.6; Sound.duck(); }   // mid-air: slam down into a duck
  else { p.duckT=.55; Sound.duck(); } }
function primary(){          // any tap: start / jump / skip cam / restart
  userActed=true;
  if(G.state==='title'){ Sound.init(); $('title').classList.add('hidden');
    resetRun(WANT_DAILY?dayNum():null); }
  else if(G.state==='run') jump();
  else if(G.state==='deathcam'&&G.deathT>.8) showDeathPanel();
  else if(G.state==='dead'&&G.t-G.deadAt>.45){ $('dead').classList.add('hidden'); resetRun(G.daily); }
}
/* jump fires on touch DOWN (zero perceived latency). A tap that turns out
   to be a swipe-down self-heals: duck() slams an airborne player straight
   into the crouch, which reads as one intentional move. */
let touchY0=null,swiped=false;
window.addEventListener('touchstart',e=>{
  if(e.target.closest('button')) return;
  e.preventDefault();
  touchY0=e.touches[0].clientY; swiped=false;
  primary();
},{passive:false});
window.addEventListener('touchmove',e=>{
  if(touchY0===null||swiped) return;
  const dy=e.touches[0].clientY-touchY0;
  if(dy>26){ swiped=true; if(G.state==='run') duck(); }
},{passive:false});
window.addEventListener('touchend',()=>{ touchY0=null; },{passive:false});
window.addEventListener('mousedown',e=>{
  if(e.target.closest('button')) return;
  if(e.button===2){ if(G.state==='run') duck(); return; }
  primary();
});
window.addEventListener('contextmenu',e=>{ e.preventDefault(); });
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k===' '||k==='arrowup'||k==='w'){ e.preventDefault(); primary(); }
  if(k==='arrowdown'||k==='s'){ e.preventDefault(); if(G.state==='run') duck(); }
});
$('againBtn').addEventListener('click',()=>{ $('dead').classList.add('hidden'); resetRun(G.daily); });
$('reviveBtn').addEventListener('click',()=>{
  if(G.revived||G.coins<100||G.state!=='dead') return;

});

/* ---------------- update ---------------- */
function update(dt){
  G.t+=dt;
  for(const q of G.pops) q.t+=dt;
  G.pops=G.pops.filter(q=>q.t<1);
  if(G.shieldFlash>0) G.shieldFlash-=dt*1.6;
  for(const f of G.confetti){ f.x+=f.vx*dt; f.y+=f.vy*dt; f.rot+=f.vr*dt; }
  G.confetti=G.confetti.filter(f=>f.y<H+20);
  if(G.state==='inside'){
    G.insideT-=dt; for(const r of G.rockets) r.t+=dt;
    if(G.insideT<=0) startWave();
    return;
  }
  if(G.state==='deathcam'){
    G.deathT+=dt; const r=G.ragdoll;
    r.vy+=1100*dt; r.x+=r.vx*dt; r.y+=r.vy*dt; r.rot+=8*dt;
    if(r.y>groundY-12){ r.y=groundY-12; r.vy*=-.4; r.vx*=.6; }  // comedy bounce, not a void
    return;
  }
  if(G.state!=='run') return;
  const c=G.cfg, p=G.player;
  const left=G.deadline-G.t;
  const u=clamp(1-left/G.total,0,1);            // 0 calm → 1 frantic
  if(G.banner) G.banner.t+=dt;
  if(G.star>0) G.star-=dt;
  if(G.magnet>0) G.magnet-=dt;
  // the wail only for the final 3 seconds
  if(left<=3&&!G.sirenOn){ G.sirenOn=true; Sound.sirenStart();
    buzz([60,40,60,40,60]); }
  if(left>3&&G.sirenOn){ G.sirenOn=false; Sound.sirenStop(); }   // ⌛ pushed it back
  // player physics (fast-fall after apex: snappy, same jump height)
  const wasAir=p.y>0;
  p.y+=p.vy*dt;
  if(p.y>0) p.vy-=2050*dt*(p.vy<0?1.6:1); else {p.y=0;p.vy=Math.max(0,p.vy);}
  if(G.jbuf>0) G.jbuf-=dt;
  if(wasAir&&p.y<=0){
    if(G.jbuf>0&&G.stumble<=0){ G.jbuf=0; p.vy=720; Sound.jump(); }  // buffered jump
    else p.land=.16;                       // landing squash
  }
  if(p.land>0) p.land-=dt;
  if(p.duckT>0) p.duckT-=dt;
  // heartbeat pulse builds with urgency
  if(G.t>=G.nextPulse){ Sound.pulse(u); G.nextPulse=G.t+(.62-.4*u); }
  if(G.stumble>0) G.stumble-=dt;
  if(G.invuln>0) G.invuln-=dt;
  // speed ramps with the countdown
  G.speed=c.v0+(c.v1-c.v0)*u;
  const v=G.stumble>0?G.speed*.45:G.speed;
  G.prog+=v*dt; G.dist+=v*dt;
  // spawn obstacles by distance (runway stays clear before the door)
  if(G.goal-G.prog>700&&G.prog>=G.nextOb){
    const air=WRo()<c.airP+(u*.12);
    const T=THEME(), set=air?T.air:T.ground;
    G.obs.push({x:W+90,air,emoji:set[wirandO(0,set.length-1)],
      label:G.tutorial&&G.obs.length<2?(air?'SWIPE ↓':'TAP!'):null});
    // post-wave-8 combos: a second, opposite-type obstacle right behind
    if(c.pairP&&WRo()<c.pairP){
      const set2=air?T.ground:T.air;
      G.obs.push({x:W+240,air:!air,emoji:set2[wirandO(0,set2.length-1)],label:null});
    }
    G.nextOb=G.prog+Math.max(c.obGap[0],wrandO(c.obGap[0],c.obGap[1])*(1-.4*u));
  }
  // one power-up per wave: ⭐ untouchable · 🧲 coin magnet · ⌛ +3s (rolls drawn at wave start)
  if(G.nextPow>0&&G.prog>=G.nextPow){
    G.nextPow=-1;
    const kind=['star','magnet','time'][G.powKind];
    G.pows.push({x:W+90,y:groundY-66-G.powLift*52,kind,
      emoji:{star:'⭐',magnet:'🧲',time:'⌛'}[kind]});
  }
  // marathons guarantee a late hourglass — earn your extra seconds
  if(G.nextPow2>0&&G.prog>=G.nextPow2){
    G.nextPow2=-1;
    G.pows.push({x:W+90,y:groundY-66,kind:'time',emoji:'⌛'});
  }
  // coins: small arcs between obstacles
  if(G.goal-G.prog>500&&G.prog>=G.nextCoin){
    const lift=WRc()<.5?0:64;
    for(let i=0;i<3;i++) G.picks.push({x:W+90+i*46,y:groundY-34-lift-(lift?Math.sin(i/2*Math.PI)*16:0)});
    G.nextCoin=G.prog+wrandC(520,900);
  }
  for(const o of G.obs) o.x-=v*dt;
  for(const k of G.picks) k.x-=v*dt;
  for(const w of G.pows) w.x-=v*dt;
  G.obs=G.obs.filter(o=>o.x>-90); G.picks=G.picks.filter(k=>k.x>-40);
  G.pows=G.pows.filter(w=>w.x>-40);
  const px=PLAYER_X(), ducking=p.duckT>0&&p.y<=0;
  // magnet: coins fly to you
  if(G.magnet>0) for(const k of G.picks){
    const dx=px-k.x, dy=(groundY-p.y-30)-k.y, d=Math.hypot(dx,dy);
    if(d<320){ k.x+=dx*6*dt; k.y+=dy*6*dt; }
  }
  // power-up pickup
  for(const w of G.pows){
    if(Math.abs(w.x-px)<34&&Math.abs((groundY-p.y-30)-w.y)<52){
      w.x=-999; Sound.power(); buzz(60);
      if(w.kind==='star'){ G.star=3; pop(px,groundY-110,'⭐ UNTOUCHABLE!','#ffd166',true); }
      else if(w.kind==='magnet'){ G.magnet=7; pop(px,groundY-110,'🧲 COIN MAGNET!','#8ad2ff',true); }
      else { G.deadline+=3; pop(px,groundY-110,'⌛ +3 SECONDS!','#7ee8c7',true); }
    }
  }
  // ⭐ smash-through: plow obstacles with a rising fanfare
  if(G.star>0) for(const o of G.obs){
    if(Math.abs(o.x-px)<42){
      o.x=-999; G.starHits=(G.starHits||0)+1;
      pop(px+20,groundY-100,'SMASH! 💥',POP_COLS[G.starHits%4]);
      Sound.beep(660*Math.pow(2,Math.min(G.starHits,8)/12),.08,'square',.05);
    }
  }
  // collisions (⭐ makes you untouchable)
  else if(G.invuln<=0) for(const o of G.obs){
    if(Math.abs(o.x-px)>30) continue;
    const hit=o.air?(!ducking&&p.y<52):(p.y<44);
    if(hit){
      G.hits++; G.stumble=.5; G.invuln=.9;
      G.prog=Math.max(0,G.prog-Math.min(260,140+G.wave*6)*(c.marathon?1.25:1));  // hits hurt more, later
      G.freeze=.07;                        // hit-stop: the impact has weight
      o.x=-999; Sound.hit(); shake(); buzz(110);
      pop(px,groundY-90,'OOF! 💢','#ff5d5d',true);
      break;
    }
  }
  for(const k of G.picks){
    if(Math.abs(k.x-px)<30&&Math.abs((groundY-p.y-30)-k.y)<44){
      G.fly.push({x:k.x,y:k.y,t:0});                 // coin flies to the counter
      k.x=-999; G.coins+=5;
      G.combo=(G.t-G.lastCoin<1)?G.combo+1:0; G.lastCoin=G.t;
      Sound.coin(G.combo);
      pop(px+rand(-8,8),groundY-p.y-88,G.combo>0?`+5₪ ×${G.combo+1}`:'+5₪',POP_COLS[G.combo%4]);
    }
  }
  for(const f of G.fly) f.t+=dt*3.2;
  G.fly=G.fly.filter(f=>f.t<1);
  if(G.prog>=G.goal){ G.coins+=20+G.wave*5+(c.marathon?60:0); enterMamad(); return; }
  if(left<=0){ die(); return; }
}

/* ---------------- draw ---------------- */
function draw(){
  const p=G.player, px=PLAYER_X();
  const left=G.state==='run'?Math.max(0,G.deadline-G.t):0;
  const u=G.state==='run'?clamp(1-left/G.total,0,1):0;
  const dc=G.state==='deathcam';
  let cam=false;
  if(dc){ // slow punch-in on the scene of the crime
    const z=1+.35*Math.min(1,G.deathT*2.2);
    cx.save();cx.translate(px,groundY-40);cx.scale(z,z);cx.translate(-px,-(groundY-40));
  } else if(G.state==='run'){ // speed zoom + landing camera dip
    const z=1+.05*u, dip=p.land>0?p.land*80:0;
    cx.save();cx.translate(px,groundY-40);cx.scale(z,z);cx.translate(-px,-(groundY-40)+dip);
    cam=true;
  }
  // scenery: hand-painted hood strip when its art is loaded, else procedural
  const T=THEME();
  const bga=T.bg&&artOk(T.bg)?ART[T.bg]:null;
  if(bga){
    const th=groundY+2, tw2=th*bga.naturalWidth/bga.naturalHeight;
    for(let x2=-((G.dist*.3)%tw2);x2<W;x2+=tw2) cx.drawImage(bga,x2,0,tw2+1,th);
  } else {
    let sky=SKYG.get(T.name);
    if(!sky){ sky=cx.createLinearGradient(0,0,0,groundY);
      sky.addColorStop(0,T.sky[0]);sky.addColorStop(.6,T.sky[1]);sky.addColorStop(1,T.sky[2]);
      SKYG.set(T.name,sky); }
    cx.fillStyle=sky;cx.fillRect(0,0,W,groundY);
    // sun + clouds by day, moon + stars on the night run
    if(T.night){
      drawEmoji('🌙',W*.82,H*.11,38);
      cx.fillStyle='#fff';
      for(let i=0;i<30;i++){
        cx.globalAlpha=.3+.5*Math.abs(Math.sin(G.t*.9+i*1.7));
        cx.fillRect(((i*173.7)%1)*W,((i*97.3)%1)*groundY*.55,2,2);
      }

    } else {
      cx.drawImage(glow('rgba(255,235,150,.95)',90),W*.82-90,H*.11-90);
      drawEmoji('☀️',W*.82,H*.11,40);
      for(let i=0;i<5;i++){
        const cxp=((i*263.7+G.t*(8+i*3))%(W+160))-80, cyp=(.06+(i*.09)%.3)*H;
        drawEmoji('☁️',cxp,cyp,34+(i%3)*14);
      }
    }
    skyline(G.dist*.12,Math.max(90,groundY*.3),.55,T.win,T.far);
    skyline(G.dist*.28+400,Math.max(58,groundY*.2),T.night?1.6:.78,T.win,T.near);
  }
  // alert vignette pulses as the boom nears (over the scenery; floor raised
  // so it actually reads on the bright painted skies)
  if(G.state==='run'&&u>.62){
    cx.fillStyle=`rgba(255,60,60,${(.1+.16*Math.abs(Math.sin(G.t*6)))*(u-.3)})`;
    cx.fillRect(0,0,W,H);
  }
  // street: tinted from the painted road when bg art is up (cohesion fix)
  let stc=T.street;
  if(bga){
    let sc=SKYG.get('st-'+T.name);
    if(sc===undefined){
      try{

      }catch(e){ sc=null; }       // file:// canvas taint → keep theme constant
      SKYG.set('st-'+T.name,sc);
    }
    if(sc) stc=sc;
  }
  cx.fillStyle=stc;cx.fillRect(0,groundY,W,H-groundY);

    curb.addColorStop(0,'rgba(0,0,0,.34)');curb.addColorStop(1,'rgba(0,0,0,0)');
    SKYG.set('curb',curb); }

    drawEmoji('🪙',0,0,26);cx.restore();

    }
  }
  // obstacles: shadow + colored telegraph ring (gold=jump, teal=duck)
  for(const o of G.obs){
    const oy=o.air?groundY-86:groundY-26;
    cx.fillStyle='rgba(0,0,0,.3)';
    cx.beginPath();cx.ellipse(o.x,groundY+8,o.air?14:20,5,0,0,7);cx.fill();
    cx.strokeStyle=o.air?'rgba(126,232,199,.8)':'rgba(255,209,102,.8)';
    cx.lineWidth=2.5;cx.beginPath();cx.arc(o.x,oy,30,0,7);cx.stroke();
    if(o.emoji==='👵'&&artOk('savta-cart')) drawArt('savta-cart',o.x,oy-8,58,true);
    else drawEmoji(o.emoji,o.x,oy,o.air?40:46);
    if(o.air){ drawEmoji('💨',o.x+34,oy-6,16); }
    if(o.label){ cx.font='900 16px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
      cx.lineWidth=5;cx.strokeStyle='rgba(15,20,40,.85)';cx.strokeText(o.label,o.x,oy-56);
      cx.fillStyle='#fff';cx.fillText(o.label,o.x,oy-56); }
  }
  // player (+shadow shrinks with height)
  const sw=22*(1-clamp(p.y/260,0,.5));
  cx.fillStyle='rgba(0,0,0,.35)';
  cx.beginPath();cx.ellipse(px,groundY+8,sw,6,0,0,7);cx.fill();
  // ⭐ star aura: golden, sparkling, untouchable
  if(G.star>0){
    const ay=groundY-p.y-30;
    cx.globalAlpha=Math.min(1,G.star);
    cx.drawImage(glow('rgba(255,220,90,.55)',46),px-46,ay-46);
    cx.globalAlpha=1;
    drawEmoji('✨',px+Math.sin(G.t*9)*30,ay-Math.abs(Math.cos(G.t*7))*34,16);
  }
  if(dc){
    // ragdoll launch + savta walks in, shakes her head
    const rg=G.ragdoll;
    cx.save();cx.translate(rg.x,rg.y);cx.rotate(rg.rot);
    if(artOk('tumble')) drawArt('tumble',0,0,62);
    else { cx.scale(-1,1); drawEmoji('🏃',0,0,46); }
    cx.restore();
    const sx=px+185-Math.min(1,G.deathT/.6)*82;
    if(artOk('savta-nu')){
      cx.save();cx.translate(sx,groundY-44);cx.rotate(Math.sin(G.t*7)*.1);
      drawArt('savta-nu',0,0,88);cx.restore();
    } else {
      cx.save();cx.translate(sx,groundY-26);cx.rotate(Math.sin(G.t*7)*.12);
      cx.scale(-1,1);drawEmoji('👵',0,0,52);cx.restore();
      if(G.deathT>.7) drawEmoji('🤌',sx-38,groundY-58,22);
    }
  }
  else {
    if(G.invuln>0&&Math.floor(G.t*14)%2===0) cx.globalAlpha=.35;  // ghost, never vanish
    cx.save();cx.translate(px,groundY-p.y-30);
    if(G.stumble>0) cx.rotate(.4);
    if(p.land>0) cx.scale(1+p.land*1.2,1-p.land*1.4);   // landing squash
    const duckPose=p.duckT>0&&p.y<=0;
    if(artOk('run1')&&artOk('run2')&&artOk('jump')&&artOk('duck')){
      if(p.y>0){ cx.rotate(p.vy>0?-.1:.08); drawArt('jump',0,2,60); }
      else if(duckPose){ cx.translate(0,8); drawArt('duck',0,2,44); }
      else { if(G.state==='run') cx.translate(0,Math.sin(G.t*17)*2);
        drawArt(Math.floor(G.t*9)%2?'run1':'run2',0,2,64); }
    } else {
      cx.scale(-1,1);                 // 🏃 faces left natively — mirror to run right
      if(duckPose){ cx.scale(1.18,.6); }
      else if(p.y>0) cx.rotate(p.vy>0?.16:-.13);          // tilt up rising, down falling
      else if(G.state==='run') cx.translate(0,Math.sin(G.t*17)*2.5);
      drawEmoji('🏃',0,0,46);
      // phone held out in front, filming the whole thing (mirrored space: front = -x)
      cx.save();cx.translate(-27,-6);cx.rotate(.3);drawEmoji('📱',0,0,17);
      cx.fillStyle=Math.floor(G.t*3)%2?'#ff3b3b':'#ff8a8a';
      cx.beginPath();cx.arc(-1,-11,2.6,0,7);cx.fill();cx.restore();
    }
    cx.restore();cx.globalAlpha=1;
  }
  // dust at heels
  if(G.state==='run'&&p.y<=0) drawEmoji('💨',px-30,groundY-12,15+u*7);
  // speed lines once it gets frantic
  if(G.state==='run'&&u>.45){
    cx.strokeStyle=`rgba(255,255,255,${.25*(u-.4)})`;cx.lineWidth=2;
    for(let i=0;i<6;i++){
      const ly=groundY-150-((i*97)%170), lx=W-((G.dist*2.2+i*340)%(W+200))+100;
      cx.beginPath();cx.moveTo(lx,ly);cx.lineTo(lx-60-u*50,ly);cx.stroke();
    }
  }
  // pop text (+5₪ / OOF!)
  for(const q of G.pops){
    const a=1-q.t, rise=q.t*54;
    cx.globalAlpha=a;cx.font=`900 ${q.big?24:18}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
    cx.lineWidth=5;cx.strokeStyle='rgba(15,20,40,.8)';
    cx.strokeText(q.txt,q.x,q.y-rise);
    cx.fillStyle=q.col;cx.fillText(q.txt,q.x,q.y-rise);
    cx.globalAlpha=1;
  }
  if(dc){
    cx.restore();   // end punch-in; caption in screen space
    if(G.deathT>.45){
      const a=clamp((G.deathT-.45)/.25,0,1), sc=1+.25*Math.max(0,1-(G.deathT-.45)*5);
      cx.save();cx.translate(W/2,H*.28);cx.scale(sc,sc);cx.globalAlpha=a;
      cx.textAlign='center';cx.textBaseline='middle';
      let fs=clamp(W*.06,20,32);
      cx.font=`900 ${fs}px sans-serif`;
      const tw=cx.measureText(G.deathLine).width;
      if(tw>W*.92){ fs*=W*.92/tw; cx.font=`900 ${fs}px sans-serif`; }
      cx.lineWidth=7;cx.strokeStyle='rgba(15,20,40,.85)';
      cx.strokeText(G.deathLine,0,0);cx.fillStyle='#fff';cx.fillText(G.deathLine,0,0);
      const m=Math.max(1,Math.round((G.goal-G.prog)/10));
      cx.font='800 17px sans-serif';cx.lineWidth=5;
      cx.strokeText(`CAUGHT ${m}m FROM THE MAMAD`,0,38);
      cx.fillStyle='#ff8a8a';cx.fillText(`CAUGHT ${m}m FROM THE MAMAD`,0,38);
      cx.restore();cx.globalAlpha=1;
    }
  }
  else { if(cam) cx.restore(); hud(left,u); }
  // inside-the-mamad beat
  if(G.state==='inside') insideScene();
  // coins flying to the counter (screen space, above everything below)
  for(const f of G.fly){
    const e=f.t*f.t*(3-2*f.t), ty=(Math.max(30,H*.028+26)+SAFE_TOP)+48;
    drawEmoji('🪙',f.x+(46-f.x)*e,f.y+(ty-f.y)*e,26-12*e);
  }
  // celebration confetti — on top of the overlay, where it belongs
  for(const f of G.confetti){
    cx.save();cx.translate(f.x,f.y);cx.rotate(f.rot);
    cx.fillStyle=f.col;cx.fillRect(-f.s/2,-f.s/2,f.s,f.s*.6);cx.restore();
  }
  // teal flash as the mamad door slams behind you
  if(G.shieldFlash>0){ cx.fillStyle=`rgba(126,232,199,${.45*G.shieldFlash})`;cx.fillRect(0,0,W,H); }
}
function skyline(off,hMax,shade,winCol,fill){
  // pre-rendered periodic strip (8 buildings), tiled — kills the per-frame
  // windows double-loop that janked low-end phones
  const sp=170, period=sp*8;
  const key=fill+'|'+winCol+'|'+Math.round(hMax)+'|'+shade;
  let st=STRIPS.get(key);
  if(!st){
    st=document.createElement('canvas');
    st.width=period; st.height=Math.ceil(hMax+50);
    const g=st.getContext('2d');
    for(let i=0;i<8;i++){
      const seed=Math.abs(Math.sin(i*127.3));
      const bh=40+seed*hMax, bw=90+((i%3)*30);
      g.fillStyle=fill;
      g.fillRect(i*sp,st.height-bh,bw,bh);
      g.fillStyle=`${winCol}${.4*shade})`;
      for(let wY=st.height-bh+10;wY<st.height-12;wY+=18)
        for(let wX=i*sp+8;wX<i*sp+bw-10;wX+=22)
          if(Math.abs(Math.sin(wX*wY))>.72) g.fillRect(wX,wY,7,9);
    }
    STRIPS.set(key,st);
  }
  let x=-(off%period); if(x>0) x-=period;
  for(;x<W;x+=period) cx.drawImage(st,x,groundY-st.height);
}
function door(x){
  if(artOk('door')){
    drawArt('door',x+35,groundY-64,132);
    cx.font='bold 13px sans-serif';cx.textAlign='center';cx.textBaseline='middle';
    cx.lineWidth=4;cx.strokeStyle='rgba(15,20,40,.85)';
    cx.strokeText('MAMAD',x+35,groundY-8);
    cx.fillStyle='#dffaf1';cx.fillText('MAMAD',x+35,groundY-8);
  } else {
    cx.fillStyle='#0f8a72';cx.fillRect(x-8,groundY-118,86,118);
    cx.fillStyle='#0b6b59';cx.fillRect(x,groundY-106,70,106);
    drawEmoji('🛡️',x+35,groundY-66,40);
    cx.fillStyle='#dffaf1';cx.font='bold 13px sans-serif';cx.textAlign='center';
    cx.fillText('MAMAD',x+35,groundY-14);
    cx.strokeStyle='rgba(126,232,199,.7)';cx.lineWidth=3;
    cx.strokeRect(x-8,groundY-118,86,118);
  }
}
function hud(left,u){
  // countdown — BIG, on canvas, always visible (the mobile fix)
  if(G.state==='run'){
    const warn=left<4, f=left-Math.floor(left);
    const size=(warn?clamp(W*.16,52,92):clamp(W*.12,40,64))*(1+.18*Math.pow(f,8));  // punch on each tick
    cx.font=`900 ${size}px sans-serif`;
    cx.textAlign='center';cx.textBaseline='top';
    cx.lineWidth=8;cx.strokeStyle='rgba(15,20,40,.85)';
    cx.strokeText(Math.ceil(left),W/2,(Math.max(14,H*.05)+SAFE_TOP));
    cx.fillStyle=warn?(Math.floor(G.t*5)%2?'#ff3b3b':'#fff'):'#fff';
    cx.fillText(Math.ceil(left),W/2,(Math.max(14,H*.05)+SAFE_TOP));
    cx.font='800 13px sans-serif';
    cx.lineWidth=4;cx.strokeText('TO THE MAMAD',W/2,(Math.max(14,H*.05)+SAFE_TOP)+size+2);
    cx.fillStyle='#fff';
    cx.fillText('TO THE MAMAD',W/2,(Math.max(14,H*.05)+SAFE_TOP)+size+2);
  }
  // progress bar to the door
  const bw=Math.min(W*.72,420),bx=(W-bw)/2,by=(Math.max(8,H*.028)+SAFE_TOP);
  cx.fillStyle='rgba(13,17,32,.6)';r(bx-4,by-4,bw+8,16,8);
  cx.fillStyle='#46506b';r(bx,by,bw,8,4);
  if(u>.62) cx.fillStyle='#ff5d5d';
  else{ let pg=SKYG.get('pbar');
    if(!pg){ pg=cx.createLinearGradient(bx,0,bx+bw,0);
      pg.addColorStop(0,'#7ee8c7');pg.addColorStop(1,'#ffd166');SKYG.set('pbar',pg); }
    cx.fillStyle=pg; }
  r(bx,by,bw*clamp(G.prog/G.goal,0,1),8,4);
  drawEmoji('🛡️',bx+bw+16,by+4,18);
  cx.save();cx.translate(bx+bw*clamp(G.prog/G.goal,0,1),by+4);cx.scale(-1,1);
  drawEmoji('🏃',0,0,16);cx.restore();
  // wave + coins pills (+ active power)
  cx.font='800 15px sans-serif';cx.textAlign='left';cx.textBaseline='middle';
  const py=(Math.max(30,H*.028+26)+SAFE_TOP);
  pill(12,py,`🚨 ${G.wave}`,'#ffb4b4');
  pill(12,py+34,`💸 ${G.coins}₪`,'#ffd166');
  if(G.star>0) pill(12,py+68,`⭐ ${G.star.toFixed(1)}s`,'#ffd166');
  else if(G.magnet>0) pill(12,py+68,`🧲 ${G.magnet.toFixed(1)}s`,'#8ad2ff');
  // hood banner at wave start
  if(G.banner&&G.banner.t<1.8&&G.state==='run'){
    const bt=G.banner.t, a=bt<.25?bt/.25:bt>1.4?(1.8-bt)/.4:1;
    const sc=1+.3*Math.max(0,1-bt*4);
    cx.save();cx.translate(W/2,H*.3);cx.scale(sc,sc);cx.globalAlpha=clamp(a,0,1);
    cx.textAlign='center';cx.textBaseline='middle';
    cx.font=`900 ${clamp(W*.07,24,38)}px sans-serif`;
    cx.lineWidth=7;cx.strokeStyle='rgba(15,20,40,.85)';
    cx.strokeText(G.banner.txt,0,0);cx.fillStyle='#fff';cx.fillText(G.banner.txt,0,0);
    cx.font='800 16px sans-serif';cx.lineWidth=5;
    cx.strokeText(G.banner.sub,0,34);cx.fillStyle='#ffb4b4';cx.fillText(G.banner.sub,0,34);
    cx.restore();cx.globalAlpha=1;
  }
}
function pill(x,y,txt,col){
  const w=cx.measureText(txt).width+24;
  cx.fillStyle='rgba(13,17,32,.62)';r(x,y,w,28,14);
  cx.fillStyle=col;cx.fillText(txt,x+12,y+15);
}
function r(x,y,w,h,rad){cx.beginPath();
  if(cx.roundRect) cx.roundRect(x,y,w,h,rad); else cx.rect(x,y,w,h);
  cx.fill();}
function titleScene(){
  if(artOk('run1')) drawArt('run1',W*.24,groundY-32,64);
  else {
    cx.save();cx.translate(W*.24,groundY-30);cx.scale(-1,1);
    drawEmoji('🏃',0,0,46);
    cx.save();cx.translate(-26,-9);cx.rotate(.3);drawEmoji('📱',0,0,17);cx.restore();
    cx.restore();
  }
  drawEmoji('💨',W*.24-30,groundY-12,15);
  door(W*.72);
}
function insideScene(){
  cx.fillStyle='rgba(8,10,18,.85)';cx.fillRect(0,0,W,H);
  if(artOk('door')){ cx.globalAlpha=.35; drawArt('door',W/2,H*.4,H*.4); cx.globalAlpha=1; }
  for(const rk of G.rockets){
    const t=rk.t;
    if(t<.65){ drawEmoji('🚀',rk.x+t*240,rk.y-t*180,30); drawEmoji('☄️',W*.9-t*340,H*.08+t*260,26); }
    else if(t<1.1) drawEmoji('💥',W*.62,H*.3,70+Math.sin(t*30)*8);
  }
  cx.fillStyle='#7ee8c7';cx.font=`900 ${clamp(W*.07,26,40)}px sans-serif`;cx.textAlign='center';cx.textBaseline='middle';
  cx.fillText('INSIDE THE MAMAD 🛡️',W/2,H*.6);
  if(G.perfect){ cx.fillStyle='#ff8ad4';cx.font='900 22px sans-serif';
    cx.fillText('🎯 PERFECT RUN +15₪',W/2,H*.6-44); }
  const fitTxt=(str,fs,wt)=>{cx.font=`${wt} ${fs}px sans-serif`;
    const tw=cx.measureText(str).width;
    if(tw>W*.94) cx.font=`${wt} ${Math.floor(fs*W*.94/tw)}px sans-serif`;};
  const l1=`+${20+G.wave*5}₪ calm under fire · siren #${G.wave} survived`;
  cx.fillStyle='#ffd166';fitTxt(l1,18,800);cx.fillText(l1,W/2,H*.6+44);
  const l2='boom outside… Iron Dome has it. Next one is faster.';
  cx.fillStyle='rgba(255,255,255,.6)';fitTxt(l2,14,600);cx.fillText(l2,W/2,H*.6+76);
}

/* ---------------- main loop (error-contained, never dies) ---------------- */
let lastT=performance.now();
function loop(now){
  requestAnimationFrame(loop);
  let dt=Math.min(.05,(now-lastT)/1000);lastT=now;
  if(G.freeze>0){ G.freeze-=dt; dt=0; }    // hit-stop freeze-frame
  try{ update(dt); draw(); }catch(err){ console.error(err); }
}
$('titleBest').textContent=G.best.sirens?`Best: ${G.best.sirens} sirens · ${G.best.coins}₪`:'';
requestAnimationFrame(loop);
</script>
