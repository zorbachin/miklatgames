<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360">
  <!-- hot Friday sky -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7ec8ff"/><stop offset="1" stop-color="#ffe2b0"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9a7a4e"/><stop offset="1" stop-color="#6e5230"/>
    </linearGradient>
  </defs>
  <rect width="640" height="120" fill="url(#sky)"/>
  <rect y="110" width="640" height="250" fill="#c9a26b"/>
  <!-- market alley -->
  <polygon points="270,120 370,120 560,360 80,360" fill="url(#road)"/>
  <line x1="303" y1="125" x2="240" y2="360" stroke="#fdf3e3" stroke-width="3" stroke-dasharray="10 14" opacity=".4"/>
  <line x1="337" y1="125" x2="400" y2="360" stroke="#fdf3e3" stroke-width="3" stroke-dasharray="10 14" opacity=".4"/>
  <!-- striped awnings -->
  <g>
    <polygon points="20,150 180,150 100,90" fill="#d64545"/>
    <polygon points="460,150 620,150 540,90" fill="#f0f0e6"/>
    <polygon points="0,250 200,250 100,170" fill="#f0f0e6"/>
    <polygon points="440,250 640,250 540,170" fill="#d64545"/>
  </g>
  <!-- the chase -->
  <text x="320" y="285" font-size="84" text-anchor="middle">🏃</text>
  <text x="368" y="232" font-size="38" text-anchor="middle">🧺</text>
  <text x="238" y="320" font-size="64" text-anchor="middle">👨‍🍳</text>
  <text x="430" y="200" font-size="40" text-anchor="middle">📦</text>
  <text x="210" y="180" font-size="34" text-anchor="middle">🍅</text>
  <text x="395" y="155" font-size="28" text-anchor="middle">🥒</text>
  <!-- title -->
  <text x="320" y="62" font-family="Courier New,monospace" font-weight="700" font-size="52"
        text-anchor="middle" fill="#ffd166" stroke="#1a0f08" stroke-width="2"
        letter-spacing="3">SHUK SHOPPER</text>
</svg>
