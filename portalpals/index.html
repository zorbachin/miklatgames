<script>
'use strict';
/* ---------- i18n ---------- */
const I18N={
 en:{sub:'Level 1 · Parking-Lot Panic',how:'A rogue portal opened at the strip mall and scared little Parabots are tumbling out! Tag 5 of them to befriend them (they just need a friend), then stand by the portal to seal it. ⬅️➡️/A·D move · ⬆️/Space jump · on phones: hold screen sides, tap JUMP.',play:'PLAY',beat:'⚡ Challenge: seal it faster than {s}s!',win:'PORTAL SEALED!',lose:'THE PORTAL GOT STRONGER…',winBody:'You befriended {n} Parabots and sealed the breach in {t}s. Best: {b}s. The adventure continues — a new portal is already glowing…',loseBody:'Time ran out! The Parabots are still scared. Try again — they believe in you.',share:'SHARE',retry:'PLAY AGAIN',shared:'Copied! Send it to a friend 📋',tip:'Enjoying it? Tip the arcade ☕',offline:'Works offline · no ads · no downloads',friends:'FRIENDS',seal:'SEAL IT! Stand by the portal',jump:'JUMP',
  shareTxt:'I sealed the rogue portal and befriended {n} Parabots in {t}s in PORTAL PALS! Beat me:'},
 he:{sub:'שלב 1 · פאניקה במגרש החניה',how:'פורטל סורר נפתח ליד המרכז המסחרי ופרבוטים קטנים ומבוהלים מתגלגלים החוצה! תפסו 5 כדי להתיידד איתם (הם רק צריכים חבר), ואז עימדו ליד הפורטל כדי לאטום אותו. ⬅️➡️ תנועה · ⬆️/רווח קפיצה · בנייד: החזיקו בצדדים, הקישו לקפוץ.',play:'שחקו',beat:'⚡ אתגר: לאטום מהר מ־{s} שניות!',win:'הפורטל נאטם!',lose:'הפורטל התחזק…',winBody:'התיידדתם עם {n} פרבוטים ואטמתם את הפרצה ב־{t} שניות. שיא: {b} שניות. ההרפתקה נמשכת — פורטל חדש כבר זוהר…',loseBody:'הזמן נגמר! הפרבוטים עדיין מבוהלים. נסו שוב — הם מאמינים בכם.',share:'שתפו',retry:'עוד פעם',shared:'הועתק! שלחו לחבר 📋',tip:'נהניתם? פרגנו לארקייד ☕',offline:'עובד בלי אינטרנט · בלי פרסומות',friends:'חברים',seal:'לאטום! עימדו ליד הפורטל',jump:'קפיצה',
  shareTxt:'אטמתי את הפורטל הסורר והתיידדתי עם {n} פרבוטים ב־{t} שניות ב־PORTAL PALS! נצחו אותי:'}
};
let LANG=new URLSearchParams(location.search).get('lang')||localStorage.getItem('pp.lang')||'en';
if(!I18N[LANG])LANG='en';
const T=k=>I18N[LANG][k];
function fmt(s,o){return s.replace(/\{(\w+)\}/g,(_,k)=>o[k])}
function applyLang(){
  localStorage.setItem('pp.lang',LANG);
  document.documentElement.lang=LANG;document.documentElement.dir=LANG==='he'?'rtl':'ltr';
  langT.textContent=LANG==='he'?'EN':'עברית';
  tSub.textContent=T('sub');tHow.textContent=T('how');play.textContent=T('play');
  tOffline.textContent=T('offline');share.textContent=T('share');retry.textContent=T('retry');eTip.textContent=T('tip');
  tBeat.textContent=BEAT?fmt(T('beat'),{s:BEAT}):'';
}
langT.onclick=()=>{LANG=LANG==='en'?'he':'en';applyLang()};

/* ---------- analytics (cookieless, fails silently) ---------- */
function track(event){try{
  if(location.protocol==='file:'||location.hostname==='localhost')return;
  const img=new Image(1,1);
  img.src='https://miklat-games.goatcounter.com/count?p='+encodeURIComponent('/'+event)+'&e=true&r='+encodeURIComponent(document.referrer)+'&rnd='+Date.now();
}catch(e){}}

/* ---------- pure logic (headless-testable) ---------- */
const PURE={
  aabb:(a,b)=>a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y,
  clamp:(v,a,b)=>v<a?a:v>b?b:v,
  spawnDue:(t,last,alive,max)=>alive<max&&t-last>=2.2,
  channel:(c,dt,inZone,ready)=>PURE.clamp(c+(ready&&inZone?dt:-dt),0,2),
  won:c=>c>=2,
  lost:(timeLeft,sealed)=>timeLeft<=0&&!sealed
};

/* ---------- assets ---------- */
const A={},LOAD=['bg_lot','max_idle','max_run','max_jump','max_act','max_hit','max_win','scut_o_run','scut_o_alert','scut_c_hop','scut_c_alert','scut_sit','portal_0','portal_1','portal_2','portal_3','pk_heart','pk_gem','pk_orb'];
let loaded=0;
for(const n of LOAD){const i=new Image();i.src='assets/'+n+(n==='bg_lot'?'.jpg':'.png');i.onload=()=>loaded++;A[n]=i;}

/* ---------- audio (lazy WebAudio) ---------- */
let AC=null;
function beep(f,d,type='sine',g=.15,slide=0){try{
  AC=AC||new (window.AudioContext||window.webkitAudioContext)();
  const o=AC.createOscillator(),v=AC.createGain();
  o.type=type;o.frequency.value=f;if(slide)o.frequency.linearRampToValueAtTime(f+slide,AC.currentTime+d);
  v.gain.value=g;v.gain.exponentialRampToValueAtTime(.001,AC.currentTime+d);
  o.connect(v).connect(AC.destination);o.start();o.stop(AC.currentTime+d);
}catch(e){}}
const sfx={
  spawn:()=>beep(180,.25,'sawtooth',.08,220),
  friend:()=>{beep(660,.12,'triangle',.2);setTimeout(()=>beep(880,.15,'triangle',.2),90);setTimeout(()=>beep(1100,.2,'triangle',.2),190)},
  gem:()=>beep(1200,.1,'square',.08),
  jump:()=>beep(300,.15,'sine',.1,200),
  hum:()=>beep(90,.3,'sawtooth',.05,30),
  win:()=>{[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,.3,'triangle',.22),i*140))},
  lose:()=>{[400,340,280,200].forEach((f,i)=>setTimeout(()=>beep(f,.28,'sawtooth',.12),i*160))}
};

/* ---------- game state ---------- */
const W=1600,H=900,GROUND=830,GOAL=5,TIME=90;
const PORTAL={x:1010,y:430,r:235,zone:{x:820,y:520,w:390,h:330}};
const cv=document.getElementById('cv'),cx=cv.getContext('2d');
const BEAT=(()=>{const b=parseFloat(new URLSearchParams(location.search).get('beat'));return isFinite(b)&&b>0?Math.round(b):null})();
let G=null,running=false,tPrev=0;

function reset(){
  G={t:0,timeLeft:TIME,friends:0,score:0,sealed:false,over:false,channel:0,lastSpawn:-2,
     max:{x:280,y:GROUND,vx:0,vy:0,w:80,h:200,face:1,onG:true,boost:0,winPose:false},
     scuts:[],pickups:[],pops:[],shake:0,portalFrame:0,closing:0};
}

/* ---------- input ---------- */
const keys={};
addEventListener('keydown',e=>{keys[e.code]=true;if(['ArrowLeft','ArrowRight','ArrowUp','Space'].includes(e.code))e.preventDefault();});
addEventListener('keyup',e=>keys[e.code]=false);
let touchL=false,touchR=false;
function bindTouch(){
  cv.addEventListener('touchstart',onT,{passive:false});
  cv.addEventListener('touchmove',onT,{passive:false});
  cv.addEventListener('touchend',onT,{passive:false});
  cv.addEventListener('touchcancel',onT,{passive:false});
}
function onT(e){
  e.preventDefault();touchL=touchR=false;let jump=false;
  for(const t of e.touches){
    const r=cv.getBoundingClientRect(),x=(t.clientX-r.left)/r.width,y=(t.clientY-r.top)/r.height;
    if(y>0.72&&x>0.4&&x<0.6)jump=true;
    else if(x<0.45)touchL=true;else if(x>0.55)touchR=true;
  }
  if(jump)doJump();
}
function doJump(){const m=G.max;if(m.onG&&!G.over&&running){m.vy=-1050;m.onG=false;sfx.jump();}}
addEventListener('keydown',e=>{if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&running)doJump();});

/* ---------- entities ---------- */
function spawnScut(){
  const dir=Math.random()<.5?-1:1;
  G.scuts.push({x:PORTAL.x-60,y:PORTAL.y+80,vx:(120+Math.random()*140)*dir,vy:300+Math.random()*200,w:120,h:110,st:'fall',t:0});
  G.lastSpawn=G.t;sfx.spawn();
}
function spawnPickup(kind){
  const dir=Math.random()<.5?-1:1;
  G.pickups.push({kind,x:PORTAL.x,y:PORTAL.y+60,vx:dir*(150+Math.random()*150),vy:-350,w:70,h:70,t:0});
}
function pop(x,y,img,dy=-80){G.pops.push({x,y,img,t:0,dy});}

/* ---------- update ---------- */
function update(dt){
  if(!running||G.over)return;
  G.t+=dt;
  if(!G.sealed)G.timeLeft-=dt;
  const m=G.max,spd=420*(m.boost>0?1.45:1);
  m.boost=Math.max(0,m.boost-dt);
  const L=keys.ArrowLeft||keys.KeyA||touchL,R=keys.ArrowRight||keys.KeyD||touchR;
  m.vx=L&&!R?-spd:R&&!L?spd:0;
  if(m.vx)m.face=Math.sign(m.vx);
  m.x=PURE.clamp(m.x+m.vx*dt,60,W-140);
  m.vy+=2300*dt;m.y+=m.vy*dt;
  if(m.y>=GROUND){m.y=GROUND;m.vy=0;m.onG=true;}
  /* spawns */
  if(!G.sealed&&PURE.spawnDue(G.t,G.lastSpawn,G.scuts.filter(s=>s.st!=='gone').length,4))spawnScut();
  if(!G.sealed&&Math.floor(G.t/8)>Math.floor((G.t-dt)/8))spawnPickup(Math.random()<.6?'gem':'orb');
  /* scuttlers */
  for(const s of G.scuts){
    s.t+=dt;
    if(s.st==='fall'){s.vy+=2000*dt;s.y+=s.vy*dt;s.x+=s.vx*dt;if(s.y>=GROUND+20){s.y=GROUND+20;s.st='run';}}
    else if(s.st==='run'){
      s.x+=s.vx*dt;
      if(s.x<40||s.x>W-160)s.vx*=-1;
      if(Math.random()<dt*.3)s.vx*=-1;
      const mb={x:m.x,y:m.y-m.h,w:m.w,h:m.h},sb={x:s.x,y:s.y-s.h,w:s.w,h:s.h};
      if(PURE.aabb(mb,sb)){s.st='alert';s.t=0;}
    }
    else if(s.st==='alert'){if(s.t>.35){s.st='happy';s.t=0;G.friends++;G.score+=100;sfx.friend();pop(s.x+s.w/2,s.y-s.h,'pk_heart');if(navigator.vibrate)navigator.vibrate(30);}}
    else if(s.st==='happy'){s.x+=380*dt;s.y=GROUND+20-Math.abs(Math.sin(s.t*9))*40;if(s.x>W+50)s.st='gone';}
  }
  /* pickups */
  for(const p of G.pickups){
    p.t+=dt;p.vy+=1600*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.y>GROUND+30){p.y=GROUND+30;p.vy=0;p.vx*=.9;}
    const mb={x:m.x,y:m.y-m.h,w:m.w,h:m.h};
    if(!p.got&&PURE.aabb(mb,{x:p.x-35,y:p.y-70,w:70,h:70})){
      p.got=true;sfx.gem();
      if(p.kind==='gem')G.score+=50;else{m.boost=5;G.score+=25;}
      pop(p.x,p.y-60,p.kind==='gem'?'pk_gem':'pk_orb');
    }
  }
  G.pickups=G.pickups.filter(p=>!p.got&&p.t<9);
  G.pops=G.pops.filter(p=>(p.t+=dt)<0.9);
  /* portal & channel */
  G.portalFrame+=dt*6;
  const ready=G.friends>=GOAL&&!G.sealed;
  const mb={x:m.x,y:m.y-m.h,w:m.w,h:m.h};
  const inZone=PURE.aabb(mb,PORTAL.zone);
  const prev=G.channel;
  G.channel=PURE.channel(G.channel,dt,inZone,ready);
  if(ready&&inZone&&Math.floor(G.channel*4)>Math.floor(prev*4))sfx.hum();
  if(PURE.won(G.channel)&&!G.sealed){
    G.sealed=true;G.closing=0;m.winPose=true;G.shake=.5;sfx.win();
    const secs=Math.round(G.t);
    const best=Math.min(secs,parseInt(localStorage.getItem('pp.best')||'9999'));
    localStorage.setItem('pp.best',best);
    track('evt-pp-seal');track('evt-pp-level-1');
    setTimeout(()=>endScreen(true,secs,best),1800);
  }
  if(G.sealed)G.closing+=dt;
  if(PURE.lost(G.timeLeft,G.sealed)){G.over=true;sfx.lose();track('evt-pp-fail');setTimeout(()=>endScreen(false),900);}
  G.shake=Math.max(0,G.shake-dt);
}

/* ---------- draw ---------- */
function img(n,x,y,w,h,flip){
  const im=A[n];if(!im.complete)return;
  cx.save();
  if(flip){cx.translate(x+w/2,0);cx.scale(-1,1);cx.translate(-(x+w/2),0);}
  cx.drawImage(im,x,y,w,h);cx.restore();
}
function draw(){
  cx.save();
  if(G&&G.shake>0)cx.translate((Math.random()-.5)*14*G.shake,(Math.random()-.5)*14*G.shake);
  cx.drawImage(A.bg_lot,0,0,W,H);
  if(!G){cx.restore();return;}
  /* portal */
  const pf=G.sealed?(G.closing<0.5?3:G.closing<1?1:0):[0,2,1,2][Math.floor(G.portalFrame)%4];
  const pr=PORTAL.r*(G.sealed?Math.max(0,1-G.closing*.55):1)*(G.friends>=GOAL&&!G.sealed?1+Math.sin(G.t*6)*.05:1);
  if(pr>8)img('portal_'+pf,PORTAL.x-pr,PORTAL.y-pr*1.07,pr*2,pr*2.14);
  /* channel ring */
  if(G.friends>=GOAL&&!G.sealed){
    cx.strokeStyle='#ffd9b0';cx.lineWidth=10;cx.globalAlpha=.9;
    cx.beginPath();cx.arc(PORTAL.x,PORTAL.y,pr+30,-Math.PI/2,-Math.PI/2+Math.PI*G.channel,false);cx.stroke();
    cx.globalAlpha=1;
  }
  /* pickups */
  for(const p of G.pickups)img(p.kind==='gem'?'pk_gem':'pk_orb',p.x-35,p.y-70,70,70);
  /* scuttlers */
  for(const s of G.scuts){
    if(s.st==='gone')continue;
    const n=s.st==='run'?'scut_o_run':s.st==='fall'?'scut_o_alert':s.st==='alert'?'scut_c_alert':'scut_c_hop';
    img(n,s.x,s.y-s.h,s.w,s.h,s.vx>0&&s.st!=='happy');
  }
  /* max */
  const m=G.max;
  const pose=m.winPose?'max_win':!m.onG?'max_jump':m.vx?'max_run':(G.friends>=GOAL&&PURE.aabb({x:m.x,y:m.y-m.h,w:m.w,h:m.h},PORTAL.zone)&&!G.sealed?'max_act':'max_idle');
  const pw={max_idle:86,max_run:160,max_jump:140,max_act:170,max_win:145,max_hit:190}[pose];
  img(pose,m.x-((pw-m.w)/2),m.y-m.h,pw,m.h,m.face<0);
  if(m.boost>0){cx.globalAlpha=.5;cx.fillStyle='#ffd700';cx.beginPath();cx.ellipse(m.x+m.w/2,m.y-6,60,14,0,0,7);cx.fill();cx.globalAlpha=1;}
  /* pops */
  for(const p of G.pops){cx.globalAlpha=1-p.t/0.9;img(p.img,p.x-30,p.y+p.dy*p.t-30,60,60);cx.globalAlpha=1;}
  /* HUD */
  cx.textBaseline='top';cx.fillStyle='#fff';cx.font='700 44px system-ui';
  cx.shadowColor='rgba(0,0,0,.7)';cx.shadowBlur=8;
  const hearts='❤'.repeat(Math.min(G.friends,GOAL))+'♡'.repeat(Math.max(0,GOAL-G.friends));
  cx.fillText(hearts+'  '+T('friends')+' '+Math.min(G.friends,GOAL)+'/'+GOAL,28,22);
  cx.textAlign='right';
  cx.fillStyle=G.timeLeft<15?'#ff6b5e':'#fff';
  cx.fillText(Math.max(0,Math.ceil(G.timeLeft))+'s',W-28,22);
  cx.fillStyle='#ffd9b0';cx.font='600 30px system-ui';
  cx.fillText(G.score,W-28,76);
  cx.textAlign='left';
  if(G.friends>=GOAL&&!G.sealed){
    cx.textAlign='center';cx.font='800 46px system-ui';cx.fillStyle='#ffe9a0';
    cx.fillText('🌀 '+T('seal'),W/2,110);cx.textAlign='left';
  }
  /* touch jump hint */
  cx.shadowBlur=0;
  cx.globalAlpha=.35;cx.fillStyle='#fff';cx.font='700 30px system-ui';cx.textAlign='center';
  cx.fillText('⬆ '+T('jump'),W/2,H-56);cx.globalAlpha=1;cx.textAlign='left';
  cx.restore();
}

/* ---------- loop & screens ---------- */
function loop(ts){
  const dt=Math.min(0.033,(ts-tPrev)/1000||0);tPrev=ts;
  if(G)update(dt);
  draw();
  requestAnimationFrame(loop);
}
function endScreen(won,secs,best){
  running=false;G.over=true;
  document.getElementById('end').classList.remove('hide');document.body.classList.remove('playing');
  eTitle.textContent=won?T('win'):T('lose');
  eBody.textContent=won?fmt(T('winBody'),{n:GOAL,t:secs,b:best}):T('loseBody');
  share.dataset.t=secs||'';
}
document.getElementById('play').onclick=()=>{
  document.getElementById('title').classList.add('hide');document.body.classList.add('playing');
  reset();running=true;track('evt-pp-start');
};
document.getElementById('retry').onclick=()=>{
  document.getElementById('end').classList.add('hide');
  reset();running=true;track('evt-pp-start');
};
document.getElementById('share').onclick=async()=>{
  const t=share.dataset.t||Math.round(G.t);
  const url='https://miklatgames.fun/portalpals/?beat='+t+'&ref=share';
  const txt=fmt(T('shareTxt'),{n:GOAL,t})+' '+url;
  track('evt-pp-share');
  try{
    if(navigator.share)await navigator.share({text:txt});
    else{await navigator.clipboard.writeText(txt);share.textContent=T('shared');setTimeout(applyLang,1600);}
  }catch(e){}
};

/* ---------- fit canvas ---------- */
function fit(){
  const vw=innerWidth,vh=innerHeight,s=Math.min(vw/W,vh/H);
  cv.style.width=W*s+'px';cv.style.height=H*s+'px';
}
addEventListener('resize',fit);fit();
bindTouch();applyLang();
requestAnimationFrame(loop);

/* ---------- SW ---------- */
if('serviceWorker'in navigator&&location.protocol==='https:')
  navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
