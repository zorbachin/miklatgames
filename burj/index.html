<script>
'use strict';
/* ===================================================== BUILD THE BURJ v2
   Blueprint-match block puzzle. Each section shows a skyline-profile blueprint
   you fill with falling material pieces. Spill only lowers your MATCH% (it
   never insta-kills — forgiving by design, per the 10M panel). One live danger:
   topping out. House pattern: single file, offline SW, EN/AR + RTL, seeded RNG
   for ?beat= parity, pure-canvas share card, magenta art w/ emoji fallback. */

/* ---------- i18n ---------- */
const DICT={
  en:{arcade:'ARCADE',section:'SECTION',match:'MATCH',budget:'BUDGET',matchClean:'CLEAN BUILD',
    how:'Each section gives you a blueprint to fill. Drop the falling materials to match the plan. Clean fills score higher — spill just lowers your match.',

    how1:'Stack each column up to the gold line — no line-clears.',how2:'Move ◀ ▶, rotate ⟳, drop ⤓. HOLD saves a piece.',how3:'Holes & spill only lower MATCH%. Reach the spire!',

    beat:(m)=>'🎯 A friend built it '+m+'% clean — same blueprints, same pieces. Beat it!',
    secClear:m=>'SECTION CLEAR · '+m+'%',
    tMove:'◀ ▶ move · ⟳ rotate',tDrop:'⤓ drops it fast',tHold:'HOLD saves a piece',
    tSpill:'Spill lowers your match',tClean:'Clean fill! +',tSponsor:n=>'Leased — rent +'+n,

    shareTxt:(m,s,h)=>'I built the Burj '+m+'% clean ('+s+' sections, '+h+'m) 🏗️\nSame blueprints, same pieces — build it tighter → miklatgames.fun/burj',
    shareWin:m=>'I topped out the Burj '+m+'% clean to the spire 🏗️👑\nMatch it → miklatgames.fun/burj',
    copied:'Copied — paste in the chat!'},
  ar:{arcade:'الأروقة',section:'القسم',match:'التطابق',budget:'الميزانية',matchClean:'بناء نظيف',
    how:'كل قسم يمنحك مخططًا لتعبئته. أسقط المواد المتساقطة لمطابقة الخطة. التعبئة النظيفة تسجّل أعلى — الفائض يقلّل تطابقك فقط.',
    tapBuild:'انقر للبناء',again:'ابنِ من جديد',share:'شارك',
    collapse:'امتلأ البرج',bankrupt:'تجاوز الميزانية',win:'اكتملت القمة!',
    howTitle:'كيف تبني',gotIt:'فهمت',
    how1:'كدّس كل عمود حتى الخط الذهبي — لا مسح صفوف.',how2:'حرّك ◀ ▶، دوّر ⟳، أسقط ⤓. «HOLD» يحفظ قطعة.',how3:'الفراغات والفائض تقلّل التطابق فقط. اصعد للقمة!',
    best:p=>'الأفضل · '+p+'% نظافة',
    overSub:(s,h)=>s+' أقسام · '+h+'م',
    winSub:'طابقتَه حتى ٨٢٨م. أفق نظيف.',
    sales:n=>n+' طوابق مؤجّرة هذه الجولة · advertise@miklatgames.fun',
    beat:(m)=>'🎯 صديق بناه بنظافة '+m+'% — نفس المخططات والقطع. تغلّب عليه!',
    secClear:m=>'اكتمل القسم · '+m+'%',
    tMove:'◀ ▶ حرّك · ⟳ دوّر',tDrop:'⤓ يُسقطها بسرعة',tHold:'«HOLD» يحفظ قطعة',
    tSpill:'الفائض يقلّل تطابقك',tClean:'تعبئة نظيفة! +',tSponsor:n=>'مؤجّر — إيجار +'+n,
    tSponsorFirst:'كتلة AD الذهبية = علامة تستأجرها',tSpire:'ابنِ بنظافة حتى القمة!',
    tRule:'املأ حتى الخط الذهبي — الفراغات تكلّف التطابق',sampleTenant:'مستأجر تجريبي',
    shareTxt:(m,s,h)=>'بنيت البرج بنظافة '+m+'% ('+s+' أقسام، '+h+'م) 🏗️\nنفس المخططات والقطع — ابنِه أدق → miklatgames.fun/burj',
    shareWin:m=>'أكملت قمة البرج بنظافة '+m+'% 🏗️👑\nطابقه → miklatgames.fun/burj',
    copied:'تم النسخ — الصقه في المحادثة!'}
};
let lang=(new URLSearchParams(location.search).get('lang'))||localStorage.getItem('burj_lang')||((navigator.language||'').slice(0,2)==='ar'?'ar':'en');
if(lang!=='ar'&&lang!=='en')lang='en';
const T=()=>DICT[lang];
const AR_DIG={'0':'٠','1':'١','2':'٢','3':'٣','4':'٤','5':'٥','6':'٦','7':'٧','8':'٨','9':'٩'};
const num=n=>{n=Math.round(n);return lang==='ar'?(''+n).replace(/[0-9]/g,d=>AR_DIG[d]):''+n;};
const mUnit=()=>lang==='ar'?'م':'m';

function applyLang(){
  document.documentElement.lang=lang; document.documentElement.dir=lang==='ar'?'rtl':'ltr';
  document.querySelectorAll('[data-i]').forEach(el=>{const k=el.getAttribute('data-i'); if(T()[k]!=null&&typeof T()[k]!=='function')el.textContent=T()[k];});
  const set=(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;};
  set('howtxt',T().how); set('startBtn',T().tapBuild); set('againBtn',T().again); set('shareBtn',T().share);
  set('langBtn',lang==='ar'?'EN':'عربي'); set('howTitle',T().howTitle); set('how1',T().how1); set('how2',T().how2); set('how3',T().how3); set('howBtn',T().gotIt||(lang==='ar'?'فهمت':'GOT IT'));
  if(beatM){ set('beat',T().beat(num(beatM))); }
  refreshBest();
}

/* ---------- audio ---------- */
let actx=null, muted=localStorage.getItem('burj_mute')==='1';
function beep(f,d,t,v){ if(muted)return; try{ actx=actx||new (window.AudioContext||window.webkitAudioContext)();
  const o=actx.createOscillator(),g=actx.createGain(); o.type=t||'sine'; o.frequency.value=f; g.gain.value=v||.12;
  o.connect(g); g.connect(actx.destination); const n=actx.currentTime; g.gain.setValueAtTime(g.gain.value,n);
  g.gain.exponentialRampToValueAtTime(.0001,n+(d||.12)); o.start(n); o.stop(n+(d||.12)+.02);}catch(e){} }
const sfxMove=()=>beep(420,.04,'square',.04), sfxRot=()=>beep(560,.05,'square',.05),
  sfxLock=()=>beep(200,.09,'sine',.11), sfxClear=()=>{beep(740,.1,'sine',.12);setTimeout(()=>beep(1110,.13,'sine',.1),70);},
  sfxBad=()=>beep(110,.3,'sawtooth',.13), sfxWin=()=>[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,.18,'sine',.12),i*120));
let theme=null;
try{ theme=new Audio('assets/start-theme.mp3'); theme.loop=true; theme.volume=.5; theme.preload='auto'; }catch(e){}
function playTheme(){ if(theme&&!muted&&!running&&document.visibilityState!=='hidden')theme.play().catch(()=>{}); }
function stopTheme(){ if(theme)try{theme.pause();}catch(e){} }
window.addEventListener('pointerdown',()=>{ if(actx&&actx.state==='suspended'){try{actx.resume();}catch(e){}} playTheme(); });
document.addEventListener('visibilitychange',()=>{ document.visibilityState==='hidden'?stopTheme():playTheme(); });

/* ---------- art ---------- */
const ART={};
function keyMagenta(img){const c=document.createElement('canvas');c.width=img.width;c.height=img.height;const x=c.getContext('2d');x.drawImage(img,0,0);
  try{const d=x.getImageData(0,0,c.width,c.height);let mnX=c.width,mnY=c.height,mxX=0,mxY=0;
    for(let i=0;i<d.data.length;i+=4){if(d.data[i]>165&&d.data[i+2]>165&&d.data[i+1]<120){d.data[i+3]=0;continue;}
      if(d.data[i+3]>8){const p=i/4,px=p%c.width,py=(p/c.width)|0;if(px<mnX)mnX=px;if(px>mxX)mxX=px;if(py<mnY)mnY=py;if(py>mxY)mxY=py;}}
    x.putImageData(d,0,0); if(mxX>mnX&&mxY>mnY){const pad=2,w=Math.min(c.width,mxX-mnX+1+pad*2),h=Math.min(c.height,mxY-mnY+1+pad*2);
      const c2=document.createElement('canvas');c2.width=w;c2.height=h;c2.getContext('2d').drawImage(c,Math.max(0,mnX-pad),Math.max(0,mnY-pad),w,h,0,0,w,h);return c2;}}catch(e){}
  return c;}
[['bg-day',0],['bg-dusk',0],['rafi',1],['spire',1]].forEach(([n,key])=>{const i=new Image();
  i.onload=()=>{try{ART[n]=key?keyMagenta(i):i;}catch(e){ART[n]=i;}}; i.onerror=()=>{}; i.src='assets/'+n+'.jpg';});

/* ---------- canvas ---------- */
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W=0,H=0,DPR=1;
function fit(){const r=document.getElementById('game').getBoundingClientRect();DPR=Math.min(2,window.devicePixelRatio||1);W=r.width;H=r.height;
  cv.width=Math.round(W*DPR);cv.height=Math.round(H*DPR);ctx.setTransform(DPR,0,0,DPR,0,0); layout();}
window.addEventListener('resize',fit);

/* ---------- constants ---------- */
const COLS=8, ROWS=16, M_PER_SEC=83;   // ~10 sections -> ~828m
const START_BUDGET=900;
const MAT={glass:'#3ee6ff',concrete:'#9aa0a6',gold:'#ffd166',sponsor:'#ffd166'};
const MV={glass:1,concrete:2,gold:3,sponsor:4};
const TENANTS=['DEMO TENANT A','DEMO TENANT B','DEMO TENANT C','YOUR BRAND HERE']; // clearly fictional demo inventory
// blueprints = target HEIGHT per column (8 cols). Shape complexity escalates; gravity-fillable by construction.
const BLUEPRINTS=[
  [3,3,3,3,3,3,3,3],
  [2,3,4,5,5,4,3,2],
  [4,4,5,6,6,5,4,4],
  [6,5,4,3,3,4,5,6],
  [3,5,4,6,6,4,5,3],
  [7,6,5,4,4,5,6,7],
  [2,4,6,8,8,6,4,2],
  [8,4,7,3,3,7,4,8],
  [5,7,9,6,6,9,7,5],
  [4,6,8,11,11,8,6,4]
];
/* tetromino base cells -> 4 precomputed rotations */
const BASE={I:[[0,1],[1,1],[2,1],[3,1]],O:[[1,0],[2,0],[1,1],[2,1]],T:[[1,0],[0,1],[1,1],[2,1]],
  S:[[1,0],[2,0],[0,1],[1,1]],Z:[[0,0],[1,0],[1,1],[2,1]],J:[[0,0],[0,1],[1,1],[2,1]],L:[[2,0],[0,1],[1,1],[2,1]]};
function normP(cs){const mc=Math.min(...cs.map(p=>p[0])),mr=Math.min(...cs.map(p=>p[1]));return cs.map(([c,r])=>[c-mc,r-mr]);}
function rotsP(cs){let res=[normP(cs)],cur=res[0];for(let k=0;k<3;k++){cur=normP(cur.map(([c,r])=>[-r,c]));res.push(cur);}return res;}
const SHAPES={}; for(const k in BASE)SHAPES[k]=rotsP(BASE[k]); const TYPES=Object.keys(BASE);

/* ---------- layout ---------- */
let CELL=20, GX=0, GY=0, GW=0, GH=0, RAILW=0;
function layout(){ const topPad=130, botPad=76;
  RAILW=Math.round(Math.min(78, W*0.18));   // left rail = the rising Burj
  CELL=Math.max(12,Math.floor(Math.min((W-RAILW-14)/COLS,(H-topPad-botPad)/ROWS)));
  GW=CELL*COLS; GH=CELL*ROWS; GX=RAILW+Math.round((W-RAILW-GW)/2); GY=topPad; }

/* ---------- seeded rng (mulberry32) ---------- */
function mulberry(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ---------- state ---------- */
let G=null, running=false, last=0;
let best=+(localStorage.getItem('burj_bestclean')||0);
const _qp=new URLSearchParams(location.search);
const beatM=+(_qp.get('m')||_qp.get('beat')||0)||0;
const seedQ=_qp.get('seed');
const taughtOnce=new Set();

function shuffleBag(rng){const b=TYPES.slice();for(let i=b.length-1;i>0;i--){const j=(rng()*(i+1))|0;[b[i],b[j]]=[b[j],b[i]];}return b;}
function blueprintMask(sec){ const hs=BLUEPRINTS[sec]; const m=new Int8Array(COLS*ROWS); let tot=0;
  for(let c=0;c<COLS;c++){ for(let k=0;k<hs[c];k++){ const r=ROWS-1-k; m[r*COLS+c]=1; tot++; } } return {mask:m,total:tot}; }

function newGame(){
  const ps=seedQ!=null?parseInt(seedQ,10):NaN;
  const seed=(isNaN(ps)?((Math.random()*1e9)|0):ps)>>>0;
  G={ seed:seed, grid:new Int8Array(COLS*ROWS), sec:0, budget:START_BUDGET, over:false, won:false, flash:0, lockT:0, lockResets:0, built:[],
    rng:mulberry(seed), bag:[], next:null, hold:null, holdUsed:false, cur:null,
    dropAcc:0, pieceCount:0, sponsorsLeased:0, sumOnplan:0, sumPlaced:0, cleanSections:0,
    shake:0, fade:0, secMaskTotal:0 };
  G.bag=shuffleBag(G.rng);
  loadSection(0); G.next=nextType(); spawn();
}
function nextType(){ if(G.bag.length===0)G.bag=shuffleBag(G.rng); return G.bag.pop(); }
function loadSection(sec){ const bp=blueprintMask(sec); G.mask=bp.mask; G.secMaskTotal=bp.total; G.grid.fill(0); }

function pieceCells(p){ return SHAPES[p.t][p.rot].map(([dc,dr])=>[p.px+dc,p.py+dr]); }
function collide(cells){ for(const [c,r] of cells){ if(c<0||c>=COLS||r>=ROWS) return true; if(r>=0 && G.grid[r*COLS+c]) return true; } return false; }
function pieceMat(){ // material weights drift toward concrete/gold as you climb
  const sec=G.sec; if(G.pieceCount>0 && G.pieceCount%6===0) return 'sponsor';
  const r=G.rng(); if(sec>=6){ if(r<.45)return 'gold'; if(r<.8)return 'concrete'; return 'glass'; }
  if(sec>=3){ if(r<.55)return 'glass'; if(r<.85)return 'concrete'; return 'gold'; }
  return r<.8?'glass':'concrete'; }
function spawn(t){ const ty=t||G.next; if(!t)G.next=nextType();
  G.pieceCount++;
  const cells0=SHAPES[ty][0]; const bw=Math.max(...cells0.map(c=>c[0]))+1;
  const p={t:ty,rot:0,px:((COLS-bw)/2)|0,py:0,mat:pieceMat(),tenant:null};
  if(p.mat==='sponsor')p.tenant=TENANTS[(G.sponsorsLeased)%TENANTS.length];
  G.cur=p; G.holdUsed=false; G.dropAcc=0; G.lockT=0; G.lockResets=0;
  if(collide(pieceCells(p))){ endGame('collapse'); } }

/* ---------- input ops ---------- */
function lockReset(){ if(G.lockResets<14){ G.lockT=0; G.lockResets++; } }
function tryMove(dx){ if(!G.cur)return; const p=G.cur,nc=pieceCells({...p,px:p.px+dx}); if(!collide(nc)){p.px+=dx;sfxMove();lockReset();} }
function tryRotate(){ if(!G.cur)return; const p=G.cur,nr=(p.rot+1)&3;
  for(const k of [0,-1,1,-2,2]){ if(!collide(pieceCells({...p,rot:nr,px:p.px+k}))){ p.rot=nr; p.px+=k; sfxRot(); lockReset(); return; } } }
function softStep(){ if(!G.cur)return false; const p=G.cur,nc=pieceCells({...p,py:p.py+1}); if(!collide(nc)){p.py++;return true;} lockPiece(); return false; }
function hardDrop(){ if(!G.cur)return; const p=G.cur; while(!collide(pieceCells({...p,py:p.py+1})))p.py++; lockPiece(); }
function holdSwap(){ if(!G.cur||G.holdUsed)return; const cu=G.cur.t; if(G.hold){ const h=G.hold; G.hold=cu; spawn(h); } else { G.hold=cu; spawn(); } G.holdUsed=true; }

function lockPiece(){ const p=G.cur; let cost=0;
  for(const [c,r] of pieceCells(p)){ if(r<0){ G.cur=null; endGame('collapse'); return; } G.grid[r*COLS+c]=MV[p.mat]; cost+=3; }
  G.budget-=cost; sfxLock(); G.shake=2.5; teach('rule',T().tRule);
  if(p.mat==='sponsor'){ G.budget+=70; G.sponsorsLeased++;
    if(!taughtOnce.has('spon')){teach('spon',T().tSponsorFirst);} else coach(T().tSponsor(num(70)));
    const bv=document.querySelector('.stat.b .val'); if(bv){bv.classList.add('low');setTimeout(()=>bv.classList.remove('low'),700);} }
  G.cur=null;
  // section complete? each column built up to its target HEIGHT (holes/spill just
  // cost MATCH%, never block progress — forgiving by design)
  let done=true; const tg=BLUEPRINTS[G.sec];
  for(let c=0;c<COLS;c++){ let top=-1; for(let r=0;r<ROWS;r++){ if(G.grid[r*COLS+c]){top=r;break;} } const hh=top<0?0:(ROWS-top); if(hh<tg[c]){ done=false; break; } }
  if(done){ sectionComplete(); return; }
  if(G.budget<=0){ endGame('bankrupt'); return; }
  spawn();
}
function sectionComplete(){
  let placed=0,onplan=0; for(let i=0;i<G.grid.length;i++){ if(G.grid[i]){ placed++; if(G.mask[i])onplan++; } }
  const tot=G.secMaskTotal; const m=Math.round(100*onplan/Math.max(1,placed)); // % of blocks that landed on plan
  G.sumOnplan+=onplan; G.sumPlaced+=placed;
  const clean=(placed===onplan && onplan>=tot); // exact: filled the plan, no spill, no holes
  if(clean){ G.cleanSections++; G.budget+=60; coach(T().tClean+num(60)); }
  else teach('spill',T().tSpill);
  // record this floor for the rising tower (dominant material = its look)
  { let cnt={}; for(let i=0;i<G.grid.length;i++){const v=G.grid[i];if(v)cnt[v]=(cnt[v]||0)+1;} let dv=1,dn=0; for(const k in cnt){if(cnt[k]>dn){dn=cnt[k];dv=+k;}} G.built.push(cellColor(dv)); }
  sfxClear(); toast(T().secClear(num(m))); G.flash=0.5; track('section');
  G.sec++;
  if(G.sec>=BLUEPRINTS.length){ endGame('win'); return; }
  loadSection(G.sec); spawn();
  if(G.sec===1) teach('hold',T().tHold);
  if(G.sec>=3) teach('spire',T().tSpire);
}
function overallClean(){ return G.sumPlaced>0? Math.round(100*G.sumOnplan/G.sumPlaced) : 100; }

/* ---------- update ---------- */
function dropInterval(){ return Math.max(0.24, 0.92 - G.sec*0.05); } // late skill is placement, not reflex
function update(dt){ if(!G||G.over){ if(G&&G.fade<1)G.fade=Math.min(1,G.fade+dt*2); return; }
  G.shake*=Math.pow(0.0015,dt); if(G.flash>0)G.flash=Math.max(0,G.flash-dt*2);
  if(G.cur){ const grounded=collide(pieceCells({...G.cur,py:G.cur.py+1}));
    if(grounded){ G.lockT+=dt; if(G.lockT>=0.45) lockPiece(); }   // lock delay: nudge/tuck before it sets
    else { G.lockT=0; G.dropAcc+=dt; if(G.dropAcc>=dropInterval()){ G.dropAcc=0; softStep(); } } } }

/* ---------- render ---------- */
function cellColor(v){ return v===1?MAT.glass:v===2?MAT.concrete:v===3?MAT.gold:MAT.sponsor; }
/* settled cells render as real building parts — lit glass windows, cement,
   gold cladding, AD billboards — so locking a piece visibly "builds" the tower */
function drawSettled(c,r,v){ const x=GX+c*CELL, y=GY+r*CELL, s=CELL;
  if(v===1){ ctx.fillStyle='#1f5c97'; ctx.fillRect(x+1,y+1,s-2,s-2); const g=(s-3)/2;
    for(let a=0;a<2;a++)for(let b=0;b<2;b++){ const lit=((c*7+r*13+a*3+b*5)%5===0); ctx.fillStyle=lit?'#ffe9a8':'#62d2f0'; ctx.fillRect(x+1.5+a*(g+1),y+1.5+b*(g+1),g-0.5,g-0.5); } }
  else if(v===2){ ctx.fillStyle='#9aa0a6'; ctx.fillRect(x+1,y+1,s-2,s-2); ctx.strokeStyle='rgba(55,59,67,.55)'; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x+1,y+s*0.5); ctx.lineTo(x+s-1,y+s*0.5); ctx.stroke(); ctx.fillStyle='rgba(55,59,67,.4)'; ctx.fillRect(x+s*0.5,y+1,1,s-2); }
  else if(v===3){ const gd=ctx.createLinearGradient(x,y,x,y+s); gd.addColorStop(0,'#ffe08a'); gd.addColorStop(1,'#e9a23b'); ctx.fillStyle=gd; ctx.fillRect(x+1,y+1,s-2,s-2); ctx.fillStyle='rgba(255,255,255,.35)'; ctx.fillRect(x+2,y+2,s-4,Math.max(2,s*0.16)); }
  else { ctx.fillStyle='#fdf3e3'; ctx.fillRect(x+1,y+1,s-2,s-2); ctx.strokeStyle='#ffd166'; ctx.lineWidth=2; ctx.strokeRect(x+2,y+2,s-4,s-4); ctx.fillStyle='#9a6a12'; ctx.font='900 '+Math.max(7,s*0.36)+'px Courier New'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText('AD',x+s/2,y+s/2); } }
function drawCell(c,r,col,alpha,blue){ const x=GX+c*CELL, y=GY+r*CELL;
  ctx.globalAlpha=alpha==null?1:alpha; ctx.fillStyle=col; ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
  if(!blue){ ctx.fillStyle='rgba(255,255,255,.16)'; ctx.fillRect(x+1,y+1,CELL-2,Math.max(2,CELL*0.18)); }
  ctx.globalAlpha=1; }
function drawBackdrop(){ const dusk=G&&G.sec>=5; const img=dusk?ART['bg-dusk']:ART['bg-day'];
  if(img){ const ir=img.width/img.height,cr=W/H; let dw,dh; if(ir>cr){dh=H;dw=H*ir;}else{dw=W;dh=W/ir;} ctx.drawImage(img,(W-dw)/2,(H-dh)/2,dw,dh); }
  else{ const g=ctx.createLinearGradient(0,0,0,H); if(dusk){g.addColorStop(0,'#0d1120');g.addColorStop(.6,'#5e3c8f');g.addColorStop(1,'#e9a23b');}else{g.addColorStop(0,'#3ea0e6');g.addColorStop(1,'#e9c08b');} ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
  ctx.fillStyle='rgba(5,7,14,.45)'; ctx.fillRect(0,0,W,H); }
function render(){ ctx.clearRect(0,0,W,H); drawBackdrop(); if(!G)return;
  const shx=(Math.random()*2-1)*G.shake;
  ctx.save(); ctx.translate(shx,0);
  // playfield panel
  ctx.fillStyle='rgba(13,17,32,.55)'; ctx.fillRect(GX-3,GY-3,GW+6,GH+6);
  ctx.strokeStyle='rgba(253,243,227,.18)'; ctx.lineWidth=2; ctx.strokeRect(GX-3,GY-3,GW+6,GH+6);
  // blueprint ghost (target cells to fill)
  for(let i=0;i<G.mask.length;i++){ if(G.mask[i]&&!G.grid[i]){ const c=i%COLS,r=(i/COLS)|0; const x=GX+c*CELL,y=GY+r*CELL;
    ctx.fillStyle='rgba(255,209,102,.13)'; ctx.fillRect(x+1,y+1,CELL-2,CELL-2);
    ctx.strokeStyle='rgba(255,209,102,.5)'; ctx.lineWidth=1; ctx.strokeRect(x+1.5,y+1.5,CELL-3,CELL-3); } }
  // locked cells
  for(let i=0;i<G.grid.length;i++){ const v=G.grid[i]; if(!v)continue; const c=i%COLS,r=(i/COLS)|0;
    drawSettled(c,r,v); if(!G.mask[i]){ ctx.fillStyle='rgba(255,93,115,.42)'; ctx.fillRect(GX+c*CELL+1,GY+r*CELL+1,CELL-2,CELL-2); } }
  // persistent gold "build up to here" line per column (stays after cells fill)
  { const tgl=BLUEPRINTS[G.sec]; for(let c=0;c<COLS;c++){ const ty=GY+(ROWS-tgl[c])*CELL; ctx.fillStyle='rgba(255,209,102,.92)'; ctx.fillRect(GX+c*CELL+1,ty-1,CELL-2,3); } }
  // ghost landing + current piece
  if(G.cur){ const p=G.cur; let gy=0; while(!collide(pieceCells({...p,py:p.py+gy+1})))gy++;
    for(const [c,r] of pieceCells(p)){ if(r+gy>=0){ const x=GX+c*CELL,y=GY+(r+gy)*CELL; ctx.strokeStyle='rgba(253,243,227,.45)'; ctx.lineWidth=1.5; ctx.strokeRect(x+2,y+2,CELL-4,CELL-4); } }
    for(const [c,r] of pieceCells(p)){ if(r>=0) drawCell(c,r,MAT[p.mat]); } }
  ctx.restore();
  if(G.flash>0){ ctx.fillStyle='rgba(255,209,102,'+(G.flash*0.45)+')'; ctx.fillRect(GX-3,GY-3,GW+6,GH+6); } // section-clear flash
  drawRailTower();
  // hold / next previews in the band above the grid
  drawMini(G.hold, GX, GY-30, lang==='ar'?'احتفاظ':'HOLD');
  drawMini(G.next, GX+GW-4*9, GY-30, lang==='ar'?'التالي':'NEXT');
  // HUD values
  document.getElementById('hSection').textContent=num(Math.min(G.sec+1,BLUEPRINTS.length))+'/'+num(BLUEPRINTS.length);
  document.getElementById('hMatch').textContent=num(overallClean())+'%';
  const bv=document.getElementById('hBudget'); bv.textContent=num(Math.max(0,G.budget)); bv.classList.toggle('low',G.budget<=200);
}
function drawMini(t,x,y,lab){ const s=9;
  ctx.fillStyle='rgba(253,243,227,.55)'; ctx.font='800 10px Courier New'; ctx.textAlign='left'; ctx.textBaseline='alphabetic';
  ctx.fillText(lab,x,y-3);
  if(!t)return; const cells=SHAPES[t][0];
  for(const [c,r] of cells){ ctx.fillStyle='rgba(253,243,227,.85)'; ctx.fillRect(x+c*s, y+r*s, s-1, s-1); } }
/* the rising Burj — grows one tapering floor per completed section, toward the spire */
function drawRailTower(){ if(!G)return; const x0=6,x1=RAILW-6,cx=(x0+x1)/2,innerW=x1-x0;
  const top=GY,bot=H-76-6,n=BLUEPRINTS.length,segH=(bot-top-26)/(n+1);
  let y=bot;
  for(let s=0;s<G.built.length;s++){ const w=innerW*(1-s*0.045),h=segH-2;
    ctx.fillStyle=G.built[s]; ctx.globalAlpha=.96; ctx.fillRect(cx-w/2,y-h,w,h); ctx.globalAlpha=1;
    ctx.fillStyle='rgba(13,17,32,.28)'; for(let wy=y-h+3; wy<y-2; wy+=4) ctx.fillRect(cx-w/2+2,wy,w-4,1);
    y-=segH; }
  if(!G.over && G.sec<n){ const w=innerW*(1-G.sec*0.045); ctx.strokeStyle='rgba(255,209,102,.6)'; ctx.lineWidth=1; ctx.setLineDash([3,3]); ctx.strokeRect(cx-w/2,y-(segH-2),w,segH-2); ctx.setLineDash([]); }
  const sy=top+22; ctx.fillStyle=G.won?'#dfe6ee':'rgba(223,230,238,.32)'; ctx.beginPath(); ctx.moveTo(cx,sy-16); ctx.lineTo(cx-7,sy); ctx.lineTo(cx+7,sy); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(253,243,227,.85)'; ctx.font='800 10px Courier New'; ctx.textAlign='center'; ctx.textBaseline='alphabetic'; ctx.fillText(num(G.sec*M_PER_SEC)+mUnit(),cx,bot+13); }

/* ---------- loop ---------- */
function frame(ts){ const dt=Math.min(0.05,(ts-last)/1000||0); last=ts; if(running||(G&&G.over))update(dt); render(); requestAnimationFrame(frame); }
requestAnimationFrame(frame);

/* ---------- flow ---------- */
function start(){ document.getElementById('menu').style.display='none'; document.getElementById('over').style.display='none';
  document.getElementById('hud').style.display='block'; document.getElementById('ctrls').style.display='flex';
  newGame(); running=true; last=performance.now(); stopTheme(); document.getElementById('coach').classList.remove('show');
  teach('move',T().tMove); setTimeout(()=>{ if(running)teach('drop2',T().tDrop); },2600); track('start'); }
function endGame(why){ if(G.over)return; G.over=true; running=false; G.won=(why==='win'); why==='win'?sfxWin():sfxBad();
  const clean=overallClean(); if(clean>best && G.sec>0){ best=clean; try{localStorage.setItem('burj_bestclean',best);}catch(e){} }
  const h=G.sec*M_PER_SEC;
  document.getElementById('overWhy').textContent=T()[why]||T().collapse;
  document.getElementById('overMatch').textContent=num(clean)+'%';
  document.getElementById('overSub').textContent=why==='win'?T().winSub:T().overSub(num(G.sec),num(h));
  document.getElementById('overSales').textContent=T().sales(num(G.sponsorsLeased));
  document.getElementById('hud').style.display='none'; document.getElementById('ctrls').style.display='none';
  document.getElementById('over').style.display='flex'; refreshBest(); playTheme(); track(why==='win'?'win':'over'); }
function refreshBest(){ const b=best>0?T().best(num(best)):''; const a=document.getElementById('menuBest'),c=document.getElementById('menuBest2'); if(a)a.textContent=b; if(c)c.textContent=b; }

/* ---------- share ---------- */
function buildCard(){ const c=document.createElement('canvas');c.width=1080;c.height=1350;const x=c.getContext('2d');
  const g=x.createLinearGradient(0,0,0,1350);g.addColorStop(0,'#0d1120');g.addColorStop(.55,'#3a2b6b');g.addColorStop(1,'#e9a23b');
  x.fillStyle=g;x.fillRect(0,0,1080,1350);x.textAlign='center';
  x.fillStyle='#ffd166';x.font='900 70px Courier New';x.fillText('BUILD THE BURJ',540,128);
  x.fillStyle='#fdf3e3';x.font='800 34px Heebo,Arial';x.fillText('ابنِ البرج',540,176);
  // mini skyline from completed sections (use blueprint profiles)
  const baseW=440, n=Math.min(G?G.sec:0,BLUEPRINTS.length); let yb=980;
  for(let s=0;s<n;s++){ const hs=BLUEPRINTS[s], segH=Math.max(...hs); const tw=baseW*(1-s*0.055), sh=Math.min(segH*9,60), sx=540-tw/2, cw=tw/COLS;
    for(let cc=0;cc<COLS;cc++){ const bh=(hs[cc]/segH)*sh; x.fillStyle=cc%2?'#3ee6ff':'#7fb6e6'; x.globalAlpha=.94; x.fillRect(sx+cc*cw+2,yb-bh,cw-4,bh); x.globalAlpha=1; }
    yb-=sh+3; }
  x.fillStyle='#dfe6ee'; x.beginPath(); x.moveTo(540,yb); x.lineTo(530,yb+42); x.lineTo(550,yb+42); x.closePath(); x.fill(); // spire
  const clean=G?overallClean():0;
  x.fillStyle='#7ee8c7';x.font='900 150px Courier New';x.fillText(num(clean)+'%',540,1150);
  x.fillStyle='#fdf3e3';x.font='800 36px Courier New';x.fillText((G&&G.won?'👑 ':'')+(lang==='ar'?'بناء نظيف':'CLEAN BUILD'),540,1205);
  x.fillStyle='rgba(253,243,227,.9)';x.font='800 30px Courier New';x.fillText(num(G?G.sec:0)+(lang==='ar'?' أقسام · ':' sections · ')+num((G?G.sec:0)*M_PER_SEC)+mUnit(),540,1256);
  x.fillStyle='#ffd166';x.font='800 27px Courier New';x.fillText(lang==='ar'?'نفس المخططات — تغلّب عليّ':'SAME BLUEPRINTS — BEAT ME',540,1298);
  x.fillStyle='rgba(253,243,227,.8)';x.font='800 26px Courier New';x.fillText('miklatgames.fun/burj',540,1334);
  return c; }
async function share(){ const clean=overallClean(), s=G.sec, h=s*M_PER_SEC;
  let txt=G.won?T().shareWin(num(clean)):T().shareTxt(num(clean),num(s),num(h));
  txt=txt.replace('miklatgames.fun/burj','miklatgames.fun/burj?m='+clean+'&seed='+(G.seed||''));
  try{ const card=buildCard(); const blob=await new Promise(r=>card.toBlob(r,'image/png'));
    if(blob&&navigator.canShare){ const f=new File([blob],'burj.png',{type:'image/png'}); if(navigator.canShare({files:[f]})){ await navigator.share({files:[f],text:txt}); track('share'); return; } }
    if(navigator.share){ await navigator.share({text:txt}); track('share'); return; }
    await navigator.clipboard.writeText(txt); toast(T().copied); track('share-copy');
  }catch(e){ try{ await navigator.clipboard.writeText(txt); toast(T().copied);}catch(_){} } }

/* ---------- ui ---------- */
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),1400);}
function coach(m){const c=document.getElementById('coach');c.textContent=m;c.classList.add('show');clearTimeout(c._t);c._t=setTimeout(()=>c.classList.remove('show'),1900);}
function teach(id,m){ if(taughtOnce.has(id))return; taughtOnce.add(id); coach(m); }
function track(n){ try{ if(window.goatcounter&&window.goatcounter.count)window.goatcounter.count({path:'evt-burj-'+n,event:true}); }catch(e){} }

document.getElementById('startBtn').addEventListener('click',start);
document.getElementById('againBtn').addEventListener('click',start);
document.getElementById('shareBtn').addEventListener('click',share);
document.getElementById('langBtn').addEventListener('click',()=>{lang=lang==='ar'?'en':'ar';try{localStorage.setItem('burj_lang',lang);}catch(e){}applyLang();});
document.getElementById('muteBtn').addEventListener('click',()=>{muted=!muted;try{localStorage.setItem('burj_mute',muted?'1':'0');}catch(e){}document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';muted?stopTheme():playTheme();});
document.getElementById('muteBtn').textContent=muted?'🔇':'🔊';
document.getElementById('holdBtn').addEventListener('click',()=>{if(running)holdSwap();});
// control buttons
const bind=(id,fn)=>{const e=document.getElementById(id); e.addEventListener('pointerdown',ev=>{ev.preventDefault();if(running)fn();});};
bind('bLeft',()=>tryMove(-1)); bind('bRight',()=>tryMove(1)); bind('bRot',tryRotate); bind('bDrop',hardDrop);
window.addEventListener('keydown',e=>{ if(!running)return; const k=e.code;
  if(k==='ArrowLeft'){e.preventDefault();tryMove(-1);} else if(k==='ArrowRight'){e.preventDefault();tryMove(1);}
  else if(k==='ArrowUp'||k==='KeyX'){e.preventDefault();tryRotate();} else if(k==='Space'){e.preventDefault();hardDrop();}
  else if(k==='ArrowDown'){e.preventDefault();softStep();} else if(k==='KeyC'||k==='ShiftLeft'){e.preventDefault();holdSwap();} });
// swipe on canvas (bonus to the buttons)
let sx0=0,sy0=0,st0=0;
cv.addEventListener('pointerdown',e=>{sx0=e.clientX;sy0=e.clientY;st0=performance.now();},{passive:true});
cv.addEventListener('pointerup',e=>{ if(!running)return; const dx=e.clientX-sx0,dy=e.clientY-sy0,dt=performance.now()-st0;
  if(Math.abs(dx)<14&&Math.abs(dy)<14&&dt<260){ tryRotate(); return; }
  if(dy>Math.abs(dx)&&dy>CELL*2){ hardDrop(); return; }
  if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>CELL*0.7){ tryMove(dx>0?1:-1); } });
