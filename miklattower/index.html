<body>
<div id="wrap"><canvas id="cv"></canvas></div>
<script>
'use strict';
/* ============================================================
   MIKLAT TOWER — a no-violence climbing rescue game.
   Dig Dug engine turned on its head: clear the balagan in an
   apartment tower, collect the neighbors upstairs, bring them
   down to the basement miklat before the siren window closes.
   ============================================================ */
const W=520, H=800, TILE=40, COLS=13, ROWS=20, TOP=2, LOBBY=ROWS-1;
const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
const dpr=Math.min(window.devicePixelRatio||1,2);
cv.width=W*dpr; cv.height=H*dpr; ctx.scale(dpr,dpr);
function fit(){
  const s=Math.min(innerWidth/W, innerHeight/H);
  cv.style.width=(W*s)+'px'; cv.style.height=(H*s)+'px';
}
addEventListener('resize',fit); fit();
let RNG=Math.random;                       // swapped to seeded srand during challenge runs
const rnd=(a,b)=>a+RNG()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const clamp=(v,a,b)=>v<a?a:(v>b?b:v);
const cellCX=c=>c*TILE+TILE/2, cellCY=r=>r*TILE+TILE/2;
const cellOf=(x,y)=>[clamp(Math.floor(x/TILE),0,COLS-1), clamp(Math.floor(y/TILE),0,ROWS-1)];
const dist=(ax,ay,bx,by)=>Math.hypot(ax-bx,ay-by);
const store={get(k){try{return localStorage.getItem(k)}catch(e){return null}},
             set(k,v){try{localStorage.setItem(k,v)}catch(e){}}};
function track(name){ try{ if(window.goatcounter&&window.goatcounter.count)
  window.goatcounter.count({path:'evt-'+name,event:true}); }catch(e){} }

/* ---------------- seedable RNG (challenge links) ---------------- */
let _seed=0;
function setSeed(n){ _seed=n>>>0; }
function srand(){                                   // mulberry32
  _seed=(_seed+0x6D2B79F5)|0;
  let t=Math.imul(_seed^_seed>>>15,1|_seed);
  t=(t+Math.imul(t^t>>>7,61|t))^t;
  return ((t^t>>>14)>>>0)/4294967296;
}
function seedForLevel(seed,lvl){ return ((seed>>>0)^Math.imul(lvl+1,0x9E3779B1))>>>0; }
function randSeed(){ return (Math.floor(Math.random()*0xFFFFFF)+1)>>>0; }

/* ---------------- difficulty ---------------- */
const DIFFS={
  easy:{key:'easy',name:'EASY',  sub:'שקט', hearts:4,timeMul:1.30,critMul:0.75,spdMul:0.85,rockMul:0.75,col:'#63e6be'},
  med: {key:'med', name:'MEDIUM',sub:'רגיל',hearts:3,timeMul:1.00,critMul:1.00,spdMul:1.00,rockMul:1.00,col:'#ffd166'},
  hard:{key:'hard',name:'HARD',  sub:'אזעקה',hearts:2,timeMul:0.80,critMul:1.30,spdMul:1.20,rockMul:1.25,col:'#ff8787'}
};
const _params=new URLSearchParams(location.search);
const _seedParam=_params.get('seed'), _dParam=_params.get('d');
const OVER_SHARE={x:W/2-152,y:Math.round(H*0.66),w:140,h:46};
const OVER_AGAIN={x:W/2+12, y:Math.round(H*0.66),w:140,h:46};

/* ---------------- sound (synth only, no assets) ---------------- */
const Snd={
  ac:null, on:store.get('twr_mute')!=='1', digT:0,
  ctx(){ if(!this.ac){ try{this.ac=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} }
    if(this.ac&&this.ac.state==='suspended') this.ac.resume(); return this.ac; },
  beep(f,dur,type,vol,slide){
    if(!this.on)return; const a=this.ctx(); if(!a)return;
    const o=a.createOscillator(), g=a.createGain(), t=a.currentTime;
    o.type=type||'square'; o.frequency.setValueAtTime(f,t);
    if(slide) o.frequency.exponentialRampToValueAtTime(Math.max(30,slide),t+dur);
    g.gain.setValueAtTime(vol||0.08,t);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.connect(g).connect(a.destination); o.start(t); o.stop(t+dur);
  },
  dig(dt){ this.digT-=dt; if(this.digT<=0){ this.digT=0.13; this.beep(rnd(70,95),0.08,'square',0.05); } },
  pop(){ this.beep(420,0.12,'square',0.09,820); },
  chime(){ this.beep(660,0.09,'square',0.07); setTimeout(()=>this.beep(880,0.12,'square',0.07),80); },
  fanfare(){ [523,659,784,1047].forEach((f,i)=>setTimeout(()=>this.beep(f,0.16,'square',0.09),i*110)); },
  hurt(){ this.beep(300,0.4,'sawtooth',0.1,70); },
  thud(){ this.beep(60,0.25,'sine',0.18,35); },
  sirenBeat(){ this.beep(700,0.22,'triangle',0.07,950); },
  toggle(){ this.on=!this.on; store.set('twr_mute',this.on?'0':'1'); }
};

/* ---------------- music (mp3 loops) ----------------
   menu theme on the home screen + between levels; a per-level gameplay
   track that cycles A/B/C. Lazy-loaded, crossfaded, tied to the mute toggle. */
const Mus={
  paths:{menu:'music/menu.mp3',lvl0:'music/level-a.mp3',lvl1:'music/level-b.mp3',lvl2:'music/level-c.mp3'},
  tracks:{}, cur:null, vol:0.4, _try:0, _fail:false,
  el(key){ if(this.tracks[key])return this.tracks[key]; if(this._fail)return null;
    try{ const a=new Audio(this.paths[key]); a.loop=true; a.volume=0; a.preload='none'; this.tracks[key]=a; return a; }
    catch(e){ this._fail=true; return null; } },
  want(key){ this.cur=key; },
  tick(dt){
    if(this._fail)return;
    if(this.cur&&Snd.on){ const a=this.el(this.cur), now=performance.now();
      if(a&&a.paused&&now-this._try>600){ this._try=now; const p=a.play(); if(p&&p.catch)p.catch(()=>{}); } }
    for(const k in this.tracks){ const a=this.tracks[k];
      const tgt=(k===this.cur&&Snd.on)?this.vol:0;
      let v=a.volume;
      if(v!==tgt){ v=v+(tgt-v)*Math.min(1,dt*4); if(Math.abs(v-tgt)<0.012)v=tgt; a.volume=clamp(v,0,1); }
      if(tgt===0&&a.volume<=0.012&&!a.paused) a.pause();
    }
  }
};

/* ---------------- input ---------------- */
const Inp={ want:null, fire:false, keys:{},
  pad:{cx:96,cy:H-104,r:78,btnx:W-84,btny:H-104,btnr:46},
  touchSeen:false, touches:{}, swipe:null };
const KEYDIR={ArrowLeft:'L',ArrowRight:'R',ArrowUp:'U',ArrowDown:'D',a:'L',d:'R',w:'U',s:'D',A:'L',D:'R',W:'U',S:'D'};
addEventListener('keydown',e=>{
  if(e.repeat)return;
  const d=KEYDIR[e.key];
  if(d){ Inp.want=d; Inp.keys[d]=true; e.preventDefault(); }
  if(e.key===' '){ Inp.fire=true; e.preventDefault(); }
  if(e.key==='m'||e.key==='M') Snd.toggle();
  if(e.key==='p'||e.key==='P'||e.key==='Escape') togglePause();
  uiKey(e.key);
});
addEventListener('keyup',e=>{
  const d=KEYDIR[e.key];
  if(d){ Inp.keys[d]=false;
    if(Inp.want===d){ Inp.want=null;
      for(const k of ['L','R','U','D']) if(Inp.keys[k]) Inp.want=k; } }
});
function toGame(t){
  const r=cv.getBoundingClientRect();
  return [(t.clientX-r.left)*W/r.width,(t.clientY-r.top)*H/r.height];
}
function padDir(x,y){
  const p=Inp.pad, dx=x-p.cx, dy=y-p.cy;
  if(Math.hypot(dx,dy)>p.r+26) return null;
  return Math.abs(dx)>Math.abs(dy)?(dx<0?'L':'R'):(dy<0?'U':'D');
}
cv.addEventListener('touchstart',e=>{
  e.preventDefault(); Inp.touchSeen=true; Snd.ctx();
  for(const t of e.changedTouches){
    const [x,y]=toGame(t);
    if(uiTap(x,y)) continue;
    const p=Inp.pad;
    if(dist(x,y,p.btnx,p.btny)<p.btnr+18){ Inp.fire=true; Inp.touches[t.identifier]={kind:'btn'}; continue; }
    const d=padDir(x,y);
    if(d){ Inp.want=d; Inp.touches[t.identifier]={kind:'pad'}; }
    else Inp.touches[t.identifier]={kind:'swipe',x,y};
  }
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches){
    const o=Inp.touches[t.identifier]; if(!o)continue;
    const [x,y]=toGame(t);
    if(o.kind==='pad'){ const d=padDir(x,y); if(d)Inp.want=d; }
    else if(o.kind==='swipe'){
      const dx=x-o.x, dy=y-o.y;
      if(Math.hypot(dx,dy)>24){
        Inp.want=Math.abs(dx)>Math.abs(dy)?(dx<0?'L':'R'):(dy<0?'U':'D');
        o.x=x;o.y=y;
      }
    }
  }
},{passive:false});
cv.addEventListener('touchend',e=>{
  e.preventDefault();
  for(const t of e.changedTouches) delete Inp.touches[t.identifier];
},{passive:false});
cv.addEventListener('mousedown',e=>{
  Snd.ctx(); const [x,y]=toGame(e); uiTap(x,y);
});

/* ---------------- game state ---------------- */
const G={
  state:'title', level:1, score:0, hearts:3, maxHearts:3, time:100, rescued:0, totalRes:3,
  diffKey:(DIFFS[_dParam]?_dParam:(store.get('twr_diff')||'med')),
  seed:null, challengeSeed:(_seedParam!=null?((parseInt(_seedParam,36)>>>0)||randSeed()):null),
  best:0, runRescued:0,
  lvlFalafelHits:0, lvlDogs:0, dogsRescued:0, pacifists:0, grandTours:0, overShareMsg:'',
  passable:null, rocks:[], critters:[], residents:[], supplies:[], falafels:[],
  chain:[], trail:[], parts:[], toasts:[],
  clearT:0, overReason:'', sirenT:0, shake:0
};
const P={ x:0,y:0, dir:null, face:'R', invuln:0, fireCd:0, anim:0, digging:false };
// migrate the old single best into the Medium slot, then load the active difficulty's best
if(!store.get('twr_best_med')&&store.get('twr_best')) store.set('twr_best_med',store.get('twr_best'));
function bestKey(){ return 'twr_best_'+(G.diffKey||'med'); }
function loadBest(){ G.best=+(store.get(bestKey())||0); }
function setDiff(k){ if(!DIFFS[k]||G.state!=='title')return; G.diffKey=k; store.set('twr_diff',k); loadBest(); Snd.chime(); }
loadBest();

/* dirt overlay canvas */
const dirt=document.createElement('canvas');
dirt.width=W*dpr; dirt.height=H*dpr;
const dctx=dirt.getContext('2d'); dctx.scale(dpr,dpr);

/* title-screen keyart (falls back to the live building until it loads) */
const titleImg=new Image(); let titleReady=false;
titleImg.onload=()=>{ titleReady=true; };
titleImg.src='title.webp';

function strataCol(r){ // facade tan per clearing-speed zone (cover palette)
  if(r>14) return '#cdb78f';
  if(r>10) return '#c4ac80';
  if(r>6)  return '#b9a071';
  return '#ad9362';
}
function carve(x,y,rad){
  dctx.save(); dctx.globalCompositeOperation='destination-out';
  dctx.beginPath(); dctx.arc(x,y,rad,0,7); dctx.fill(); dctx.restore();
}
function carveCapsule(c1,r1,c2,r2){
  const steps=8;
  for(let i=0;i<=steps;i++){
    const t=i/steps;
    carve(cellCX(c1)+(cellCX(c2)-cellCX(c1))*t, cellCY(r1)+(cellCY(r2)-cellCY(r1))*t, 17);
  }
}
function openCell(c,r){
  if(!G.passable[c][r]){ G.passable[c][r]=true; carve(cellCX(c),cellCY(r),17); }
}
const isOpen=(c,r)=>c>=0&&c<COLS&&r>=TOP&&r<ROWS&&G.passable[c][r];
const rockAt=(c,r)=>G.rocks.find(k=>k.state!=='fall'&&k.c===c&&k.r===r);

/* ---------------- level generation ---------------- */
function genLevel(){
  const lv=G.level;
  const diff=DIFFS[G.diffKey]||DIFFS.med;
  // challenge runs derive each floor's layout from the shared seed; free play is pure random
  if(G.seed!=null){ RNG=srand; setSeed(seedForLevel(G.seed,lv)); } else { RNG=Math.random; }
  // level plan: higher rescues, more of everything, pigeons from L2
  const plan={
    res:Math.min(3+((lv-1)>>1),6),            // 3,3,4,4,5,5,6
    critters:Math.min(1+lv,6),
    resMin:Math.max(3,12-2*lv), resMax:Math.max(11,16-lv),
    rocks:4+Math.min(lv,4),
    corridors:lv>=2?ri(1,2):0
  };
  G.totalRes=plan.res;
  G.passable=Array.from({length:COLS},()=>Array(ROWS).fill(false));
  for(let c=0;c<COLS;c++) G.passable[c][LOBBY]=true;
  G.rocks=[]; G.critters=[]; G.residents=[]; G.supplies=[]; G.falafels=[]; G.pockets=[];
  G.chain=[]; G.trail=[]; G.parts=[]; G.toasts=[]; G.rescued=0;
  G.lvlFalafelHits=0; G.lvlDogs=0; G.dogsRescued=0;

  // rebuild dirt (facade you tunnel through — decorated, then carved away as you dig)
  dctx.save(); dctx.globalCompositeOperation='source-over';
  dctx.clearRect(0,0,W,H);
  // deterministic per-tower cosmetic hash — keeps decoration off the seeded gameplay RNG
  const seedBase=(G.seed||0)>>>0;
  const dh=(c,r)=>{ let x=Math.imul(((c+1)*73856093)^((r+1)*19349663)^seedBase,2654435761); return ((x^x>>>15)>>>0)/4294967296; };
  for(let r=TOP;r<LOBBY;r++){
    dctx.fillStyle=strataCol(r); dctx.fillRect(0,r*TILE,W,TILE);
    dctx.fillStyle='rgba(0,0,0,.05)';                                       // faint pilaster seams
    for(let c=1;c<COLS;c++) dctx.fillRect(c*TILE,r*TILE,1,TILE);
    dctx.fillStyle='#9c8757'; dctx.fillRect(0,(r+1)*TILE-3,W,3);            // floor slab
    dctx.fillStyle='rgba(0,0,0,.10)'; dctx.fillRect(0,(r+1)*TILE-5,W,2);    // slab undershadow
    dctx.fillStyle='rgba(255,255,255,.12)'; dctx.fillRect(0,r*TILE,W,2);    // slab highlight
    for(let c=1;c<COLS;c+=2){
      const wx=c*TILE+9, wy=r*TILE+8, lit=dh(c,r)>0.62;
      dctx.fillStyle='#8a7456'; dctx.fillRect(wx-2,wy-2,24,26);             // recessed frame
      dctx.fillStyle=lit?'#ffe9a8':'#2b3550'; dctx.fillRect(wx,wy,20,20);
      if(lit){ dctx.fillStyle='#ffd166'; dctx.fillRect(wx+2,wy+9,16,9); }   // warm room glow
      else   { dctx.fillStyle='rgba(255,255,255,.16)'; dctx.fillRect(wx,wy,20,4); } // sky reflection
      dctx.fillStyle='#6e5c40'; dctx.fillRect(wx+9,wy,2,20); dctx.fillRect(wx,wy+9,20,2); // mullion
      dctx.fillStyle='#b7a17a'; dctx.fillRect(wx-3,wy+20,26,3);             // sill
      dctx.fillStyle='rgba(0,0,0,.12)'; dctx.fillRect(wx-3,wy+23,26,1);
      if(dh(c+5,r)>0.7){                                                    // half-closed shutter (tris)
        const sh=6+Math.floor(dh(c,r+3)*8);
        dctx.fillStyle='#c2b18c'; dctx.fillRect(wx,wy,20,sh);
        dctx.fillStyle='rgba(0,0,0,.18)';
        for(let s=2;s<sh;s+=3) dctx.fillRect(wx,wy+s,20,1);
      }
      if(dh(c+1,r)>0.66){                                                   // balcony rail
        dctx.fillStyle='#7c6a4c'; dctx.fillRect(wx-4,wy+23,28,2);
        for(let b=0;b<6;b++) dctx.fillRect(wx-3+b*5,wy+23,1,5);
      }
      if(dh(c+2,r+2)>0.82){                                                 // facade AC box
        dctx.fillStyle='#dfe3e6'; dctx.fillRect(wx+20,wy+4,8,10);
        dctx.fillStyle='#b8bdc2'; dctx.fillRect(wx+20,wy+4,8,2);
      }
    }
    if(dh(r,7)>0.72){                                                       // laundry line
      const ly=r*TILE+6; dctx.strokeStyle='rgba(40,30,20,.5)'; dctx.lineWidth=1;
      dctx.beginPath(); dctx.moveTo(TILE*1.5,ly); dctx.lineTo(TILE*5.5,ly+3); dctx.stroke();
      const cols=['#e8590c','#4dabf7','#fff','#f06595'];
      for(let i=0;i<4;i++){ dctx.fillStyle=cols[i]; dctx.fillRect(TILE*1.5+18+i*28,ly+1+i,8,11); }
    }
  }
  dctx.restore();

  const used=new Set();
  const take=(c,r)=>used.add(c+','+r);
  const free=(c,r)=>!used.has(c+','+r);
  const farFromUsed=(c,r,min)=>{
    for(const k of used){ const [uc,ur]=k.split(',').map(Number);
      if(Math.abs(uc-c)+Math.abs(ur-r)<min) return false; }
    return true;
  };

  // resident pockets (2 cells wide)
  const POOL=['Mr. Mizrahi','Shula','Motti','Pnina','Dudu','Mazal'];
  const NAMES=['Savta Rivka',...POOL.sort(()=>RNG()-0.5)];
  for(let i=0;i<G.totalRes;i++){
    for(let tries=0;tries<80;tries++){
      const c=ri(1,COLS-3), r=ri(plan.resMin,plan.resMax);
      if(free(c,r)&&free(c+1,r)&&farFromUsed(c,r,4)){
        take(c,r); take(c+1,r);
        openCell(c,r); openCell(c+1,r); carveCapsule(c,r,c+1,r);
        G.pockets.push({c,r});
        G.residents.push({c:c,r:r,homeC:c,homeR:r,x:cellCX(c)+10,y:cellCY(r),
          name:NAMES[i],kind:i===0?0:1+(i%2),wave:rnd(0,6)});
        break;
      }
    }
  }
  G.totalRes=G.residents.length; // placement can fail on crowded boards; count real humans only
  // critter pockets (1 cell)
  const N=Math.max(1,Math.round(plan.critters*diff.critMul));
  for(let i=0;i<N;i++){
    for(let tries=0;tries<80;tries++){
      const c=ri(1,COLS-2), r=ri(3,ROWS-4);
      if(free(c,r)&&farFromUsed(c,r,3)){
        take(c,r); openCell(c,r);
        const kind=(lv>1&&i%2)?'pigeon':'cat';
        G.critters.push({kind, x:cellCX(c),y:cellCY(r),
          tc:c,tr:r, state:'walk', dirX:1,dirY:0,
          ghostT:rnd(5,11)*(lv===1?1.3:1), ghostDur:0, anim:rnd(0,6),
          spd:(kind==='pigeon'?52:44)*Math.min(1+0.05*(G.level-1),1.35)*diff.spdMul});
        break;
      }
    }
  }
  // dogs (bonus rescues)
  const DOGN=['Bobby','Lady','Rexi','Pitzi'].sort(()=>RNG()-0.5);
  const nd=G.level>=3?2:1;
  for(let i=0;i<nd;i++){
    for(let tries=0;tries<80;tries++){
      const c=ri(1,COLS-2), r=ri(3,ROWS-5);
      if(free(c,r)&&farFromUsed(c,r,3)){
        take(c,r); openCell(c,r);
        G.pockets.push({c,r,dog:true});
        G.residents.push({dog:true,homeC:c,homeR:r,x:cellCX(c),y:cellCY(r),
          name:DOGN[i],kind:'dog',wave:rnd(0,6)});
        G.lvlDogs++;
        break;
      }
    }
  }
  // pre-dug corridors (L2+): vary the map, give critters room to roam
  for(let i=0;i<plan.corridors;i++){
    const horiz=RNG()<0.6, len=ri(3,5);
    if(horiz){
      const r=ri(4,ROWS-3), c0=ri(0,COLS-1-len);
      for(let c=c0;c<c0+len;c++) if(free(c,r)){ take(c,r); openCell(c,r); }
      carveCapsule(c0,r,c0+len-1,r);
    } else {
      const c=ri(1,COLS-2), r0=ri(3,ROWS-2-len);
      for(let r=r0;r<r0+len;r++) if(free(c,r)){ take(c,r); openCell(c,r); }
      carveCapsule(c,r0,c,r0+len-1);
    }
  }
  // armoires (falling furniture)
  const B=Math.max(2,Math.round(plan.rocks*diff.rockMul));
  for(let i=0;i<B;i++){
    for(let tries=0;tries<80;tries++){
      const c=ri(0,COLS-1), r=ri(3,ROWS-4);
      if(free(c,r)&&free(c,r+1)){ take(c,r); G.rocks.push({c,r,x:cellCX(c),y:cellCY(r),state:'idle',t:0,vy:0}); break; }
    }
  }
  // supplies
  const ITEMS=['bamba','water','battery','radio','bamba','water'];
  for(let i=0;i<ITEMS.length;i++){
    for(let tries=0;tries<80;tries++){
      const c=ri(0,COLS-1), r=ri(3,ROWS-2);
      if(free(c,r)){ take(c,r); G.supplies.push({c,r,kind:ITEMS[i],got:false}); break; }
    }
  }
  // player to lobby
  P.x=cellCX(3); P.y=cellCY(LOBBY); P.dir=null; P.face='R'; P.invuln=0;
  G.demand=RNG()<0.5&&G.residents.some(f=>f.dog); G.dogSafe=false; G.refuseCd=0; G.chainGrace=0; G.shake=0;
  const baseTime=Math.max(80,Math.min(125,95-3*(lv-1)+14*(G.totalRes-3)));
  G.time=Math.round(baseTime*diff.timeMul);
  if(G.demand) G.time+=Math.round(12*diff.timeMul); // Savta's dog demand adds a mandatory detour
  G.sirenT=0;
  toast('Level '+lv+' — rescue '+G.totalRes+' neighbors!');
  if(lv===1&&!store.get('twr_hint')){ store.set('twr_hint','1'); toast('Climb up through the balagan! ⬆'); }
}

/* ---------------- helpers ---------------- */
function toast(msg){ G.toasts.push({msg,t:2.4}); }
function puff(x,y,col,n){
  for(let i=0;i<(n||8);i++)
    G.parts.push({x,y,vx:rnd(-90,90),vy:rnd(-120,30),t:rnd(0.3,0.7),col:col||'#d9c9a8'});
}
function addScore(n,x,y){
  G.score+=n;
  if(x!==undefined) G.parts.push({x,y,vx:0,vy:-40,t:0.9,txt:'+'+n,col:'#ffe66d'});
}

/* ---------------- player ---------------- */
const DIRV={L:[-1,0],R:[1,0],U:[0,-1],D:[0,1]};
function updatePlayer(dt){
  P.fireCd=Math.max(0,P.fireCd-dt);
  P.invuln=Math.max(0,P.invuln-dt);
  G.refuseCd=Math.max(0,(G.refuseCd||0)-dt);
  G.chainGrace=Math.max(0,(G.chainGrace||0)-dt);
  P.digging=false;
  const want=Inp.want;
  const [c,r]=cellOf(P.x,P.y);
  const ccx=cellCX(c), ccy=cellCY(r);

  if(want){
    const horizNow=P.dir==='L'||P.dir==='R';
    const wantHoriz=want==='L'||want==='R';
    if(!P.dir || want===P.dir ||
       (horizNow===wantHoriz) || // reverse along same axis
       (Math.abs(P.x-ccx)<7 && Math.abs(P.y-ccy)<7)){
      if(wantHoriz) P.y=ccy; else P.x=ccx; // stay on the new axis' grid line
      P.dir=want; P.face=want;
    }
  } else P.dir=null;

  if(P.dir){
    const [dx,dy]=DIRV[P.dir];
    // probe the spot just ahead of the player's leading edge
    const aheadX=P.x+dx*16, aheadY=P.y+dy*16;
    const [ac,ar]=cellOf(aheadX+dx*6,aheadY+dy*6);
    const blockedRock=rockAt(ac,ar);
    const minY=cellCY(TOP), maxY=cellCY(LOBBY);
    const minX=cellCX(0), maxX=cellCX(COLS-1);
    const targetOpen=isOpen(ac,ar)||(ar===LOBBY);
    const digSp=ar>14?94:ar>10?80:ar>6?68:60;
    let sp=targetOpen?140:digSp;
    if(blockedRock) sp=0;
    let nx=P.x+dx*sp*dt, ny=P.y+dy*sp*dt;
    nx=clamp(nx,minX,maxX); ny=clamp(ny,minY,maxY);
    // clamp between the roof (TOP) and the lobby floor
    if(nx!==P.x||ny!==P.y){
      P.x=nx; P.y=ny; P.anim+=dt*10;
      if(!targetOpen&&!blockedRock){ P.digging=true; Snd.dig(dt); }
      carve(P.x,P.y,17);
    }
  }
  // mark cell open when centered enough
  const [c2,r2]=cellOf(P.x,P.y);
  if(Math.abs(P.x-cellCX(c2))<13&&Math.abs(P.y-cellCY(r2))<13&&r2>=TOP) openCell(c2,r2);

  // trail for followers
  const lt=G.trail[G.trail.length-1];
  if(!lt||dist(P.x,P.y,lt.x,lt.y)>4){
    G.trail.push({x:P.x,y:P.y});
    if(G.trail.length>400) G.trail.shift();
  }

  // falafel
  if(Inp.fire){ Inp.fire=false;
    if(P.fireCd<=0){ P.fireCd=0.5;
      const [dx,dy]=DIRV[P.face]||[1,0];
      G.falafels.push({x:P.x+dx*14,y:P.y+dy*14,dx,dy,trav:0});
      Snd.beep(220,0.06,'square',0.06);
    }
  }

  // pick up residents
  for(let i=G.residents.length-1;i>=0;i--){
    const res=G.residents[i];
    if(dist(P.x,P.y,res.x,res.y)<26){
      G.residents.splice(i,1); G.chain.push(res); G.chainGrace=1.0;
      if(res.dog) toast(res.name+' the dog is following you! 🐶');
      else toast(res.name+' is with you! Down to the miklat! ⬇');
      if(res.name==='Savta Rivka'&&G.demand&&!G.dogSafe)
        toast('Savta Rivka: «Not without the dog!» 🐕');
      Snd.chime();
    }
  }
  // supplies
  for(const s of G.supplies){
    if(!s.got&&G.passable[s.c][s.r]&&dist(P.x,P.y,cellCX(s.c),cellCY(s.r))<24){
      s.got=true; addScore(100+(LOBBY-1-s.r)*10,P.x,P.y-20); Snd.chime();
    }
  }
  // rescue at the miklat door (lobby, bottom-left)
  if(G.chain.length&&P.y>cellCY(LOBBY)-8&&P.x<TILE*2.2){
    let humans=0, dogs=0; const keep=[];
    for(const f of G.chain){
      if(f.dog){ dogs++; G.dogsRescued++; G.dogSafe=true; addScore(750,P.x+rnd(-20,20),P.y-30); puff(P.x,P.y,'#ffd166',10); }
    }
    for(const f of G.chain){
      if(f.dog) continue;
      if(f.name==='Savta Rivka'&&G.demand&&!G.dogSafe){ keep.push(f); continue; }
      humans++; addScore(500,P.x+rnd(-20,20),P.y-30); puff(P.x,P.y,'#9ef0a0',10);
    }
    if(humans||dogs){
      G.rescued+=humans; G.runRescued+=humans; G.chain=keep;
      Snd.fanfare();
      G.parts.push({x:P.x,y:P.y-30,vx:0,vy:-30,t:1.0,txt:'תודה ♥',col:'#9ef0a0'});
      if(humans) toast(humans>1?humans+' neighbors safe in the miklat!':'Safe in the miklat!');
      if(dogs) toast('Woof! Dog safe in the miklat! +750 🐾');
      if(keep.length) toast('Savta Rivka: «Not without the dog!» 🐕');
      if(G.rescued>=G.totalRes){
        G.state='clear'; G.clearT=2.0; track('tower-clear');
        const bonus=Math.ceil(G.time)*10;
        addScore(bonus); toast('ALL SAFE! Time bonus +'+bonus);
        if(G.lvlFalafelHits===0){ addScore(400,P.x,P.y-52); toast('🕊 Pacifist floor — no falafel thrown! +400'); G.pacifists++; }
        if(G.supplies.length&&G.supplies.every(s=>s.got)&&G.dogsRescued>=G.lvlDogs){
          addScore(600,P.x,P.y-74); toast('🏆 Grand Tour — neighbors, dogs & supplies, all clear! +600'); G.grandTours++; }
      }
    } else if(keep.length&&G.refuseCd<=0){
      G.refuseCd=2.5; Snd.beep(180,0.2,'square',0.08);
      toast('Savta Rivka: «Not without the dog!» 🐕');
    }
  }
}
function followerPos(i){
  const lag=(i+1)*9;
  const idx=G.trail.length-1-lag;
  if(idx<0) return G.trail[0]||{x:P.x,y:P.y};
  return G.trail[idx];
}
function scatterChain(from=0){
  if(G.chain.length<=from)return;
  for(let i=from;i<G.chain.length;i++){
    const f=G.chain[i], p=followerPos(i);
    puff(p.x,p.y,'#fff',10);
    f.x=cellCX(f.homeC)+(f.dog?0:10); f.y=cellCY(f.homeR);
    G.residents.push(f);
  }
  G.chain.length=from;
  G.chainGrace=1.0;
  toast(from?'Oy! Some ran back home!':'Oy! They ran back home!');
}
function hitPlayer(){
  if(P.invuln>0||G.state!=='play')return;
  G.hearts--; P.invuln=2.5; G.shake=0.4;
  Snd.hurt(); puff(P.x,P.y,'#ffb0b0',14);
  scatterChain();
  if(G.hearts<=0){ gameOver('You got too dizzy to keep climbing!'); return; }
  P.x=cellCX(3); P.y=cellCY(LOBBY); P.dir=null; G.trail.length=0;
}
function gameOver(reason){
  G.state='over'; G.overReason=reason; G.toasts.length=0;
  track('tower-over');
  if(G.score>G.best){ G.best=G.score; store.set(bestKey(),G.best); }
}

/* ---------------- critters ---------------- */
function updateCritters(dt){
  for(const k of G.critters){
    k.anim+=dt*6;
    if(k.state==='pacified'||k.state==='startled'){
      k.y-=(k.state==='startled'?150:80)*dt; k.x+=Math.sin(k.anim*2)*20*dt;
      if(k.y<40) k.gone=true;
      continue;
    }
    if(k.state==='stun'){
      k.stunT-=dt;
      if(k.stunT<=0){ k.state='ghost'; k.ghostDur=rnd(3,5); k.gTrav=TILE; }
      continue;
    }
    if(k.state==='walk'){
      const tx=cellCX(k.tc), ty=cellCY(k.tr);
      if(dist(k.x,k.y,tx,ty)<2){
        k.x=tx; k.y=ty;
        const opts=[];
        const dirs=[[1,0],[-1,0],[0,1],[0,-1]];
        for(const [dx,dy] of dirs){
          const nc=k.tc+dx, nr=k.tr+dy;
          if(nr>=LOBBY||nr<TOP) continue; // critters stay out of the lobby
          if(isOpen(nc,nr)&&!rockAt(nc,nr)) opts.push([dx,dy]);
        }
        let pick=null;
        const fwd=opts.filter(([dx,dy])=>!(dx===-k.dirX&&dy===-k.dirY));
        const pool=fwd.length?fwd:opts;
        if(pool.length){
          if(RNG()<0.7){
            pool.sort((a,b)=>{
              const da=Math.abs(cellCX(k.tc+a[0])-P.x)+Math.abs(cellCY(k.tr+a[1])-P.y);
              const db=Math.abs(cellCX(k.tc+b[0])-P.x)+Math.abs(cellCY(k.tr+b[1])-P.y);
              return da-db;
            });
            pick=pool[0];
          } else pick=pool[ri(0,pool.length-1)];
        }
        if(pick){ k.dirX=pick[0]; k.dirY=pick[1]; k.tc+=pick[0]; k.tr+=pick[1]; }
      } else {
        const ang=Math.atan2(ty-k.y,tx-k.x);
        k.x+=Math.cos(ang)*k.spd*dt; k.y+=Math.sin(ang)*k.spd*dt;
      }
      k.ghostT-=dt;
      if(k.ghostT<=0&&dist(k.x,k.y,P.x,P.y)>TILE*1.5&&(P.y<cellCY(LOBBY)-10||G.chain.length)){
        k.state='ghost'; k.ghostDur=rnd(4,7); k.gTrav=0;
      }
    } else if(k.state==='ghost'){
      const ang=Math.atan2(Math.min(P.y,cellCY(LOBBY-1)-4)-k.y,P.x-k.x);
      const gs=k.spd*0.62;
      k.x+=Math.cos(ang)*gs*dt; k.y+=Math.sin(ang)*gs*dt; k.gTrav+=gs*dt;
      k.ghostDur-=dt;
      const [c,r]=cellOf(k.x,k.y);
      if((k.gTrav>TILE*0.9||k.ghostDur<=0)&&isOpen(c,r)&&!rockAt(c,r)&&(dist(k.x,k.y,cellCX(c),cellCY(r))<13||k.ghostDur<=0)){
        k.x=cellCX(c); k.y=cellCY(r); k.tc=c; k.tr=r;
        k.state='walk'; k.ghostT=Math.max(5,rnd(6,12)/(1+0.05*(G.level-1)));
      }
    }
    // collisions
    if(k.state==='walk'||k.state==='ghost'){
      if(dist(k.x,k.y,P.x,P.y)<25) hitPlayer();
      if(G.chainGrace<=0)
        for(let i=0;i<G.chain.length;i++){
          const p=followerPos(i);
          if(dist(k.x,k.y,p.x,p.y)<18){ scatterChain(i); break; }
        }
    }
  }
  G.critters=G.critters.filter(k=>!k.gone);
}

/* ---------------- falafels ---------------- */
function updateFalafels(dt){
  for(const f of G.falafels){
    const [c,r]=cellOf(f.x,f.y);
    const open=isOpen(c,r)||r===LOBBY;
    const sp=open?260:70;
    f.x+=f.dx*sp*dt; f.y+=f.dy*sp*dt; f.trav+=sp*dt;
    if(!open){
      carve(f.x,f.y,6);
      if(RNG()<0.35) G.parts.push({x:f.x+rnd(-6,6),y:f.y+rnd(-6,6),
        vx:rnd(-40,40),vy:rnd(-60,10),t:rnd(0.2,0.45),col:'#8a6a40'});
    }
    if(f.trav>TILE*3.4||rockAt(c,r)||f.x<8||f.x>W-8||f.y<cellCY(TOP)-20||f.y>H-8){
      f.dead=true; puff(f.x,f.y,'#d8b56a',5); continue; }
    for(const k of G.critters){
      if((k.state==='walk'||k.state==='ghost')&&dist(f.x,f.y,k.x,k.y)<22){
        f.dead=true; G.lvlFalafelHits++;
        if(k.state==='ghost'){ k.state='stun'; k.stunT=2;
          if(!k.stunScored){ k.stunScored=true; addScore(100,k.x,k.y-22); } }
        else { k.state='pacified'; addScore(200,k.x,k.y-22); }
        Snd.pop(); puff(k.x,k.y,'#ffd166',10);
        break;
      }
    }
  }
  G.falafels=G.falafels.filter(f=>!f.dead);
}

/* ---------------- rocks ---------------- */
function updateRocks(dt){
  for(const k of G.rocks){
    if(k.state==='idle'){
      if(isOpen(k.c,k.r+1)&&!rockAt(k.c,k.r+1)){ k.state='wobble'; k.t=0.8; Snd.beep(110,0.15,'square',0.05); }
    } else if(k.state==='wobble'){
      k.t-=dt;
      if(k.t<=0){ k.state='fall'; k.vy=0; openCell(k.c,k.r); carve(k.x,k.y,19); }
    } else if(k.state==='fall'){
      k.vy=Math.min(k.vy+1000*dt,520); k.y+=k.vy*dt;
      carve(k.x,k.y,16);
      const nr=Math.floor((k.y+20)/TILE);
      if(nr>=LOBBY||(!isOpen(k.c,nr)&&nr>k.r)||G.rocks.some(o=>o!==k&&o.state!=='fall'&&o.c===k.c&&o.r===nr)){
        k.dead=true; G.shake=0.3; Snd.thud();
        puff(k.x,k.y+10,'#8a6a4a',14);
      }
      if(dist(k.x,k.y,P.x,P.y)<30) hitPlayer();
      for(const c of G.critters){
        if((c.state==='walk'||c.state==='ghost')&&dist(k.x,k.y,c.x,c.y)<32){
          c.state='startled'; addScore(300,c.x,c.y-22); Snd.pop();
        }
      }
    }
  }
  G.rocks=G.rocks.filter(k=>!k.dead);
}

function drawParts(dt){
  for(const p of G.parts){
    p.t-=dt; p.x+=(p.vx||0)*dt; p.y+=(p.vy||0)*dt;

      ctx.font='bold 14px Courier New'; ctx.textAlign='center'; ctx.fillText(p.txt,p.x,p.y); ctx.globalAlpha=1; }

function wrapText(text,cx,y,maxW,lh){
  const words=text.split(' '); let line='',yy=y;
  for(const w of words){
    const test=line?line+' '+w:w;
    if(ctx.measureText(test).width>maxW&&line){ ctx.fillText(line,cx,yy); line=w; yy+=lh; }
    else line=test;
  }
  if(line) ctx.fillText(line,cx,yy);
}

  track('tower-share');
  if(navigator.share){
    navigator.share({title:'MIKLAT TOWER',text,url}).then(()=>{G.overShareMsg='Shared! 🎉';}).catch(()=>{});
  } else if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text+'\n'+url).then(()=>{G.overShareMsg='Score + challenge link copied!';}).catch(()=>{G.overShareMsg=url;});
  } else { G.overShareMsg=url; }
}
function drawOver(){
  ctx.fillStyle='rgba(8,10,20,.82)'; ctx.fillRect(0,0,W,H);
  ctx.textAlign='center';
  ctx.fillStyle='#ff8787'; ctx.font='bold 34px Courier New';
  ctx.fillText(G.overReason.includes('stayed safe')?'TIME\'S UP!':'OY VA VOY!',W/2,H*0.30);
  ctx.fillStyle='#fff'; ctx.font='15px Courier New';
  wrapText(G.overReason,W/2,H*0.36,W-80,20);
  ctx.fillStyle='#ffe66d'; ctx.font='bold 24px Courier New';
  ctx.fillText('SCORE '+G.score,W/2,H*0.46);
  ctx.font='bold 15px Courier New';
  ctx.fillText('BEST '+G.best+(G.score>=G.best&&G.score>0?'  ★ NEW!':'')+'  ·  '+(DIFFS[G.diffKey]||DIFFS.med).name,W/2,H*0.51);
  if(G.pacifists||G.grandTours){
    ctx.fillStyle='#9ef0a0'; ctx.font='13px Courier New';
    ctx.fillText((G.pacifists?'🕊 ×'+G.pacifists+'   ':'')+(G.grandTours?'🏆 ×'+G.grandTours:''),W/2,H*0.56);
  }
  drawBtn(OVER_SHARE,'⤴ SHARE','#4dabf7');
  drawBtn(OVER_AGAIN,'↻ AGAIN','#9ef0a0');
  if(G.overShareMsg){ ctx.fillStyle='#9ef0a0'; ctx.font='12px Courier New'; ctx.textAlign='center';
    ctx.fillText(G.overShareMsg,W/2,OVER_SHARE.y+70); }
  else { ctx.fillStyle='#6b7a99'; ctx.font='11px Courier New';
    ctx.fillText('PRESS ANY KEY TO PLAY AGAIN',W/2,OVER_SHARE.y+70); }
}
function drawClear(){
  ctx.fillStyle='rgba(8,10,20,.6)'; ctx.fillRect(0,H*0.3,W,H*0.22);
  ctx.textAlign='center';
  ctx.fillStyle='#9ef0a0'; ctx.font='bold 30px Courier New';
  ctx.fillText('EVERYONE\'S IN THE MIKLAT! ⌂',W/2,H*0.39);
  ctx.fillStyle='#fff'; ctx.font='16px Courier New';
  ctx.fillText('Climbing higher… Level '+(G.level+1),W/2,H*0.445);
}
let paused=false;
function togglePause(){ if(G.state==='play'||paused){ paused=!paused; } }
function startGame(){
  const diff=DIFFS[G.diffKey]||DIFFS.med;
  G.seed=(G.challengeSeed!=null?G.challengeSeed:randSeed()); G.challengeSeed=null;
  G.level=1; G.score=0; G.hearts=diff.hearts; G.maxHearts=diff.hearts; G.state='play'; paused=false;
  G.runRescued=0; G.pacifists=0; G.grandTours=0; G.overShareMsg='';
  loadBest();
  Inp.fire=false; track('tower-start-'+diff.key);
  genLevel(); Snd.fanfare();
}
function uiKey(key){
  if(key==='m'||key==='M'||key==='p'||key==='P'||key==='Escape')return;
  if(G.state==='title'){
    if(key==='1'){ setDiff('easy'); return; }
    if(key==='2'){ setDiff('med'); return; }
    if(key==='3'){ setDiff('hard'); return; }
    startGame();
  } else if(G.state==='over') startGame();
}
function uiTap(x,y){
  // mute corner always tappable
  if(x>W-30&&y<34){ Snd.toggle(); return true; }
  if(G.state==='title'){
    for(const ch of diffChips())
      if(x>=ch.x&&x<=ch.x+ch.w&&y>=ch.y&&y<=ch.y+ch.h){ setDiff(ch.k); return true; }
    startGame(); return true;
  }
  if(G.state==='over'){
    const s=OVER_SHARE,a=OVER_AGAIN;
    if(x>=s.x&&x<=s.x+s.w&&y>=s.y&&y<=s.y+s.h){ shareRun(); return true; }
    startGame(); return true;   // AGAIN button or anywhere else restarts
  }
  if(paused){ paused=false; return true; }
  return false;
}

/* ---------------- main loop ---------------- */
const vignette=(()=>{ const g=ctx.createRadialGradient(W/2,H*0.46,H*0.34,W/2,H*0.5,H*0.74);
  g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(6,8,16,.26)'); return g; })();
let last=performance.now();
genLevel(); // pretty dirt behind the title
function loop(now){
  const dt=Math.min((now-last)/1000,0.05); last=now;
  ctx.clearRect(0,0,W,H);

  // background music: per-level track while climbing, menu theme everywhere else
  Mus.want(G.state==='play' ? 'lvl'+((G.level-1)%3) : 'menu');
  Mus.tick(dt);

  if(G.state==='title'){ drawTitle(); requestAnimationFrame(loop); return; }

  if(G.state==='play'&&!paused){
    G.time-=dt;
    if(G.time<=0){ gameOver("The neighbors stayed safe at home this time — yalla, again!"); }
    if(G.time<13&&G.time>0){ G.sirenT-=dt; if(G.sirenT<=0){ G.sirenT=1.0; Snd.sirenBeat(); } }
    if(G.state==='play') updatePlayer(dt);
    if(G.state==='play') updateCritters(dt);
    if(G.state==='play') updateFalafels(dt);
    if(G.state==='play') updateRocks(dt);
    for(const t of G.toasts){ t.t-=dt; }
    G.toasts=G.toasts.filter(t=>t.t>0);
    G.shake=Math.max(0,G.shake-dt);
  }
  if(G.state==='clear'){
    G.clearT-=dt;
    if(G.clearT<=0){ G.level++; G.state='play'; genLevel(); }
  }

  ctx.save();
  if(G.shake>0) ctx.translate(rnd(-5,5)*G.shake,rnd(-5,5)*G.shake);

  drawSky();
  drawBackdrop();
  drawSupplies();
  for(const p of G.pockets) drawPocketRoom(p);
  for(const res of G.residents){ res.wave+=dt*4; drawResident(res.x,res.y,res.kind,res.wave); }
  ctx.drawImage(dirt,0,0,W,H);
  // facade edges against the sky (cover parity)
  ctx.fillStyle='#8ecdf0'; ctx.fillRect(0,TOP*TILE,6,(LOBBY-TOP)*TILE); ctx.fillRect(W-6,TOP*TILE,6,(LOBBY-TOP)*TILE);
  ctx.fillStyle='#8a7456'; ctx.fillRect(6,TOP*TILE,2,(LOBBY-TOP)*TILE); ctx.fillRect(W-8,TOP*TILE,2,(LOBBY-TOP)*TILE);
  for(const k of G.rocks) drawRock(k);
  for(const f of G.falafels){
    ctx.fillStyle='#b07a2e'; ctx.beginPath(); ctx.arc(f.x,f.y,6,0,7); ctx.fill();
    ctx.fillStyle='#d8b56a'; ctx.fillRect(f.x-2,f.y-2,2,2); ctx.fillRect(f.x+1,f.y+1,2,2);
  }
  for(const k of G.critters) drawCritter(k);
  drawChain();
  drawPlayer();
  drawParts(paused?0:dt);
  ctx.restore();

  // soft depth vignette
  ctx.fillStyle=vignette; ctx.fillRect(0,0,W,H);

  // siren tint
  if(G.state==='play'&&G.time<13&&Math.floor(G.time*2)%2===0){
    ctx.fillStyle='rgba(255,60,60,.07)'; ctx.fillRect(0,0,W,H);
  }

  drawHUD();
  if(G.state==='play') drawPads();
  if(G.state==='clear') drawClear();
  if(G.state==='over') drawOver();
  if(paused&&G.state==='play'){
    ctx.fillStyle='rgba(8,10,20,.7)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#fff'; ctx.font='bold 28px Courier New'; ctx.textAlign='center';
    ctx.fillText('PAUSED',W/2,H/2);
    ctx.font='14px Courier New'; ctx.fillText('P / tap to resume',W/2,H/2+30);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
document.addEventListener('visibilitychange',()=>{ if(document.hidden&&G.state==='play') paused=true; });
</script>
<script data-goatcounter="https://miklat-games.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>
